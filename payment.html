<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WHS Payment FIXED</title>

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body { font-family: sans-serif; padding: 20px; background: #0c1222; color: #f1f5f9; }
    h2 { color: #2dd4bf; }
    button { padding: 15px 30px; font-size: 18px; cursor: pointer; margin: 10px 0; border-radius: 10px; border: none; font-weight: bold; }
    .btn-pay { background: #6B3FA0; color: white; transition: background 0.2s; }
    .btn-pay:hover:not(:disabled) { background: #553082; }
    .btn-pay:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }
    #status { margin-top: 20px; font-weight: bold; font-size: 1.1rem; }
    .debug { background: #060a13; border: 1px solid #2dd4bf; padding: 15px; margin-top: 15px; font-size: 12px; white-space: pre-wrap; font-family: monospace; color: #2dd4bf; max-height: 250px; overflow-y: auto; }
  </style>
</head>

<body>

<h2>💳 WHS Payment - FIXED VERSION</h2>

<button class="btn-pay" id="payBtn" onclick="pay()" disabled>Bayar 1 Pi</button>

<p id="status">Menginisialisasi Pi SDK...</p>
<div id="debug" class="debug">=== LOG SYSTEM ===&#10;</div>

<script>
// 🔥 UBAH INI: Masukkan URL lengkap Edge Function Supabase Anda!
const URL_BACKEND = "https://<PROJECT_ID>.supabase.co/functions/v1/<NAMA_FUNCTION_ANDA>"; 

let piReady = false;

// ==========================================
// KONEKSI & INISIALISASI PI SDK
// ==========================================
function initPi() {
  if (typeof Pi !== "undefined") {
    try {
      Pi.init({ version: "2.0", sandbox: true }); // Ubah sandbox ke false jika sudah siap Mainnet
      piReady = true;
      document.getElementById("status").innerText = "Status: Terhubung ke Pi Network (Siap Transaksi)";
      document.getElementById("payBtn").disabled = false;
      dbg("✅ Pi SDK Berhasil Ditemukan & Diinisialisasi");
    } catch (err) {
      dbg("❌ Gagal inisialisasi Pi SDK: " + err.message);
    }
  } else {
    setTimeout(initPi, 100);
  }
}
initPi();

// Fungsi mempermudah tracking log di layar HP / Pi Browser
function dbg(msg) {
  document.getElementById("debug").innerText += msg + "\n";
  console.log(msg);
}

// ==========================================
// HIT API BACKEND EDGE FUNCTION
// ==========================================
async function kirimKeBackend(action, paymentId, txid = null) {
  try {
    dbg("➡️ Mengirim permintaan '" + action + "' ke backend...");

    const res = await fetch(URL_BACKEND, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action, paymentId, txid })
    });

    const text = await res.text();
    dbg("⬅️ RESPON MENTAH BACKEND: " + text);

    let data;
    try {
      data = JSON.parse(text);
    } catch (e) {
      dbg("❌ ERROR: Backend tidak mengembalikan format JSON yang valid!");
      return null;
    }

    return data;

  } catch (err) {
    dbg("❌ FETCH ERROR (Gagal menghubungi server): " + err.message);
    return null;
  }
}

// ==========================================
// PROSES UTAMA EKSEKUSI PEMBAYARAN
// ==========================================
async function pay() {
  if (!piReady) return alert("SDK belum siap digunakan!");

  const status = document.getElementById("status");
  document.getElementById("debug").innerText = "=== PROSES PEMBAYARAN DIMULAI ===\n";

  try {
    dbg("🔐 Melakukan otentikasi User...");
    const auth = await Pi.authenticate(["username", "payments"]);
    const username = auth.user.username;

    dbg("User Terdeteksi: @" + username);
    dbg("💰 Memicu pop-up Dompet Pi...");

    await Pi.createPayment({
      amount: 1.00,
      memo: "Akses Dashboard Wallet Health Score",
      metadata: { user: username }
    }, {

      // CALLBACK 1: APPROVAL (Lolos dari bug hitung mundur 50 detik)
      onReadyForServerApproval: async function(paymentId) {
        dbg("📡 Meminta APPROVAL backend untuk Payment ID: " + paymentId);
        status.innerText = "Memproses Validasi Server (Approve)...";

        const res = await kirimKeBackend("approve", paymentId);

        if (res && res.success === true) {
          dbg("✅ Backend Sukses Approve! Meneruskan perintah Pi.approvePayment()...");
          status.innerText = "Server Disetujui. Menunggu konfirmasi dompet Anda...";
          
          return Pi.approvePayment(paymentId); // Mengirim sinyal ke Pi SDK agar transaksi diteruskan ke blockchain
        } else {
          dbg("❌ BACKEND GAGAL MENYETUJUI TRANSAKSI");
          status.innerText = "Pembayaran ditolak oleh backend sistem.";
        }
      },

      // CALLBACK 2: COMPLETION (Penyelesaian & Sinkronisasi DB)
      onReadyForServerCompletion: async function(paymentId, txid) {
        dbg("📡 Transaksi Blockchain Terbentuk! TXID: " + txid);
        status.innerText = "Menyelesaikan pencatatan transaksi di server...";

        const res = await kirimKeBackend("complete", paymentId, txid);

        if (res && res.success === true) {
          dbg("🎉 Backend sukses memproses data! Mengunci transaksi dengan Pi.completePayment()...");
          status.innerText = "PROSES SUKSES ✔ Terima kasih!";
          
          return Pi.completePayment(paymentId); // Menutup transaksi secara permanen di server Pi
        } else {
          dbg("❌ BACKEND GAGAL MENYELESAIKAN PROSES TRANSFER");
          status.innerText = "Penyelesaian transaksi gagal.";
        }
      },

      onCancel: function(paymentId) {
        dbg("❌ Transaksi dibatalkan oleh pengguna.");
        status.innerText = "Pembayaran dibatalkan.";
      },

      onError: function(err) {
        dbg("❌ PI SDK ERROR: " + (err.message || JSON.stringify(err)));
        status.innerText = "Terjadi kesalahan sistem internal.";
      }

    });

  } catch (e) {
    dbg("❌ CATCH EXCEPTION: " + e.message);
    status.innerText = "Proses pembayaran gagal dieksekusi.";
  }
}
</script>

</body>
</html>
