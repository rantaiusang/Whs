<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WHS Debug</title>

  <style>
    body { font-family: monospace; padding: 20px; font-size: 14px; }
    .box { background: #222; color: #0f0; padding: 15px; margin: 10px 0; border-radius: 8px; white-space: pre-wrap; word-wrap: break-word; }
  </style>
</head>
<body>

  <h2>🔧 Deep Debug Mode</h2>
  <div id="log" class="box">Memulai pengecekan...\n</div>

  <!-- 1. LOAD SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js" 
          onload="document.getElementById('log').innerText += '✅ pi-sdk.js SUKSES DI-LOAD\n'" 
          onerror="document.getElementById('log').innerText += '❌ pi-sdk.js GAGAL DI-LOAD!\n'"></script>

  <!-- 2. LOAD CONFIG -->
  <script src="config.js"></script>

  <!-- 3. DEBUG SCRIPT -->
  <script>
    const logEl = document.getElementById('log');
    
    function log(msg) {
      logEl.innerText += msg + "\n";
      console.log(msg);
    }

    // Tunggu halaman siap total
    window.addEventListener('load', function() {
      log("=================================");
      log("HALAMAN SUDAH 100% LOADED");
      log("=================================");
      
      log("Cek window.Pi: " + typeof window.Pi);
      log("Cek __PI_READY__: " + window.__PI_READY__);
      
      // Jika Pi ada, cek isinya apa saja
      if (typeof window.Pi !== 'undefined') {
        log("Isi Pi: " + Object.keys(window.Pi).join(", "));
      } else {
        log("⚠️ PERINGATAN: Object Pi TIDAK ADA!");
        log("Cek navigator.userAgent: " + navigator.userAgent);
      }

      // Tombol manual testing
      const btn = document.createElement('button');
      btn.innerText = "COBA PI.INIT() MANUAL";
      btn.style.marginTop = "20px";
      btn.style.padding = "15px";
      btn.onclick = function() {
        try {
          log("Memanggil Pi.init()...");
          Pi.init({ version: "2.0", sandbox: true });
          log("✅ Pi.init() SUKSES!");
        } catch(e) {
          log("❌ Pi.init() ERROR: " + e.message);
        }
      };
      document.body.appendChild(btn);
    });
  </script>

</body>
</html>
