<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WHS Payment Production READY</title>

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      padding: 20px; 
      background: #0c1222; 
      color: #f1f5f9; 
      text-align: center;
    }
    .container {
      max-width: 500px;
      margin: 40px auto;
      background: #111827;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      border: 1px solid #1f2937;
    }
    h2 { color: #2dd4bf; margin-bottom: 5px; }
    p.subtitle { color: #94a3b8; font-size: 14px; margin-top: 0; margin-bottom: 25px; }
    
    button { 
      width: 100%;
      padding: 16px; 
      font-size: 18px; 
      cursor: pointer; 
      border-radius: 12px; 
      border: none; 
      font-weight: bold; 
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    .btn-pay { 
      background: #6B3FA0; 
      color: white; 
      transition: background 0.2s, transform 0.1s; 
    }
    .btn-pay:hover:not(:disabled) { background: #553082; }
    .btn-pay:active:not(:disabled) { transform: scale(0.98); }
    .btn-pay:disabled { 
      background: #334155; 
      color: #64748b; 
      cursor: not-allowed; 
      box-shadow: none;
    }
    
    #status { 
      margin-top: 25px; 
      font-weight: 500; 
      font-size: 1.1rem; 
      color: #e2e8f0;
      padding: 10px;
      border-radius: 8px;
      background: #1e293b;
    }
    
    .debug-title {
      text-align: left;
      margin-top: 30px;
      font-size: 12px;
      color: #64748b;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .debug { 
      text-align: left;
      background: #030712; 
      border: 1px solid #1f2937; 
      padding: 15px; 
      margin-top: 5px; 
      font-size: 12px; 
      white-space: pre-wrap; 
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; 
      color: #2dd4bf; 
      max-height: 200px; 
      overflow-y: auto; 
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>💳 WHS Payment Gateway</h2>
  <p class="subtitle">Akses Dashboard Wallet Health Score</p>

  <button class="btn-pay" id="payBtn" onclick="pay()" disabled>Bayar 1 Pi</button>

  <div id="status">Menginisialisasi Pi SDK...</div>
  
  <div class="debug-title">System Logs</div>
  <div id="debug" class="debug">=== LOG SYSTEM ===&#10;</div>
</div>

<script>
// 🔗 URL LIVE Edge Function Supabase Anda
const URL_BACKEND = "https://valpwlebldnkedrznaym.supabase.co/functions/v1/verify-pi-payment"; 

let piReady = false;

// ==========================================
// KONEKSI & INISIALISASI PI SDK
// ==========================================
function initPi() {
  if (typeof Pi !== "undefined") {
    try {
      // Set 'sandbox: true' untuk uji coba, ubah ke 'false' jika sudah rilis resmi (Mainnet)
      Pi.init({ version: "2.0", sandbox: true }); 
      piReady = true;
      document.getElementById("status").innerText = "Status: Terhubung (Siap Transaksi)";
      document.getElementById("payBtn").disabled = false;
      dbg("✅ Pi SDK Berhasil Ditemukan & Diinisialisasi");
    } catch (err) {
      dbg("❌ Gagal inisialisasi Pi SDK: " + err.message);
      document.getElementById("status").innerText = "Gagal inisialisasi SDK.";
    }
  } else {
    // Terus mencoba mendeteksi objek SDK jika belum termuat sempurna
    setTimeout(initPi, 100);
  }
}

// Mulai inisialisasi otomatis saat halaman dimuat
initPi();

// Fungsi mencetak log di layar (Sangat berguna saat debug di dalam Pi Browser HP)
function dbg(msg) {
  const debugDiv = document.getElementById("debug");
  debugDiv.innerText += msg + "\n";
  debugDiv.scrollTop = debugDiv.scrollHeight; // Auto-scroll ke log paling bawah
  console.log(msg);
}

// ==========================================
// HIT API BACKEND EDGE FUNCTION (AJAX FETCH)
// ==========================================
async function kirimKeBackend(action, paymentId, txid = null) {
  try {
    dbg(`➡️ Mengirim aksi '${action}' ke backend server...`);

    const res = await fetch(URL_BACKEND, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action, paymentId, txid })
    });

    const text = await res.text();
    dbg("⬅️ RESPON SERVER: " + text);

    let data;
    try {
      data = JSON.parse(text);
    } catch (e) {
      dbg("❌ ERROR: Format respons dari backend bukan JSON yang valid!");
      return null;
    }

    return data;

  } catch (err) {
    dbg("❌ FETCH ERROR (Gagal menghubungi server backend): " + err.message);
    return null;
  }
}

// ==========================================
// PROSES UTAMA EKSEKUSI PEMBAYARAN
// ==========================================
async function pay() {
  if (!piReady) return alert("SDK belum siap digunakan!");

  const status = document.getElementById("status");
  const payBtn = document.getElementById("payBtn");
  
  // Kunci tombol secepat mungkin agar user tidak bisa menekan ganda (double-click)
  payBtn.disabled = true;
  document.getElementById("debug").innerText = "=== PROSES PEMBAYARAN DIMULAI ===\n";

  try {
    dbg("🔐 Melakukan otentikasi akun Pi Anda...");
    const auth = await Pi.authenticate(["username", "payments"]);
    const username = auth.user.username;

    dbg("User Terdeteksi: @" + username);
    dbg("💰 Memicu pop-up Dompet Pi...");
    status.innerText = "Menunggu konfirmasi di Dompet Pi...";

    await Pi.createPayment({
      amount: 1.00, // Jumlah koin Pi yang ditagihkan
      memo: "Akses Dashboard Wallet Health Score",
      metadata: { user: username }
    }, {

      // ------------------------------------------
      // CALLBACK 1: TAHAP SERVER APPROVAL
      // ------------------------------------------
      onReadyForServerApproval: async function(paymentId) {
        dbg("📡 Meminta APPROVAL backend untuk Payment ID: " + paymentId);
        status.innerText = "Memproses validasi keamanan server...";

        const res = await kirimKeBackend("approve", paymentId);

        if (res && res.success === true) {
          dbg("✅ Backend menyetujui transaksi! Melanjutkan proses ke dompet...");
          status.innerText = "Server disetujui. Silakan masukkan kata sandi dompet Anda jika diminta...";
          
          return Pi.approvePayment(paymentId); // Sinyal aman bagi SDK untuk melanjutkan transaksi blockchain
        } else {
          dbg("❌ BACKEND MENOLAK TRANSAKSI INI");
          status.innerText = "Pembayaran ditolak oleh sistem keamanan server.";
          payBtn.disabled = false; // Buka kunci tombol agar user bisa coba lagi
        }
      },

      // ------------------------------------------
      // CALLBACK 2: TAHAP SERVER COMPLETION
      // ------------------------------------------
      onReadyForServerCompletion: async function(paymentId, txid) {
        dbg("📡 Transaksi Blockchain Terbentuk! TXID: " + txid);
        status.innerText = "Menyelesaikan pencatatan transaksi di database...";

        const res = await kirimKeBackend("complete", paymentId, txid);

        if (res && res.success === true) {
          dbg("🎉 Sinkronisasi sukses! Mengunci status transaksi di Pi Network...");
          status.innerText = "PROSES SUKSES ✔ Terima kasih atas pembayaran Anda!";
          
          return Pi.completePayment(paymentId); // Menyelesaikan status pembayaran secara permanen di server Pi
        } else {
          dbg("⚠️ BACKEND GAGAL MENYELESAIKAN PROSES TRANSFER");
          status.innerText = "Penyelesaian transaksi internal bermasalah. Hubungi admin.";
          payBtn.disabled = false; 
        }
      },

      // ------------------------------------------
      // CALLBACK PEMBATALAN & ERROR
      // ------------------------------------------
      onCancel: function(paymentId) {
        dbg("❌ Transaksi dibatalkan oleh pengguna.");
        status.innerText = "Pembayaran dibatalkan.";
        payBtn.disabled = false; // Buka kembali tombol
      },

      onError: function(err) {
        dbg("❌ PI SDK ERROR: " + (err.message || JSON.stringify(err)));
        status.innerText = "Terjadi kesalahan internal pada Pi SDK.";
        payBtn.disabled = false; // Buka kembali tombol
      }

    });

  } catch (e) {
    dbg("❌ CATCH EXCEPTION: " + e.message);
    status.innerText = "Gagal mengeksekusi sistem pembayaran.";
    payBtn.disabled = false; 
  }
}
</script>

</body>
</html>
