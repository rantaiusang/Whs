<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WHS Payment FIXED</title>

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body { font-family: sans-serif; padding: 20px; }
    button { padding: 15px 30px; font-size: 18px; cursor: pointer; margin: 10px 5px; border-radius: 10px; border: none; }
    .btn-pay { background: #6B3FA0; color: white; }
    .btn-pay:disabled { background: #ccc; }
    #status { margin-top: 20px; font-weight: bold; }
    .debug { background: #eee; padding: 10px; margin-top: 10px; font-size: 12px; white-space: pre-wrap; }
  </style>
</head>

<body>

<h2>💳 WHS Payment FIX</h2>

<button class="btn-pay" id="payBtn" onclick="pay()" disabled>Bayar 1 Pi</button>

<p id="status">Loading...</p>
<div id="debug" class="debug"></div>

<script>
const URL_BACKEND = "/api/approve"; // 🔥 FIX: HARUS SESUAI BACKEND

let piReady = false;

// =========================
// INIT PI SDK
// =========================
function initPi() {
  if (typeof Pi !== "undefined") {
    Pi.init({ version: "2.0", sandbox: true });
    piReady = true;
    document.getElementById("status").innerText = "Siap";
    document.getElementById("payBtn").disabled = false;
  } else {
    setTimeout(initPi, 100);
  }
}
initPi();

// =========================
// DEBUG
// =========================
function dbg(msg) {
  document.getElementById("debug").innerText += msg + "\n";
  console.log(msg);
}

// =========================
// BACKEND CALL SAFE
// =========================
async function kirimKeBackend(action, paymentId, txid = null) {
  try {
    dbg("➡️ Kirim: " + action);

    const res = await fetch(URL_BACKEND, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        action,
        paymentId,
        txid
      })
    });

    const text = await res.text();
    dbg("⬅️ RAW RESPONSE: " + text);

    let data;
    try {
      data = JSON.parse(text);
    } catch (e) {
      dbg("❌ JSON ERROR");
      return null;
    }

    return data;

  } catch (err) {
    dbg("❌ FETCH ERROR: " + err.message);
    return null;
  }
}

// =========================
// MAIN PAYMENT
// =========================
async function pay() {
  if (!piReady) return alert("SDK belum siap");

  const status = document.getElementById("status");
  document.getElementById("debug").innerText = "";

  try {

    dbg("🔐 Login...");
    const auth = await Pi.authenticate(["username", "payments"]);
    const username = auth.user.username;

    dbg("User: " + username);

    dbg("💰 Create Payment...");

    await Pi.createPayment({
      amount: "1.00",
      memo: "WHS Payment",
      metadata: { user: username }
    }, {

      // =====================
      // APPROVAL
      // =====================
      onReadyForServerApproval: async function(paymentId) {
        dbg("📡 APPROVAL request");

        status.innerText = "Approve...";

        const res = await kirimKeBackend("approve", paymentId);

        if (res && res.status === "approved") {
          dbg("✅ APPROVED");
          status.innerText = "Approved";
        } else {
          dbg("❌ APPROVE FAIL");
          status.innerText = "Approve gagal";
        }
      },

      // =====================
      // COMPLETE
      // =====================
      onReadyForServerCompletion: async function(paymentId, txid) {
        dbg("📡 COMPLETE request");

        status.innerText = "Complete...";

        const res = await kirimKeBackend("complete", paymentId, txid);

        if (res && res.status === "completed") {
          dbg("🎉 SUCCESS");
          status.innerText = "SUCCESS ✔";
        } else {
          dbg("❌ COMPLETE FAIL");
          status.innerText = "Complete gagal";
        }
      },

      onCancel: function(paymentId) {
        dbg("❌ Cancel: " + paymentId);
        status.innerText = "Canceled";
      },

      onError: function(err) {
        dbg("❌ ERROR: " + (err.message || err));
        status.innerText = "Error";
      }

    });

    dbg("🚀 Flow started");

  } catch (e) {
    dbg("❌ CATCH: " + e.message);
    status.innerText = "Failed";
  }
}
</script>

</body>
</html>
