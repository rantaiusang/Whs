<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WHS Payment Test</title>

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <script>
    Pi.init({ version: "2.0", sandbox: true });
  </script>
</head>

<body>

  <h2>💳 WHS Payment Test</h2>

  <button onclick="pay()">Bayar 1 Pi</button>

  <p id="status">Ready</p>

  <script>
    async function pay() {
      try {

        console.log("=== START PAYMENT ===");

        document.getElementById("status").innerText = "Login Pi...";

        // 1. LOGIN PI
        const auth = await Pi.authenticate(['username']);

        console.log("LOGIN SUCCESS:", auth);

        const username = auth?.user?.username || "unknown";

        document.getElementById("status").innerText = "Buat Payment...";

        // 2. CREATE PAYMENT
        Pi.createPayment({
          amount: 1,
          memo: "WHS Test Payment",
          metadata: {
            user: username
          }
        }, {

          onReadyForServerApproval: function(paymentId) {
            console.log("APPROVAL:", paymentId);
            document.getElementById("status").innerText = "Menunggu approval...";
          },

          onReadyForServerCompletion: function(paymentId, txid) {
            console.log("COMPLETE:", paymentId, txid);
            document.getElementById("status").innerText = "Payment BERHASIL ✔";
          },

          onCancel: function(paymentId) {
            console.log("CANCEL:", paymentId);
            document.getElementById("status").innerText = "Payment dibatalkan";
          },

          onError: function(err) {
            console.log("PAYMENT ERROR:", err);
            alert("PAYMENT ERROR:\n" + JSON.stringify(err, null, 2));
            document.getElementById("status").innerText = "Payment error";
          }

        });

      } catch (err) {

        // 🔥 INI ERROR LOGIN / SDK
        console.log("LOGIN/SDK ERROR:", err);
        alert("LOGIN ERROR:\n" + JSON.stringify(err, null, 2));

        document.getElementById("status").innerText =
          "Login gagal / SDK error (lihat popup)";

      }
    }
  </script>

</body>
</html>
