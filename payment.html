<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WHS Payment Test</title>

  <!-- Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <script>
    // INIT PI SDK (sandbox untuk test)
    Pi.init({ version: "2.0", sandbox: true });
  </script>
</head>

<body>

  <h2>💳 WHS Payment Test</h2>

  <button onclick="pay()">Bayar 1 Pi</button>

  <p id="status">Ready</p>

  <script>
    async function pay() {
      try {

        console.log("START PAYMENT FLOW");

        document.getElementById("status").innerText = "Login Pi...";

        // =========================
        // 1. PI LOGIN
        // =========================
        const auth = await Pi.authenticate(['username']);

        console.log("AUTH FULL:", auth);

        const username = auth?.user?.username || "unknown";

        document.getElementById("status").innerText = "Create payment...";

        // =========================
        // 2. PAYMENT FLOW
        // =========================
        Pi.createPayment({
          amount: 1,
          memo: "WHS Test Payment Step 10",
          metadata: {
            user: username
          }
        }, {

          onReadyForServerApproval: function(paymentId) {
            console.log("APPROVAL:", paymentId);
            document.getElementById("status").innerText = "Waiting approval...";
          },

          onReadyForServerCompletion: function(paymentId, txid) {
            console.log("COMPLETE:", paymentId, txid);
            document.getElementById("status").innerText = "Payment sukses ✔";
          },

          onCancel: function(paymentId) {
            console.log("CANCEL:", paymentId);
            document.getElementById("status").innerText = "Payment dibatalkan";
          },

          onError: function(error) {
            console.log("PAYMENT ERROR:", error);
            document.getElementById("status").innerText = "Payment error (cek console)";
          }

        });

      } catch (err) {

        console.log("FULL ERROR (LOGIN/PAYMENT):", err);

        document.getElementById("status").innerText =
          "Error Pi SDK (cek console)";

      }
    }
  </script>

</body>
</html>
