<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WHS Payment</title>

  <!-- PI SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body { font-family: sans-serif; padding: 20px; }
    button { padding: 15px 30px; font-size: 18px; cursor: pointer; margin: 10px 5px; border: none; border-radius: 10px; }
    .btn-pay { background: #6B3FA0; color: white; }
    .btn-pay:disabled { background: #ccc; cursor: not-allowed; }
    #status { margin-top: 20px; font-size: 16px; font-weight: bold; }
    .debug { background: #f0f0f0; padding: 10px; margin-top: 15px; font-family: monospace; font-size: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>

  <h2>💳 WHS Payment</h2>
  
  <button class="btn-pay" id="payBtn" onclick="pay()" disabled>💰 Bayar 1 Pi</button>
  
  <p id="status">Menyiapkan...</p>
  <div id="debug" class="debug" style="display:none;"></div>

  <script>
    // ==========================================
    // 1. CONFIG & BACKEND URL
    // ==========================================
    const SUPABASE_URL = "https://valpwlebldnkedrznaym.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhbHB3bGVibGRua2VkcnpuYXltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3Mzk3ODUsImV4cCI6MjA5ODMxNTc4NX0.G3BDRqiRBmcFwtBRtdiJI3CkptRrya9bxiVozcQZCSc";
    
    // 👇 INI URL BACKEND KAMU DI SUPABASE
    const URL_BACKEND = SUPABASE_URL + "/functions/v1/verify-pi-payment";

    // ==========================================
    // 2. PI SDK INIT
    // ==========================================
    let piReady = false;
    
    function initPiSDK() {
      if (typeof Pi !== 'undefined') {
        Pi.init({ version: "2.0", sandbox: true });
        piReady = true;
        console.log("✅ Pi SDK Ready!");
        document.getElementById('status').innerText = "Siap membayar";
        document.getElementById('payBtn').disabled = false;
      } else {
        setTimeout(initPiSDK, 100);
      }
    }
    initPiSDK();

    // ==========================================
    // 3. DEBUG HELPER
    // ==========================================
    function dbg(msg) {
      const el = document.getElementById('debug');
      el.style.display = 'block';
      el.innerText += msg + '\n';
      console.log(msg);
    }

    // ==========================================
    // 4. FUNGSI KIRIM KE SUPABASE (BACKEND)
    // ==========================================
    async function kirimKeBackend(action, paymentId, txid = null) {
      dbg("🔄 Kirim ke backend: " + action + "...");
      
      const bodyData = { action: action, paymentId: paymentId };
      if (txid) bodyData.txid = txid;

      try {
        const response = await fetch(URL_BACKEND, {
          method: "POST",
          headers: { 
            "Content-Type": "application/json",
            "Authorization": "Bearer " + SUPABASE_ANON_KEY
          },
          body: JSON.stringify(bodyData)
        });

        const data = await response.json();
        dbg("✅ Backend jawab: " + JSON.stringify(data));
        return data;

      } catch (error) {
        dbg("❌ Gagal hubungi backend: " + error.message);
        return null;
      }
    }

    // ==========================================
    // 5. PAYMENT FUNCTION UTAMA
    // ==========================================
    async function pay() {
      if (!piReady) {
        alert("SDK belum siap!");
        return;
      }

      const statusEl = document.getElementById('status');
      document.getElementById('debug').innerText = '';
      
      try {
        dbg("🔄 Authentikasi...");
        statusEl.innerText = "Login...";

        // LOGIN
        const auth = await Pi.authenticate(['username', 'payments']);
        const username = auth.user?.username || "unknown";
        dbg("✅ Login sukses: " + username);

        statusEl.innerText = "Membuka dialog...";

        // CREATE PAYMENT
        dbg("🔄 Create payment...");
        
        await Pi.createPayment({
          amount: "1.00",
          memo: "WHS Test Payment",
          metadata: { user: username }
        }, {

          // ==========================================
          // 👇 INI DIA! SAMBUNGAN KE BACKEND PERTAMA
          // ==========================================
          onReadyForServerApproval: async function(paymentId) {
            dbg("📡 Pi minta approval ke server...");
            statusEl.innerText = "Menghubungi server...";
            
            // KIRIM KE SUPABASE UNTUK DI-APPROVE
            const hasil = await kirimKeBackend("approve", paymentId);
            
            if (hasil && hasil.status === "approved") {
              dbg("✅ Server Approved!");
              statusEl.innerText = "Disetujui, menunggu completion...";
            } else {
              dbg("❌ Server Gagal Approve!");
              statusEl.innerText = "Server gagal approve";
            }
          },

          // ==========================================
          // 👇 INI DIA! SAMBUNGAN KE BACKEND KEDUA
          // ==========================================
          onReadyForServerCompletion: async function(paymentId, txid) {
            dbg("📡 Pi minta completion ke server...");
            statusEl.innerText = "Finalisasi pembayaran...";
            
            // KIRIM KE SUPABASE UNTUK DI-COMPLETE & SIMPAN DB
            const hasil = await kirimKeBackend("complete", paymentId, txid);
            
            if (hasil && hasil.status === "completed") {
              dbg("🎉 PEMBAYARAN SUKSES TOTAL!");
              statusEl.innerText = "Pembayaran BERHASIL! ✔";
            } else {
              dbg("❌ Server Gagal Complete!");
              statusEl.innerText = "Gagal finalisasi";
            }
          },

          onCancel: function(paymentId) {
            dbg("❌ User cancel: " + paymentId);
            statusEl.innerText = "Dibatalkan";
          },

          onError: function(error) {
            let msg = error?.message || JSON.stringify(error);
            dbg("❌ ERROR: " + msg);
            statusEl.innerText = "Error!";
            alert("PAYMENT ERROR:\n\n" + msg);
          }

        });

        dbg("✅ Flow dimulai...");

      } catch (err) {
        let msg = err?.message || JSON.stringify(err);
        dbg("❌ CATCH: " + msg);
        statusEl.innerText = "Gagal!";
        alert("ERROR:\n\n" + msg);
      }
    }
  </script>

</body>
</html>
