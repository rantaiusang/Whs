<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Dashboard — Wallet Health Score</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- data.js di HEAD — pastikan ke-load SEBELUM script utama -->
  <script src="js/data.js"></script>

  <style>
    :root {
      --bg-primary: #060a13;
      --bg-secondary: #0c1222;
      --bg-card: rgba(14, 22, 42, 0.65);
      --bg-card-hover: rgba(20, 32, 58, 0.75);
      --border-color: rgba(45, 212, 191, 0.12);
      --border-color-hover: rgba(45, 212, 191, 0.3);
      --border-subtle: rgba(255, 255, 255, 0.06);
      --accent: #2dd4bf;
      --accent-dim: rgba(45, 212, 191, 0.12);
      --accent-glow: rgba(45, 212, 191, 0.2);
      --accent-secondary: #f59e0b;
      --accent-secondary-dim: rgba(245, 158, 11, 0.12);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #475569;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --purple: #a855f7;
      --pink: #ec4899;
      --orange: #f97316;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-full: 9999px;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
      --topbar-height: 56px;
      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body { font-family: var(--font-body); background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; overflow-x: hidden; min-height: 100vh; }
    a { color: inherit; text-decoration: none; transition: color var(--transition-fast); }
    button { font-family: var(--font-body); cursor: pointer; border: none; outline: none; background: none; }

    .bg-atmosphere { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
    .bg-atmosphere .orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.18; animation: orbFloat 25s ease-in-out infinite; will-change: transform; }
    .bg-atmosphere .orb-1 { width: 320px; height: 320px; background: radial-gradient(circle, rgba(45,212,191,0.12) 0%, transparent 70%); top: -8%; left: -5%; }
    .bg-atmosphere .orb-2 { width: 260px; height: 260px; background: radial-gradient(circle, rgba(245,158,11,0.06) 0%, transparent 70%); bottom: -8%; right: -5%; animation-delay: -10s; animation-duration: 28s; }
    .bg-atmosphere .orb-3 { width: 200px; height: 200px; background: radial-gradient(circle, rgba(168,85,247,0.05) 0%, transparent 70%); top: 40%; right: 10%; animation-delay: -18s; animation-duration: 32s; }
    @keyframes orbFloat { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(15px,-20px) scale(1.03)} 66%{transform:translate(-10px,10px) scale(0.97)} }

    .topbar { height: var(--topbar-height); padding: 0 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-subtle); background: rgba(6,10,19,0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); position: sticky; top: 0; z-index: 40; }
    .topbar-left { display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1; }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; font-size: 0.82rem; font-weight: 600; color: var(--accent); border: 1px solid var(--border-color); border-radius: var(--radius-full); transition: all var(--transition-fast); white-space: nowrap; flex-shrink: 0; background: var(--accent-dim); }
    .back-btn:hover { background: rgba(45,212,191,0.18); border-color: var(--border-color-hover); box-shadow: 0 0 16px var(--accent-glow); }
    .back-btn:active { transform: scale(0.97); }
    .back-btn i { font-size: 0.8rem; }
    .topbar-title { font-family: var(--font-display); font-size: 1rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
    .topbar-right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .topbar-btn { width: 36px; height: 36px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 0.9rem; transition: all var(--transition-fast); position: relative; }
    .topbar-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
    .topbar-btn .notif-dot { position: absolute; top: 5px; right: 5px; width: 6px; height: 6px; background: var(--danger); border-radius: 50%; border: 1.5px solid var(--bg-primary); }
    .btn-logout { display: inline-flex; align-items: center; gap: 4px; padding: 6px 10px; font-size: 0.78rem; font-weight: 500; color: var(--text-muted); border-radius: var(--radius-full); transition: all var(--transition-fast); white-space: nowrap; }
    .btn-logout:hover { color: var(--danger); background: rgba(239,68,68,0.08); }
    .btn-logout .logout-text { display: none; }

    .page-content { padding: 20px 16px 32px; position: relative; z-index: 1; }

    .wallet-header { display: flex; flex-direction: column; gap: 14px; margin-bottom: 20px; }
    .wallet-header-top { display: flex; align-items: center; gap: 12px; }
    .wallet-avatar-lg { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #0d9488); display: flex; align-items: center; justify-content: center; font-size: 0.95rem; color: var(--bg-primary); font-family: var(--font-display); font-weight: 700; box-shadow: 0 0 20px var(--accent-glow); flex-shrink: 0; }
    .wallet-header-info { flex: 1; min-width: 0; }
    .wallet-header-info h2 { font-family: var(--font-display); font-size: 0.92rem; font-weight: 600; letter-spacing: 0.02em; word-break: break-all; line-height: 1.35; }
    .wallet-header-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-top: 4px; font-size: 0.75rem; color: var(--text-muted); }
    .wallet-header-meta span { display: inline-flex; align-items: center; gap: 4px; }
    .wallet-header-meta i { font-size: 0.7rem; }
    .wallet-header-bottom { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .copy-btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; font-size: 0.75rem; font-weight: 500; color: var(--text-muted); border: 1px solid var(--border-subtle); border-radius: var(--radius-full); transition: all var(--transition-fast); }
    .copy-btn:hover { color: var(--accent); border-color: var(--border-color); background: var(--accent-dim); }
    .sim-badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; font-size: 0.7rem; font-weight: 500; color: var(--text-muted); background: rgba(255,255,255,0.03); border: 1px solid var(--border-subtle); border-radius: var(--radius-full); }
    .sim-badge i { font-size: 0.65rem; }
    .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: var(--radius-full); font-size: 0.78rem; font-weight: 600; letter-spacing: 0.02em; }
    .status-badge i { font-size: 0.7rem; }

    .gauge-section { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); padding: 32px 24px 28px; margin-bottom: 20px; text-align: center; position: relative; overflow: hidden; }
    .gauge-section::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at 50% 80%, var(--accent-dim) 0%, transparent 50%); pointer-events: none; opacity: 0.5; }
    .gauge-wrapper { position: relative; width: 240px; height: 240px; margin: 0 auto 20px; }
    .gauge-wrapper svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .gauge-track { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 16; stroke-linecap: round; }
    .gauge-fill-ring { fill: none; stroke-width: 16; stroke-linecap: round; transition: stroke-dashoffset 2.2s cubic-bezier(0.4,0,0.2,1), stroke 0.6s ease; filter: drop-shadow(0 0 10px var(--accent-glow)); }
    .gauge-glow-ring { fill: none; stroke-width: 28; stroke-linecap: round; opacity: 0.1; transition: stroke-dashoffset 2.2s cubic-bezier(0.4,0,0.2,1), stroke 0.6s ease; }
    .gauge-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    .gauge-score-num { font-family: var(--font-display); font-size: 52px; font-weight: 700; line-height: 1; letter-spacing: -2px; }
    .gauge-score-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2.5px; margin-top: 4px; }
    .gauge-status-tag { display: inline-block; margin-top: 10px; padding: 4px 18px; border-radius: var(--radius-full); font-size: 13px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }

    .prediction-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 16px; position: relative; overflow: hidden; }
    .prediction-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: linear-gradient(180deg, var(--accent), var(--accent-secondary)); border-radius: 0 3px 3px 0; }
    .prediction-icon { width: 48px; height: 48px; border-radius: var(--radius-md); background: var(--accent-secondary-dim); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: var(--accent-secondary); flex-shrink: 0; }
    .prediction-body { flex: 1; min-width: 0; }
    .prediction-title { font-family: var(--font-display); font-size: 0.78rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .prediction-nums { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
    .prediction-current { font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; }
    .prediction-arrow { color: var(--text-muted); font-size: 0.9rem; }
    .prediction-next { font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; color: var(--success); }
    .prediction-delta { display: inline-flex; align-items: center; gap: 3px; padding: 3px 10px; border-radius: var(--radius-full); font-size: 0.78rem; font-weight: 700; color: var(--success); background: rgba(34,197,94,0.12); flex-shrink: 0; }
    .prediction-delta i { font-size: 0.6rem; }

    .ai-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 20px; position: relative; overflow: hidden; }
    .ai-card::after { content: ''; position: absolute; top: -40px; right: -40px; width: 100px; height: 100px; background: radial-gradient(circle, rgba(168,85,247,0.08) 0%, transparent 70%); border-radius: 50%; pointer-events: none; }
    .ai-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .ai-icon { width: 32px; height: 32px; border-radius: var(--radius-sm); background: rgba(168,85,247,0.12); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; color: var(--purple); }
    .ai-label { font-family: var(--font-display); font-size: 0.85rem; font-weight: 600; color: var(--purple); }
    .ai-typing { display: inline-flex; gap: 4px; align-items: center; margin-left: 8px; }
    .ai-typing span { width: 5px; height: 5px; border-radius: 50%; background: var(--purple); opacity: 0.4; animation: aiDot 1.2s ease-in-out infinite; }
    .ai-typing span:nth-child(2) { animation-delay: 0.15s; }
    .ai-typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes aiDot { 0%,60%,100%{opacity:0.2;transform:translateY(0)} 30%{opacity:1;transform:translateY(-3px)} }
    .ai-text { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.65; min-height: 48px; }

    .badges-section { margin-bottom: 20px; }
    .badges-section-title { font-family: var(--font-display); font-size: 0.82rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
    .badges-grid { display: flex; flex-wrap: wrap; gap: 10px; }
    .badge-item { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); background: rgba(255,255,255,0.02); font-size: 0.8rem; font-weight: 500; color: var(--text-secondary); transition: all var(--transition-base); opacity: 0; transform: translateY(10px) scale(0.95); cursor: default; }
    .badge-item.show { opacity: 1; transform: translateY(0) scale(1); }
    .badge-item:hover { border-color: var(--border-color); background: var(--accent-dim); transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .badge-icon { width: 28px; height: 28px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 0.85rem; flex-shrink: 0; }

    .chart-container { position: relative; height: 200px; width: 100%; }

    .dna-bar-track { height: 8px; border-radius: var(--radius-full); background: rgba(255,255,255,0.04); overflow: hidden; margin-top: 6px; margin-bottom: 16px; }
    .dna-bar-fill { height: 100%; border-radius: var(--radius-full); width: 0; transition: width 1.5s cubic-bezier(0.4,0,0.2,1); }
    .dna-label-row { display: flex; align-items: center; justify-content: space-between; }
    .dna-label { font-size: 0.8rem; font-weight: 500; color: var(--text-secondary); }
    .dna-value { font-family: var(--font-display); font-size: 0.78rem; font-weight: 600; }

    .risk-radar-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .radar-item { padding: 14px; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); background: rgba(255,255,255,0.015); text-align: center; transition: all var(--transition-base); }
    .radar-item:hover { border-color: var(--border-color); background: rgba(255,255,255,0.03); }
    .radar-item-label { font-size: 0.72rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .radar-item-value { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; }
    .radar-item-level { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; padding: 2px 8px; border-radius: var(--radius-full); display: inline-block; }

    .trust-section { text-align: center; padding: 8px 0; }
    .trust-stars { font-size: 1.6rem; margin-bottom: 8px; letter-spacing: 4px; }
    .trust-stars .star { color: rgba(255,255,255,0.1); transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1); display: inline-block; }
    .trust-stars .star.active { color: var(--accent-secondary); filter: drop-shadow(0 0 4px rgba(245,158,11,0.4)); }
    .trust-label { font-family: var(--font-display); font-size: 0.95rem; font-weight: 700; }
    .trust-sub { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }

    .rec-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: var(--radius-sm); transition: background var(--transition-fast); }
    .rec-item:hover { background: rgba(255,255,255,0.03); }
    .rec-check { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; flex-shrink: 0; }
    .rec-check.done { background: rgba(34,197,94,0.15); color: var(--success); border: 1px solid rgba(34,197,94,0.2); }
    .rec-check.pending { background: rgba(255,255,255,0.04); color: var(--text-muted); border: 1px solid var(--border-subtle); }
    .rec-text { font-size: 0.82rem; color: var(--text-secondary); flex: 1; }
    .rec-est { font-size: 0.7rem; font-weight: 600; color: var(--success); white-space: nowrap; }
    .rec-est-total { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-subtle); text-align: right; }
    .rec-est-total span { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: var(--success); }

    .export-section { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
    .export-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 22px; border-radius: var(--radius-full); font-size: 0.82rem; font-weight: 600; border: 1px solid var(--border-subtle); color: var(--text-secondary); background: var(--bg-card); transition: all var(--transition-base); flex: 1; min-width: 140px; justify-content: center; }
    .export-btn:hover { border-color: var(--border-color); color: var(--accent); background: var(--bg-card-hover); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
    .export-btn:active { transform: scale(0.97); }
    .export-btn i { font-size: 0.9rem; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .stat-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 16px; position: relative; overflow: hidden; transition: all var(--transition-base); }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; opacity: 0; transition: opacity var(--transition-base); }
    .stat-card:active { border-color: var(--border-color); box-shadow: var(--shadow-card); }
    .stat-card:active::before { opacity: 1; }
    .stat-card.accent::before { background: linear-gradient(90deg, var(--accent), transparent); }
    .stat-card.green::before { background: linear-gradient(90deg, var(--success), transparent); }
    .stat-card.amber::before { background: linear-gradient(90deg, var(--warning), transparent); }
    .stat-card.red::before { background: linear-gradient(90deg, var(--danger), transparent); }
    .stat-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .stat-card-label { font-size: 0.75rem; font-weight: 500; color: var(--text-muted); }
    .stat-card-icon { width: 30px; height: 30px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 0.78rem; }
    .stat-card.accent .stat-card-icon { background: var(--accent-dim); color: var(--accent); }
    .stat-card.green .stat-card-icon { background: rgba(34,197,94,0.12); color: var(--success); }
    .stat-card.amber .stat-card-icon { background: var(--accent-secondary-dim); color: var(--warning); }
    .stat-card.red .stat-card-icon { background: rgba(239,68,68,0.12); color: var(--danger); }
    .stat-card-value { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; line-height: 1; margin-bottom: 6px; }
    .stat-card.accent .stat-card-value { color: var(--accent); }
    .stat-card-change { display: inline-flex; align-items: center; gap: 3px; font-size: 0.7rem; font-weight: 600; padding: 2px 7px; border-radius: var(--radius-full); }
    .stat-card-change.up { color: var(--success); background: rgba(34,197,94,0.1); }
    .stat-card-change.down { color: var(--danger); background: rgba(239,68,68,0.1); }
    .stat-card-change i { font-size: 0.55rem; }
    .stat-card-sub { font-size: 0.7rem; color: var(--text-muted); margin-top: 5px; line-height: 1.4; }

    .bottom-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
    .card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); overflow: hidden; }
    .card-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-bottom: 1px solid var(--border-subtle); }
    .card-title { font-family: var(--font-display); font-size: 0.9rem; font-weight: 600; }
    .card-action { font-size: 0.78rem; font-weight: 500; color: var(--accent); display: flex; align-items: center; gap: 4px; transition: all var(--transition-fast); }
    .card-action:hover { gap: 6px; }
    .card-body { padding: 18px; }

    .breakdown-list { display: flex; flex-direction: column; gap: 18px; }
    .breakdown-item-label { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
    .breakdown-label-text { font-size: 0.8rem; font-weight: 500; color: var(--text-secondary); }
    .breakdown-label-value { font-family: var(--font-display); font-size: 0.78rem; font-weight: 600; }
    .breakdown-label-value span { color: var(--text-muted); font-weight: 400; font-size: 0.7rem; }
    .breakdown-bar { height: 6px; background: rgba(255,255,255,0.04); border-radius: var(--radius-full); overflow: hidden; }
    .breakdown-bar-fill { height: 100%; border-radius: var(--radius-full); transition: width 1.2s cubic-bezier(0.4,0,0.2,1); width: 0; }
    .breakdown-bar-fill.teal { background: linear-gradient(90deg, var(--accent), #5eead4); }
    .breakdown-bar-fill.green { background: linear-gradient(90deg, #16a34a, #4ade80); }
    .breakdown-bar-fill.amber { background: linear-gradient(90deg, #d97706, #fbbf24); }
    .breakdown-bar-fill.red { background: linear-gradient(90deg, #dc2626, #f87171); }
    .breakdown-bar-fill.purple { background: linear-gradient(90deg, #7c3aed, #a78bfa); }

    .risk-flags-mini { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border-subtle); }

  <script>
    /* ================================================================
       UTILITAS — fallback jika data.js tidak punya fungsi ini
    ================================================================ */
    function _sa(a) {
      if (typeof shortAddress === 'function') return shortAddress(a);
      if (!a || a.length < 10) return a || '—';
      return a.slice(0,6) + '...' + a.slice(-4);
    }
    function _fn(n) {
      if (typeof formatNumber === 'function') return formatNumber(n);
      return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }
    function _fe(v) {
      if (typeof formatETH === 'function') return formatETH(v);
      if (v >= 1) return v.toFixed(4) + ' ETH';
      if (v >= 0.001) return v.toFixed(6) + ' ETH';
      return v.toFixed(8) + ' ETH';
    }
    function _ft(ts) {
      if (typeof formatTimestamp === 'function') return formatTimestamp(ts);
      var d=new Date(ts), now=new Date(), diff=now-d;
      if (diff<60000) return 'Baru saja';
      if (diff<3600000) return Math.floor(diff/60000)+'m lalu';
      if (diff<86400000) return Math.floor(diff/3600000)+'j lalu';
      if (diff<604800000) return Math.floor(diff/86400000)+'h lalu';
      return d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();
    }

    function showToast(msg, type, dur) {
      type=type||'info'; dur=dur||3000;
      var c=document.getElementById('toastContainer');
      var t=document.createElement('div'); t.className='toast '+type;
      var ic={success:'fa-solid fa-circle-check',error:'fa-solid fa-circle-xmark',info:'fa-solid fa-circle-info'};
      t.innerHTML='<i class="'+(ic[type]||ic.info)+'"></i><span>'+msg+'</span>';
      c.appendChild(t);
      requestAnimationFrame(function(){requestAnimationFrame(function(){t.classList.add('show');});});
      setTimeout(function(){t.classList.remove('show');setTimeout(function(){t.remove();},300);},dur);
    }

    function copyAddress(addr) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(addr).then(function(){showToast('Alamat disalin','success',2000);}).catch(function(){_fc(addr);});
      } else {_fc(addr);}
    }
    function _fc(addr) {
      var ta=document.createElement('textarea'); ta.value=addr; ta.style.position='fixed'; ta.style.left='-9999px';
      document.body.appendChild(ta); ta.select();
      try{document.execCommand('copy');showToast('Alamat disalin','success',2000);}catch(e){showToast('Gagal menyalin','error');}
      document.body.removeChild(ta);
    }

    /* ================================================================
       AMBIL WALLET ADDRESS — coba session dulu, kalau gagal pakai demo
    ================================================================ */
    var walletAddress = null;
    var activeUser = null;
    var isDemoMode = false;

    (function() {
      try {
        var piUserStr = localStorage.getItem('whs_pi_user');
        var walletStr = localStorage.getItem('whs_wallet');
        var loginTimeStr = localStorage.getItem('whs_login_time');
        if (piUserStr && loginTimeStr) {
          var piUser = JSON.parse(piUserStr);
          var loginTime = parseInt(loginTimeStr, 10);
          if (piUser && piUser.username && !isNaN(loginTime) && (Date.now()-loginTime) <= 86400000) {
            walletAddress = walletStr || piUser.username;
            activeUser = { type:'pi_network', address:walletAddress, displayName:'@'+piUser.username };
            return;
          }
        }
      } catch(e) {}
      /* Fallback: demo mode */
      isDemoMode = true;
      walletAddress = 'G' + (function(){var r='',c='0123456789abcdef';for(var i=0;i<32;i++)r+=c[Math.floor(Math.random()*16)];return r;})();
      activeUser = { type:'demo', address:walletAddress, displayName:'@DemoPiUser' };
    })();

    /* ================================================================
       LOGOUT
    ================================================================ */
    function doLogout() {
      ['whs_wallet','whs_pi_user','whs_pi_token','whs_login_time','whs_auth_type','whs_pi_uid','whs_db_user_id','whs_incomplete_payment','pi_user','pi_auth'].forEach(function(k){try{localStorage.removeItem(k);}catch(e){}});
      ['whs_pi_user','currentWallet','walletData'].forEach(function(k){try{sessionStorage.removeItem(k);}catch(e){}});
      showToast('Berhasil keluar','info',2000);
      setTimeout(function(){window.location.href='index.html';},600);
    }
    document.getElementById('logoutBtn').addEventListener('click', doLogout);
    document.getElementById('menuLogoutBtn').addEventListener('click', function(){closeMenu();doLogout();});

    /* ================================================================

    ================================================================ */

      buildDashboard();
      showToast('Data diperbarui','success',2000);
    });

    /* ================================================================
       MENU
    ================================================================ */

    var menuPanel=document.getElementById('menuPanel');

    function closeMenu(){menuToggle.classList.remove('open');menuToggle.setAttribute('aria-expanded','false');menuBackdrop.classList.remove('visible');menuPanel.classList.remove('open');document.body.style.overflow='';}
    menuToggle.addEventListener('click',function(){menuPanel.classList.contains('open')?closeMenu():openMenu();});
    menuBackdrop.addEventListener('click',closeMenu);
    var mLinks=menuPanel.querySelectorAll('.menu-panel-nav a');
    for(var mi=0;mi<mLinks.length;mi++) mLinks[mi].addEventListener('click',function(){closeMenu();});

    /* ================================================================
       DATA FITUR BARU (statis)
    ================================================================ */
    var healthTimeline=[{month:'Jan',score:710},{month:'Feb',score:735},{month:'Mar',score:760},{month:'Apr',score:801},{month:'May',score:835},{month:'Jun',score:842}];
    var riskRadarData=[{label:'Spam',value:10,level:'HIGH',color:'#ef4444'},{label:'Scam',value:0,level:'NONE',color:'#22c55e'},{label:'Bot',value:5,level:'LOW',color:'#f59e0b'},{label:'Mixers',value:0,level:'NONE',color:'#22c55e'},{label:'Sybil',value:15,level:'HIGH',color:'#ef4444'}];

      else if(score>=350)p.push('Wallet ini memiliki tingkat kepercayaan <strong>sedang</strong>.');
      else p.push('Wallet ini memiliki tingkat kepercayaan <strong>rendah</strong>.');
      if(sr>=95)p.push('Success rate <strong>'+sr+'%</strong>, jauh di atas rata-rata.');
      else if(sr>=85)p.push('Success rate <strong>'+sr+'%</strong>, masih wajar.');

      if(tt>100)p.push('Dengan <strong>'+tt+' transaksi</strong>, wallet sangat aktif.');
      else if(tt>20)p.push('Tercatat <strong>'+tt+' transaksi</strong> dengan pola konsisten.');
      if(wd>=365)p.push('Usia wallet <strong>lebih dari 1 tahun</strong> menambah kepercayaan.');
      if(flags.length===0)p.push('Tidak ditemukan pola mencurigakan. <strong>Risiko rendah.</strong>');
      else p.push('Ditemukan <strong>'+flags.length+' flag risiko</strong> yang perlu diperbaiki.');

    }

        +'<div class="card" style="margin-top:16px;"><div class="card-header"><span class="card-title"><i class="fa-solid fa-lightbulb" style="color:var(--accent-secondary); margin-right:8px;"></i>Improve Your Score</span></div><div class="card-body">'+rcHtml+'</div></div>'

        +'<div class="export-section">'
        +'<button class="export-btn" onclick="exportPDF()"><i class="fa-solid fa-file-pdf"></i> Download PDF</button>'
        +'<button class="export-btn" onclick="shareResult()"><i class="fa-solid fa-share-nodes"></i> Share Result</button>'
        +'<button class="export-btn" onclick="copyShareLink()"><i class="fa-solid fa-link"></i> Copy Link</button>'
        +'</div>'

        +'<div class="card" style="margin-bottom:16px;"><div class="card-header"><span class="card-title"><i class="fa-solid fa-arrow-right-arrow-left" style="color:var(--accent); margin-right:8px;"></i>Recent Transactions</span><a href="history.html" class="card-action">Lihat semua <i class="fa-solid fa-arrow-right"></i></a></div><div class="card-body">'+txHtml+'</div></div>';

      /* === TRIGGER ANIMASI === */
      setTimeout(function(){animateGauge(score);},200);
      animateNumber(document.getElementById('gaugeScoreNum'),score,1800);
      setTimeout(function(){
        animateNumber(document.getElementById('animScore'),score,1400);
        animateNumber(document.getElementById('animTx'),txD.total||0,1200);
        var rEl=document.getElementById('animRate'),rT=Math.round(sr);
        animateNumber(rEl,rT,1200);
        setTimeout(function(){rEl.textContent=rT+'%';},1300);
      },400);
      setTimeout(function(){var tp=document.getElementById('aiTyping');if(tp)tp.style.display='none';typewriterEffect(document.getElementById('aiTextContent'),aiText,16);},800);
      document.querySelectorAll('#badgesGrid .badge-item').forEach(function(b,idx){setTimeout(function(){b.classList.add('show');},600+idx*150);});
      setTimeout(function(){document.querySelectorAll('.breakdown-bar-fill').forEach(function(bar){var w=bar.getAttribute('data-width');if(w)bar.style.width=w+'%';});},500);
      setTimeout(function(){document.querySelectorAll('.dna-bar-fill').forEach(function(bar){var w=bar.getAttribute('data-width');if(w)bar.style.width=w+'%';});},700);
      setTimeout(function(){document.querySelectorAll('.trust-stars .star.active').forEach(function(star,idx){star.style.opacity='0';star.style.transform='scale(0.5)';star.style.transition='all 0.4s cubic-bezier(0.34,1.56,0.64,1) '+(idx*0.1)+'s';setTimeout(function(){star.style.opacity='1';star.style.transform='scale(1)';},50);});},900);
      setTimeout(function(){renderTimelineChart(score);},300);
    }

    /* ================================================================
       JALANKAN SAAT HALAMAN SIAP
    ================================================================ */
    buildDashboard();
  </script>
