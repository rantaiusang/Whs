<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Dashboard — Wallet Health Score</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    :root {
      --bg-primary: #060a13;
      --bg-secondary: #0c1222;
      --bg-card: rgba(14, 22, 42, 0.65);
      --bg-card-hover: rgba(20, 32, 58, 0.75);
      --bg-input: rgba(6, 10, 19, 0.6);
      --border-color: rgba(45, 212, 191, 0.12);
      --border-color-hover: rgba(45, 212, 191, 0.3);
      --border-subtle: rgba(255, 255, 255, 0.06);
      --accent: #2dd4bf;
      --accent-dim: rgba(45, 212, 191, 0.12);
      --accent-glow: rgba(45, 212, 191, 0.2);
      --accent-secondary: #f59e0b;
      --accent-secondary-dim: rgba(245, 158, 11, 0.12);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #475569;
      --text-accent: #2dd4bf;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --purple: #a855f7;
      --pink: #ec4899;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-full: 9999px;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
      --shadow-glow: 0 0 40px rgba(45, 212, 191, 0.06);
      --topbar-height: 56px;
      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; transition: color var(--transition-fast); }
    button { font-family: var(--font-body); cursor: pointer; border: none; outline: none; background: none; }

    .bg-atmosphere {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .bg-atmosphere .orb {
      position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.18;
      animation: orbFloat 25s ease-in-out infinite;
      will-change: transform;
    }
    .bg-atmosphere .orb-1 {
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(45, 212, 191, 0.12) 0%, transparent 70%);
      top: -8%; left: -5%;
    }
    .bg-atmosphere .orb-2 {
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(245, 158, 11, 0.06) 0%, transparent 70%);
      bottom: -8%; right: -5%;
      animation-delay: -10s; animation-duration: 28s;
    }
    .bg-atmosphere .orb-3 {
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.05) 0%, transparent 70%);
      top: 40%; right: 10%;
      animation-delay: -18s; animation-duration: 32s;
    }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(15px, -20px) scale(1.03); }
      66% { transform: translate(-10px, 10px) scale(0.97); }
    }

    .topbar {
      height: var(--topbar-height);
      padding: 0 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border-subtle);
      background: rgba(6, 10, 19, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position: sticky; top: 0; z-index: 40;
    }
    .topbar-left {
      display: flex; align-items: center; gap: 12px;
      min-width: 0; flex: 1;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px;
      font-size: 0.82rem; font-weight: 600;
      color: var(--accent);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-full);
      transition: all var(--transition-fast);
      white-space: nowrap;
      flex-shrink: 0;
      background: var(--accent-dim);
    }
    .back-btn:hover {
      background: rgba(45, 212, 191, 0.18);
      border-color: var(--border-color-hover);
      box-shadow: 0 0 16px var(--accent-glow);
    }
    .back-btn:active { transform: scale(0.97); }
    .back-btn i { font-size: 0.8rem; }
    .topbar-title {
      font-family: var(--font-display);
      font-size: 1rem; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      min-width: 0;
    }
    .topbar-right {
      display: flex; align-items: center; gap: 4px;
      flex-shrink: 0;
    }
    .topbar-btn {
      width: 36px; height: 36px;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      transition: all var(--transition-fast);
      position: relative;
    }
    .topbar-btn:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.05);
    }
    .topbar-btn .notif-dot {
      position: absolute; top: 5px; right: 5px;
      width: 6px; height: 6px;
      background: var(--danger);
      border-radius: 50%;
      border: 1.5px solid var(--bg-primary);
    }
    .btn-logout {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 6px 10px;
      font-size: 0.78rem; font-weight: 500;
      color: var(--text-muted);
      border-radius: var(--radius-full);
      transition: all var(--transition-fast);
      white-space: nowrap;
    }
    .btn-logout:hover {
      color: var(--danger);
      background: rgba(239, 68, 68, 0.08);
    }
    .btn-logout .logout-text { display: none; }

    .page-content {
      padding: 20px 16px 32px;
      position: relative; z-index: 1;
    }
    .wallet-header {
      display: flex; flex-direction: column;
      gap: 14px;
      margin-bottom: 20px;
    }
    .wallet-header-top {
      display: flex; align-items: center; gap: 12px;
    }
    .wallet-avatar-lg {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #0d9488);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem; color: var(--bg-primary);
      font-family: var(--font-display); font-weight: 700;
      box-shadow: 0 0 20px var(--accent-glow);
      flex-shrink: 0;
    }
    .wallet-header-info { flex: 1; min-width: 0; }
    .wallet-header-info h2 {
      font-family: var(--font-display);
      font-size: 0.92rem; font-weight: 600;
      letter-spacing: 0.02em;
      word-break: break-all;
      line-height: 1.35;
    }
    .wallet-header-meta {
      display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
      margin-top: 4px; font-size: 0.75rem; color: var(--text-muted);
    }
    .wallet-header-meta span {
      display: inline-flex; align-items: center; gap: 4px;
    }
    .wallet-header-meta i { font-size: 0.7rem; }
    .wallet-header-bottom {
      display: flex; align-items: center; gap: 10px;
      flex-wrap: wrap;
    }
    .copy-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 12px;
      font-size: 0.75rem; font-weight: 500;
      color: var(--text-muted);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-full);
      transition: all var(--transition-fast);
    }
    .copy-btn:hover {
      color: var(--accent);
      border-color: var(--border-color);
      background: var(--accent-dim);
    }
    .sim-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px;
      font-size: 0.7rem; font-weight: 500;
      color: var(--text-muted);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-full);
    }
    .sim-badge i { font-size: 0.65rem; }
    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius-full);
      font-size: 0.78rem; font-weight: 600;
      letter-spacing: 0.02em;
    }
    .status-badge i { font-size: 0.7rem; }

    /* ============ GAUGE SECTION ============ */
    .gauge-section {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      padding: 32px 24px 28px;
      margin-bottom: 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .gauge-section::before {
      content: '';
      position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle at 50% 80%, var(--accent-dim) 0%, transparent 50%);
      pointer-events: none;
      opacity: 0.5;
    }
    .gauge-wrapper {
      position: relative;
      width: 240px; height: 240px;
      margin: 0 auto 20px;
    }
    .gauge-wrapper svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .gauge-track {
      fill: none;
      stroke: rgba(255,255,255,0.05);
      stroke-width: 16;
      stroke-linecap: round;
    }
    .gauge-fill-ring {
      fill: none;
      stroke-width: 16;
      stroke-linecap: round;
      transition: stroke-dashoffset 2.2s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.6s ease;
      filter: drop-shadow(0 0 10px var(--accent-glow));
    }
    .gauge-glow-ring {
      fill: none;
      stroke-width: 28;
      stroke-linecap: round;
      opacity: 0.1;
      transition: stroke-dashoffset 2.2s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.6s ease;
    }
    .gauge-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .gauge-score-num {
      font-family: var(--font-display);
      font-size: 52px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -2px;
    }
    .gauge-score-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 2.5px;
      margin-top: 4px;
    }
    .gauge-status-tag {
      display: inline-block;
      margin-top: 10px;
      padding: 4px 18px;
      border-radius: var(--radius-full);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ============ PREDICTION CARD ============ */
    .prediction-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }
    .prediction-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--accent), var(--accent-secondary));
      border-radius: 0 3px 3px 0;
    }
    .prediction-icon {
      width: 48px; height: 48px;
      border-radius: var(--radius-md);
      background: var(--accent-secondary-dim);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      color: var(--accent-secondary);
      flex-shrink: 0;
    }
    .prediction-body { flex: 1; min-width: 0; }
    .prediction-title {
      font-family: var(--font-display);
      font-size: 0.78rem; font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .prediction-nums {
      display: flex; align-items: baseline; gap: 12px;
      flex-wrap: wrap;
    }
    .prediction-current {
      font-family: var(--font-display);
      font-size: 1.3rem; font-weight: 700;
    }
    .prediction-arrow {
      color: var(--text-muted); font-size: 0.9rem;
    }
    .prediction-next {
      font-family: var(--font-display);
      font-size: 1.3rem; font-weight: 700;
      color: var(--success);
    }
    .prediction-delta {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px 10px;
      border-radius: var(--radius-full);
      font-size: 0.78rem; font-weight: 700;
      color: var(--success);
      background: rgba(34,197,94,0.12);
    }
    .prediction-delta i { font-size: 0.6rem; }

    /* ============ AI INSIGHT ============ */
    .ai-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    .ai-card::after {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 100px; height: 100px;
      background: radial-gradient(circle, rgba(168,85,247,0.08) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .ai-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
    }
    .ai-icon {
      width: 32px; height: 32px;
      border-radius: var(--radius-sm);
      background: rgba(168,85,247,0.12);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      color: var(--purple);
    }
    .ai-label {
      font-family: var(--font-display);
      font-size: 0.85rem; font-weight: 600;
      color: var(--purple);
    }
    .ai-typing {
      display: inline-flex; gap: 4px; align-items: center;
      margin-left: 8px;
    }
    .ai-typing span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--purple);
      opacity: 0.4;
      animation: aiDot 1.2s ease-in-out infinite;
    }
    .ai-typing span:nth-child(2) { animation-delay: 0.15s; }
    .ai-typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes aiDot {
      0%, 60%, 100% { opacity: 0.2; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-3px); }
    }
    .ai-text {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.65;
      min-height: 48px;
    }

    /* ============ BADGES ============ */
    .badges-section {
      margin-bottom: 20px;
    }
    .badges-section-title {
      font-family: var(--font-display);
      font-size: 0.82rem; font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }
    .badges-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .badge-item {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
      background: rgba(255,255,255,0.02);
      font-size: 0.8rem; font-weight: 500;
      color: var(--text-secondary);
      transition: all var(--transition-base);
      opacity: 0; transform: translateY(10px) scale(0.95);
      cursor: default;
    }
    .badge-item.show {
      opacity: 1; transform: translateY(0) scale(1);
    }
    .badge-item:hover {
      border-color: var(--border-color);
      background: var(--accent-dim);
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .badge-icon {
      width: 28px; height: 28px;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    /* ============ TIMELINE CHART ============ */
    .timeline-section {
      margin-bottom: 20px;
    }
    .chart-container {
      position: relative;
      height: 200px;
      width: 100%;
    }

    /* ============ WALLET DNA ============ */
    .dna-bar-track {
      height: 8px;
      border-radius: var(--radius-full);
      background: rgba(255,255,255,0.04);
      overflow: hidden;
      margin-top: 6px;
      margin-bottom: 16px;
    }
    .dna-bar-fill {
      height: 100%;
      border-radius: var(--radius-full);
      width: 0;
      transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .dna-label-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .dna-label {
      font-size: 0.8rem; font-weight: 500; color: var(--text-secondary);
    }
    .dna-value {
      font-family: var(--font-display);
      font-size: 0.78rem; font-weight: 600;
    }

    /* ============ RISK RADAR ============ */
    .risk-radar-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .radar-item {
      padding: 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
      background: rgba(255,255,255,0.015);
      text-align: center;
      transition: all var(--transition-base);
    }
    .radar-item:hover {
      border-color: var(--border-color);
      background: rgba(255,255,255,0.03);
    }
    .radar-item-label {
      font-size: 0.72rem; font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .radar-item-value {
      font-family: var(--font-display);
      font-size: 1.3rem; font-weight: 700;
    }
    .radar-item-level {
      font-size: 0.65rem; font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 4px;
      padding: 2px 8px;
      border-radius: var(--radius-full);
      display: inline-block;
    }

    /* ============ PI TRUST LEVEL ============ */
    .trust-section {
      text-align: center;
      padding: 8px 0;
    }
    .trust-stars {
      font-size: 1.6rem;
      margin-bottom: 8px;
      letter-spacing: 4px;
    }
    .trust-stars .star { color: rgba(255,255,255,0.1); transition: color 0.3s ease; }
    .trust-stars .star.active { color: var(--accent-secondary); filter: drop-shadow(0 0 4px rgba(245,158,11,0.4)); }
    .trust-label {
      font-family: var(--font-display);
      font-size: 0.95rem; font-weight: 700;
    }
    .trust-sub {
      font-size: 0.72rem; color: var(--text-muted); margin-top: 2px;
    }

    /* ============ RECOMMENDATIONS ============ */
    .rec-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      transition: background var(--transition-fast);
    }
    .rec-item:hover { background: rgba(255,255,255,0.03); }
    .rec-check {
      width: 22px; height: 22px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; flex-shrink: 0;
    }
    .rec-check.done {
      background: rgba(34,197,94,0.15);
      color: var(--success);
      border: 1px solid rgba(34,197,94,0.2);
    }
    .rec-check.pending {
      background: rgba(255,255,255,0.04);
      color: var(--text-muted);
      border: 1px solid var(--border-subtle);
    }
    .rec-text {
      font-size: 0.82rem; color: var(--text-secondary);
      flex: 1;
    }
    .rec-est {
      font-size: 0.7rem; font-weight: 600; color: var(--success);
      white-space: nowrap;
    }
    .rec-est-total {
      margin-top: 12px; padding-top: 12px;
      border-top: 1px solid var(--border-subtle);
      text-align: right;
    }
    .rec-est-total span {
      font-family: var(--font-display);
      font-size: 1.1rem; font-weight: 700;
      color: var(--success);
    }

    /* ============ EXPORT BUTTONS ============ */
    .export-section {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .export-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 22px;
      border-radius: var(--radius-full);
      font-size: 0.82rem; font-weight: 600;
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      background: var(--bg-card);
      transition: all var(--transition-base);
      flex: 1; min-width: 140px;
      justify-content: center;
    }
    .export-btn:hover {
      border-color: var(--border-color);
      color: var(--accent);
      background: var(--bg-card-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .export-btn:active { transform: scale(0.97); }
    .export-btn i { font-size: 0.9rem; }

    /* ============ STATS GRID (refined) ============ */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 16px;
      position: relative; overflow: hidden;
      transition: all var(--transition-base);
    }

      height: 2px;
      opacity: 0; transition: opacity var(--transition-base);
    }
    .stat-card:active { border-color: var(--border-color); box-shadow: var(--shadow-card); }
    .stat-card:active::before { opacity: 1; }
    .stat-card.accent::before { background: linear-gradient(90deg, var(--accent), transparent); }
    .stat-card.green::before { background: linear-gradient(90deg, var(--success), transparent); }
    .stat-card.amber::before { background: linear-gradient(90deg, var(--warning), transparent); }
    .stat-card.red::before { background: linear-gradient(90deg, var(--danger), transparent); }
    .stat-card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .stat-card-label {
      font-size: 0.75rem; font-weight: 500;
      color: var(--text-muted);
    }
    .stat-card-icon {
      width: 30px; height: 30px;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem;

    .stat-card.accent .stat-card-icon { background: var(--accent-dim); color: var(--accent); }
    .stat-card.green .stat-card-icon { background: rgba(34,197,94,0.12); color: var(--success); }
    .stat-card.amber .stat-card-icon { background: var(--accent-secondary-dim); color: var(--warning); }
    .stat-card.red .stat-card-icon { background: rgba(239,68,68,0.12); color: var(--danger); }
    .stat-card-value {
      font-family: var(--font-display);
      font-size: 1.5rem; font-weight: 700;
      line-height: 1; margin-bottom: 6px;
    }
    .stat-card.accent .stat-card-value { color: var(--accent); }
    .stat-card-change {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 0.7rem; font-weight: 600;
      padding: 2px 7px; border-radius: var(--radius-full);

    .stat-card-change.up { color: var(--success); background: rgba(34, 197, 94, 0.1); }
    .stat-card-change.down { color: var(--danger); background: rgba(239, 68, 68, 0.1); }
    .stat-card-change i { font-size: 0.55rem; }
    .stat-card-sub {
      font-size: 0.7rem; color: var(--text-muted);

    /* ============ BOTTOM GRID ============ */
    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

      border-bottom: 1px solid var(--border-subtle);

      font-size: 0.9rem; font-weight: 600;
    }
    .card-action {

      transition: all var(--transition-fast);

    .card-body { padding: 18px; }

    .breakdown-list { display: flex; flex-direction: column; gap: 18px; }

      margin-bottom: 7px;
    }
    .breakdown-label-text {
      font-size: 0.8rem; font-weight: 500;

    .breakdown-bar-fill.amber { background: linear-gradient(90deg, #d97706, #fbbf24); }
    .breakdown-bar-fill.red { background: linear-gradient(90deg, #dc2626, #f87171); }

    .risk-flags-mini {
      margin-top: 20px; padding-top: 16px;
      border-top: 1px solid var(--border-subtle);
    }
    .risk-flags-mini-title {
      font-size: 0.75rem; font-weight: 600;
      color: var(--text-muted); margin-bottom: 10px;
      text-transform: uppercase; letter-spacing: 0.06em;
      display: flex; align-items: center; gap: 6px;
    }
    .risk-flags-mini-title i { font-size: 0.7rem; }
    .risk-flag-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 10px;
      background: rgba(239, 68, 68, 0.04);
      border: 1px solid rgba(239, 68, 68, 0.1);

      margin-bottom: 8px;

      color: var(--text-secondary);
      line-height: 1.45;

    .risk-flag-item i {

    }
    .risk-flag-severity {
      display: inline-block; padding: 1px 6px;
      font-size: 0.6rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
      border-radius: 4px; margin-left: 6px; vertical-align: middle;
    }
    .risk-flag-severity.critical { background: rgba(239,68,68,0.2); color: #f87171; }
    .risk-flag-severity.high { background: rgba(249,115,22,0.2); color: #fb923c; }
    .risk-flag-severity.medium { background: rgba(245,158,11,0.2); color: #fbbf24; }
    .risk-flag-severity.low { background: rgba(59,130,246,0.2); color: #60a5fa; }
    .no-flags {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 14px;
      background: rgba(34, 197, 94, 0.05);
      border: 1px solid rgba(34, 197, 94, 0.12);
      border-radius: var(--radius-sm);
      font-size: 0.8rem; color: var(--success);
    }
    .no-flags i { font-size: 0.85rem; }

    .tx-list { display: flex; flex-direction: column; gap: 2px; }
    .tx-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }
    .tx-item:last-child { border-bottom: none; }
    .tx-type-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 34px; height: 34px;
      border-radius: var(--radius-sm);
      font-size: 0.75rem; flex-shrink: 0;
    }
    .tx-type-badge.send { background: rgba(239,68,68,0.1); color: #f87171; }
    .tx-type-badge.receive { background: rgba(34,197,94,0.1); color: #4ade80; }
    .tx-type-badge.swap { background: rgba(168,85,247,0.1); color: #c084fc; }
    .tx-type-badge.approve { background: rgba(59,130,246,0.1); color: #60a5fa; }
    .tx-type-badge.stake { background: var(--accent-dim); color: var(--accent); }
    .tx-type-badge.unstake { background: var(--accent-secondary-dim); color: var(--accent-secondary); }
    .tx-type-badge.bridge { background: rgba(236,72,153,0.1); color: #f472b6; }
    .tx-type-badge.mint { background: rgba(34,197,94,0.1); color: #4ade80; }
    .tx-type-badge.burn { background: rgba(239,68,68,0.1); color: #f87171; }
    .tx-info { flex: 1; min-width: 0; }
    .tx-type-label { font-size: 0.8rem; font-weight: 600; text-transform: capitalize; }
    .tx-addr {
      font-family: 'Space Grotesk', monospace;
      font-size: 0.7rem; color: var(--text-muted); margin-top: 1px;
    }
    .tx-right { text-align: right; flex-shrink: 0; }
    .tx-amount {
      font-family: var(--font-display);
      font-weight: 600; font-size: 0.82rem; display: block;
    }
    .tx-amount.negative { color: #f87171; }
    .tx-amount.positive { color: #4ade80; }
    .tx-status-time {
      display: flex; align-items: center; gap: 6px;
      justify-content: flex-end; margin-top: 2px;
    }
    .tx-status {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 0.68rem; font-weight: 500;
    }
    .tx-status.success { color: var(--success); }
    .tx-status.failed { color: var(--danger); }
    .tx-status i { font-size: 0.55rem; }
    .tx-time { font-size: 0.68rem; color: var(--text-muted); white-space: nowrap; }
    .empty-state {
      text-align: center; padding: 36px 20px; color: var(--text-muted);
    }
    .empty-state i { font-size: 1.8rem; margin-bottom: 10px; opacity: 0.4; display: block; }
    .empty-state p { font-size: 0.85rem; }

    .toast-container {
      position: fixed; top: 68px; left: 16px; right: 16px;
      z-index: 200; display: flex; flex-direction: column; gap: 8px;
      pointer-events: none;
    }
    .toast {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);

    .toast.success { border-left: 3px solid var(--success); }
    .toast.success i { color: var(--success); }
    .toast.error { border-left: 3px solid var(--danger); }
    .toast.error i { color: var(--danger); }
    .toast.info { border-left: 3px solid var(--info); }
    .toast.info i { color: var(--info); }

    .guard-screen {
      display: none;
      position: fixed; inset: 0; z-index: 500;
      background: var(--bg-primary);
      flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; text-align: center; padding: 24px;
    }
    .guard-screen.active { display: flex; }
    .guard-screen i { font-size: 2.2rem; color: var(--text-muted); opacity: 0.4; }
    .guard-screen h2 { font-family: var(--font-display); font-size: 1.3rem; font-weight: 600; }
    .guard-screen p { font-size: 0.9rem; color: var(--text-muted); max-width: 320px; line-height: 1.5; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      font-family: var(--font-body); font-weight: 600; font-size: 0.88rem;
      padding: 12px 28px; border-radius: var(--radius-full);
      transition: all var(--transition-base);
    }
    .btn-primary {
      color: var(--bg-primary);
      background: linear-gradient(135deg, var(--accent), #0d9488);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 30px var(--accent-glow), 0 4px 16px rgba(45, 212, 191, 0.2);
    }
    .guard-divider {
      display: flex; align-items: center; gap: 12px;
      color: var(--text-muted); font-size: 0.75rem; width: 100%; max-width: 280px;
    }
    .guard-divider::before, .guard-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border-subtle);
    }

    /* ============ SECTION DIVIDER ============ */
    .section-divider {
      height: 1px;
      margin: 8px 0 20px;
      background: linear-gradient(90deg, transparent, var(--border-color), transparent);
      opacity: 0.4;
    }

    @media (min-width: 640px) {
      .page-content { padding: 24px 24px 40px; }
      .stats-grid { gap: 16px; }
      .stat-card { padding: 20px; }
      .stat-card-value { font-size: 1.7rem; }
      .wallet-header-info h2 { font-size: 1.05rem; word-break: normal; }
      .bottom-grid { grid-template-columns: 1fr 1fr; gap: 20px; }
      .card-body { padding: 22px; }
      .btn-logout .logout-text { display: inline; }
      .topbar { padding: 0 24px; }
      .gauge-wrapper { width: 280px; height: 280px; }
      .gauge-score-num { font-size: 60px; }
      .risk-radar-grid { grid-template-columns: repeat(3, 1fr); }
      .export-btn { flex: none; min-width: auto; }
    }

    @media (min-width: 900px) {
      .topbar-title { font-size: 1.15rem; }
      .stat-card-value { font-size: 1.9rem; }
      .stats-grid { grid-template-columns: repeat(4, 1fr); }
    }

    .menu-toggle {
      width: 36px; height: 36px;
      border-radius: var(--radius-sm);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      color: var(--text-muted); font-size: 0;
      transition: all var(--transition-fast);
    }
    .menu-toggle:hover { color: var(--text-primary); background: rgba(255, 255, 255, 0.05); }
    .menu-toggle span {
      display: block; width: 18px; height: 2px;
      background: currentColor; border-radius: 2px;
      transition: all 0.35s cubic-bezier(0.77, 0, 0.175, 1);
      transform-origin: center;
    }
    .menu-toggle.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); background: var(--accent); }
    .menu-toggle.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .menu-toggle.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); background: var(--accent); }

    .menu-backdrop {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0);
      backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px);
      z-index: 150; pointer-events: none;
      transition: all 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .menu-backdrop.visible {
      background: rgba(6, 10, 19, 0.85);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      pointer-events: all;
    }

    .menu-panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 280px; max-width: 80vw;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border-subtle);

      display: flex; flex-direction: column; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .menu-panel.open { transform: translateX(0); }

    .menu-panel-header {
      padding: 20px 18px 16px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .menu-panel-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #0d9488);

      font-size: 0.85rem; font-weight: 700; color: var(--bg-primary);
      font-family: var(--font-display); flex-shrink: 0;
    }
    .menu-panel-user { flex: 1; min-width: 0; }
    .menu-panel-username {
      font-family: var(--font-display);
      font-size: 0.9rem; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .menu-panel-wallet {
      font-family: 'Space Grotesk', monospace;
      font-size: 0.7rem; color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px;
    }

    .menu-panel-nav {
      list-style: none; padding: 12px 10px;
      flex: 1; display: flex; flex-direction: column; gap: 2px;
    }
    .menu-panel-nav li { opacity: 0; transform: translateX(20px); }
    .menu-panel.open .menu-panel-nav li { opacity: 1; transform: translateX(0); }
    .menu-panel.open .menu-panel-nav li:nth-child(1) { transition: opacity 0.3s ease 0.1s, transform 0.3s cubic-bezier(0.4,0,0.2,1) 0.1s; }
    .menu-panel.open .menu-panel-nav li:nth-child(2) { transition: opacity 0.3s ease 0.14s, transform 0.3s cubic-bezier(0.4,0,0.2,1) 0.14s; }
    .menu-panel.open .menu-panel-nav li:nth-child(3) { transition: opacity 0.3s ease 0.18s, transform 0.3s cubic-bezier(0.4,0,0.2,1) 0.18s; }
    .menu-panel.open .menu-panel-nav li:nth-child(4) { transition: opacity 0.3s ease 0.22s, transform 0.3s cubic-bezier(0.4,0,0.2,1) 0.22s; }
    .menu-panel.open .menu-panel-nav li:nth-child(5) { transition: opacity 0.3s ease 0.26s, transform 0.3s cubic-bezier(0.4,0,0.2,1) 0.26s; }
    .menu-panel.open .menu-panel-nav li:nth-child(6) { transition: opacity 0.3s ease 0.3s, transform 0.3s cubic-bezier(0.4,0,0.2,1) 0.3s; }

    .menu-panel-nav a {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; font-size: 0.88rem; font-weight: 500;
      color: var(--text-secondary); border-radius: var(--radius-sm);
      transition: all 0.2s ease; position: relative; overflow: hidden;
    }
    .menu-panel-nav a .m-icon { width: 22px; text-align: center; font-size: 0.9rem; flex-shrink: 0; transition: color 0.2s ease, transform 0.2s ease; }
    .menu-panel-nav a .m-text { flex: 1; }
    .menu-panel-nav a .m-arrow { font-size: 0.7rem; color: var(--text-muted); opacity: 0; transform: translateX(-6px); transition: all 0.2s ease; }
    .menu-panel-nav a:hover, .menu-panel-nav a.active { color: var(--text-primary); background: rgba(255, 255, 255, 0.04); }
    .menu-panel-nav a:hover .m-icon, .menu-panel-nav a.active .m-icon { color: var(--accent); transform: scale(1.1); }
    .menu-panel-nav a:hover .m-arrow, .menu-panel-nav a.active .m-arrow { opacity: 1; transform: translateX(0); color: var(--accent); }
    .menu-panel-nav a.active::before {
      content: ''; position: absolute; left: 0; top: 50%;
      transform: translateY(-50%) scaleY(0);
      width: 3px; height: 55%; background: var(--accent);
      border-radius: 0 3px 3px 0;
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .menu-panel-nav a.active::before { transform: translateY(-50%) scaleY(1); }

    .menu-panel-divider {
      height: 1px; margin: 4px 18px 8px;
      background: linear-gradient(90deg, transparent, var(--border-color), transparent);
      opacity: 0; transform: scaleX(0);
      transition: opacity 0.3s ease 0.32s, transform 0.35s cubic-bezier(0.4,0,0.2,1) 0.32s;

    .menu-panel.open .menu-panel-divider { opacity: 1; transform: scaleX(1); }

    .menu-panel-footer {
      padding: 12px 10px 20px;

      font-size: 0.85rem; font-weight: 500;

    }
    .menu-panel-footer .btn-logout-panel:hover { color: var(--danger); background: rgba(239, 68, 68, 0.08); }

    .menu-panel-footer-text { text-align: center; font-size: 0.68rem; color: var(--text-muted); margin-top: 14px; opacity: 0.6; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <div class="bg-atmosphere" aria-hidden="true">

    <div class="menu-backdrop" id="menuBackdrop"></div>

    <nav class="menu-panel" id="menuPanel" aria-label="Menu navigasi">

    function showToast(message, type, duration) {
      type = type || 'info';
      duration = duration || 3000;
      var container = document.getElementById('toastContainer');
      var toast = document.createElement('div');
      toast.className = 'toast ' + type;
      var icons = { success:'fa-solid fa-circle-check', error:'fa-solid fa-circle-xmark', info:'fa-solid fa-circle-info' };
      toast.innerHTML = '<i class="' + (icons[type]||icons.info) + '"></i><span>' + message + '</span>';
      container.appendChild(toast);
      requestAnimationFrame(function(){ requestAnimationFrame(function(){ toast.classList.add('show'); }); });
      setTimeout(function(){ toast.classList.remove('show'); setTimeout(function(){ toast.remove(); }, 300); }, duration);
    }

    function shortAddress(addr) {
      if (!addr || addr.length < 12) return addr || '—';
      return addr.slice(0, 6) + '...' + addr.slice(-4);
    }
    function formatETH(val) {
      if (val === undefined || val === null) return '0';
      if (val >= 1) return val.toFixed(3);
      if (val >= 0.001) return val.toFixed(5);
      return val.toFixed(8);
    }
    function formatNumber(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
    function formatTimestamp(ts) {
      var d = new Date(ts); var now = new Date(); var diff = now - d;
      if (diff < 60000) return 'Baru saja';
      if (diff < 3600000) return Math.floor(diff/60000) + 'm lalu';
      if (diff < 86400000) return Math.floor(diff/3600000) + 'j lalu';
      if (diff < 604800000) return Math.floor(diff/86400000) + 'h lalu';
      return d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();
    }

        navigator.clipboard.writeText(addr).then(function(){ showToast('Alamat disalin','success',2000); }).catch(function(){ showToast('Gagal menyalin','error'); });
      } else {
        var ta = document.createElement('textarea'); ta.value = addr; ta.style.position='fixed'; ta.style.left='-9999px'; document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); showToast('Alamat disalin','success',2000); } catch(e){ showToast('Gagal menyalin','error'); }
        document.body.removeChild(ta);
      }
    }

    /* ========================================

    function generateAIInsight(data) {
      var score = data.creditScore || 0;
      var txData = data.transactions || {};
      var flags = data.riskFlags || [];
      var successRate = txData.successRate || 0;
      var totalTx = txData.total || 0;
      var wDays = data.walletAgeDays || 0;

      var parts = [];
      if (score >= 800) parts.push('Wallet ini memiliki tingkat kepercayaan <strong>sangat tinggi</strong>.');
      else if (score >= 600) parts.push('Wallet ini memiliki tingkat kepercayaan <strong>baik</strong>.');
      else parts.push('Wallet ini memiliki tingkat kepercayaan <strong>rendah</strong> dan perlu perhatian.');

      if (successRate >= 95) parts.push('Tingkat keberhasilan transaksi mencapai <strong>' + successRate + '%</strong>, jauh di atas rata-rata jaringan.');
      else if (successRate >= 85) parts.push('Tingkat keberhasilan transaksi <strong>' + successRate + '%</strong>, masih dalam batas wajar.');
      else parts.push('Tingkat keberhasilan transaksi hanya <strong>' + successRate + '%</strong>, perlu ditingkatkan.');

      if (totalTx > 50) parts.push('Dengan <strong>' + totalTx + ' transaksi</strong> tercatat, aktivitas wallet tergolong sangat aktif.');
      else if (totalTx > 10) parts.push('Tercatat <strong>' + totalTx + ' transaksi</strong> dengan pola yang konsisten.');

      if (wDays >= 365) parts.push('Usia wallet <strong>lebih dari 1 tahun</strong> menambah faktor kepercayaan signifikan.');

      if (flags.length === 0) parts.push('Tidak ditemukan pola spam, scam, atau aktivitas mencurigakan. <strong>Risiko rendah.</strong>');
      else if (flags.length <= 2) parts.push('Ditemukan <strong>' + flags.length + ' flag risiko minor</strong> yang masih dapat diperbaiki.');
      else parts.push('Terdapat <strong>' + flags.length + ' flag risiko</strong> yang perlu segera ditangani.');

      return parts.join(' ');
    }

    function getScoreColor(score) {
      if (score >= 800) return '#22c55e';

      return '#ef4444';

    function getScoreStatus(score) {
      if (score >= 800) return { text:'Excellent', bg:'rgba(34,197,94,0.15)', color:'#22c55e' };
      if (score >= 600) return { text:'Good', bg:'rgba(245,158,11,0.15)', color:'#f59e0b' };
      return { text:'Poor', bg:'rgba(239,68,68,0.15)', color:'#ef4444' };
    }
    function getPrediction(score) {
      var delta = Math.round(score * 0.018 + Math.random() * 5);
      return { current: score, next: score + delta, delta: delta };
    }
    function getTrustLevel(score) {
      if (score >= 900) return 5;
      if (score >= 800) return 4;
      if (score >= 650) return 3;
      if (score >= 500) return 2;
      return 1;
    }

    /* ========================================
       ANIMATE NUMBER
    ======================================== */
    function animateNumber(el, target, duration, suffix) {
      suffix = suffix || '';
      var start = 0;
      var startTime = null;
      function step(ts) {
        if (!startTime) startTime = ts;
        var progress = Math.min((ts - startTime) / duration, 1);
        var ease = 1 - Math.pow(1 - progress, 3);
        var current = Math.round(start + (target - start) * ease);
        el.textContent = formatNumber(current) + suffix;
        if (progress < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    /* ========================================
       ANIMATE GAUGE
    ======================================== */
    function animateGauge(score) {
      var fillRing = document.getElementById('gaugeFill');
      var glowRing = document.getElementById('gaugeGlow');
      if (!fillRing || !glowRing) return;

      var radius = 100;
      var circumference = 2 * Math.PI * radius;
      var pct = Math.min(score / 1000, 1);
      var offset = circumference * (1 - pct);

      fillRing.style.strokeDasharray = circumference;
      fillRing.style.strokeDashoffset = circumference;
      glowRing.style.strokeDasharray = circumference;
      glowRing.style.strokeDashoffset = circumference;

      var color = getScoreColor(score);
      fillRing.style.stroke = color;
      glowRing.style.stroke = color;

      requestAnimationFrame(function(){
        requestAnimationFrame(function(){
          fillRing.style.strokeDashoffset = offset;
          glowRing.style.strokeDashoffset = offset;
        });
      });
    }

    function typewriterEffect(el, html, speed) {
      speed = speed || 18;
      el.innerHTML = '';
      var temp = document.createElement('div');
      temp.innerHTML = html;
      var text = temp.textContent;
      var idx = 0;
      function type() {
        if (idx < text.length) {
          el.textContent += text.charAt(idx);
          idx++;
          setTimeout(type, speed + Math.random() * 12);
        }
      }
      type();
    }

      /* === TIMELINE === */
      var timelineHtml = '<div class="card timeline-section">'
        + '<div class="card-header"><span class="card-title"><i class="fa-solid fa-chart-line" style="color:var(--accent); margin-right:8px;"></i>Health Timeline</span></div>'
        + '<div class="card-body"><div class="chart-container"><canvas id="timelineCanvas"></canvas></div></div>'
        + '</div>';

      /* === WALLET DNA === */
      var dnaHtml = '';
      walletDNA.forEach(function(d) {
        dnaHtml += '<div>'
          + '<div class="dna-label-row"><span class="dna-label">'+d.label+'</span><span class="dna-value" style="color:'+d.color+';">'+d.value+'%</span></div>'
          + '<div class="dna-bar-track"><div class="dna-bar-fill" data-width="'+d.value+'" style="background:'+d.color+';"></div></div>'
          + '</div>';
      });

      /* === RISK RADAR === */
      var radarHtml = '';
      riskRadarData.forEach(function(r) {
        var lvlColor = r.value === 0 ? '#22c55e' : (r.value <= 5 ? '#f59e0b' : '#ef4444');
        var lvlBg = r.value === 0 ? 'rgba(34,197,94,0.12)' : (r.value <= 5 ? 'rgba(245,158,11,0.12)' : 'rgba(239,68,68,0.12)');
        radarHtml += '<div class="radar-item">'
          + '<div class="radar-item-label">'+r.label+'</div>'
          + '<div class="radar-item-value" style="color:'+lvlColor+';">'+r.value+'%</div>'
          + '<div class="radar-item-level" style="color:'+lvlColor+'; background:'+lvlBg+';">'+r.level+'</div>'
          + '</div>';
      });

      /* === PI TRUST === */
      var starsHtml = '';
      for (var s=1; s<=5; s++) {
        starsHtml += '<i class="fa-solid fa-star star '+(s<=trustLevel?'active':'')+'"></i>';
      }
      var trustLabels = ['Very Poor','Poor','Average','Good','Excellent','Outstanding'];
      var trustLabel = trustLabels[trustLevel] || 'N/A';

      /* === RECOMMENDATIONS === */
      var recsHtml = '';
      var totalEst = 0;
      recommendations.forEach(function(r) {
        totalEst += r.est;
        recsHtml += '<div class="rec-item">'
          + '<div class="rec-check '+(r.done?'done':'pending')+'"><i class="fa-solid '+(r.done?'fa-check':'fa-circle')+'"></i></div>'
          + '<span class="rec-text">'+r.text+'</span>'
          + (r.est > 0 ? '<span class="rec-est">+'+r.est+'</span>' : '')
          + '</div>';
      });
      recsHtml += '<div class="rec-est-total">Estimated potential: <span>+'+totalEst+' Score</span></div>';

      /* === TX LIST === */
      var txHtml = '';
      if (recentTx.length === 0) {
        txHtml = '<div class="empty-state"><i class="fa-solid fa-inbox"></i><p>Belum ada transaksi tercatat</p></div>';
      } else {
        txHtml = '<div class="tx-list">';
        for (var i=0; i<recentTx.length; i++) {
          var tx = recentTx[i];
          var amt = (tx.amount !== undefined && tx.amount !== null) ? tx.amount : 0;
          var amtClass = amt >= 0 ? 'positive' : 'negative';
          var amtPrefix = amt >= 0 ? '+' : '';
          var stClass = tx.status === 'success' ? 'success' : 'failed';
          var stIcon = tx.status === 'success' ? 'fa-circle-check' : 'fa-circle-xmark';
          txHtml += '<div class="tx-item">'
            + '<div class="tx-type-badge '+(tx.type||'send')+'"><i class="fa-solid '+getTxIcon(tx.type)+'"></i></div>'
            + '<div class="tx-info"><div class="tx-type-label">'+(tx.type||'tx')+'</div><div class="tx-addr">'+shortAddress(tx.to||tx.from||'')+'</div></div>'
            + '<div class="tx-right">'
            + '<span class="tx-amount '+amtClass+'">'+amtPrefix+formatETH(amt)+' Pi</span>'
            + '<div class="tx-status-time"><span class="tx-status '+stClass+'"><i class="fa-solid '+stIcon+'"></i></span><span class="tx-time">'+formatTimestamp(tx.timestamp)+'</span></div>'
            + '</div></div>';
        }
        txHtml += '</div>';
      }

      /* === RISK FLAGS === */
      var flagsHtml = '';
      if (flags.length === 0) {
        flagsHtml = '<div class="no-flags"><i class="fa-solid fa-shield-halved"></i><span>Tidak ada flag risiko terdeteksi</span></div>';
      } else {
        flagsHtml = '<div class="risk-flags-mini"><div class="risk-flags-mini-title"><i class="fa-solid fa-triangle-exclamation"></i> Risk Flags ('+flags.length+')</div>';
        for (var j=0; j<flags.length; j++) {
          var flag = flags[j];
          flagsHtml += '<div class="risk-flag-item"><i class="fa-solid fa-circle-exclamation"></i><div>'+(flag.description||'Unknown flag')+'<span class="risk-flag-severity '+(flag.severity||'low')+'">'+(flag.severity||'low')+'</span></div></div>';
        }
        flagsHtml += '</div>';
      }

      /* === BREAKDOWN === */
      var bd = data.breakdown || {};
      function bdItem(item, colorClass, val, unit) {
        if (!item) return '';
        var sv = (val !== undefined && val !== null) ? val : 0;
        return '<div>'
          + '<div class="breakdown-item-label"><span class="breakdown-label-text">'+(item.label||'-')+'</span>'
          + '<span class="breakdown-label-value">'+sv+(unit||'')+' <span>('+ (item.score!==undefined?item.score:0) +' pt)</span></span></div>'
          + '<div class="breakdown-bar"><div class="breakdown-bar-fill '+colorClass+'" data-width="'+(item.percentage!==undefined?item.percentage:0)+'"></div></div></div>';
      }

      /* ==============================
         ASSEMBLE FULL PAGE
      ============================== */
      pageContent.innerHTML = ''

        /* --- WALLET HEADER --- */
        + '<div class="wallet-header">'
        +   '<div class="wallet-header-top">'
        +     '<div class="wallet-avatar-lg">'+(data.walletAddress||'??').slice(0,2).toUpperCase()+'</div>'
        +     '<div class="wallet-header-info">'
        +       '<h2>'+(activeUser ? activeUser.displayName : (data.walletAddress||'Unknown'))+'</h2>'
        +       '<div class="wallet-header-meta">'
        +         '<span><i class="fa-regular fa-clock"></i> '+ageText+'</span>'
        +         '<span><i class="fa-solid fa-gas-pump"></i> '+formatETH(txData.totalGasETH)+' gas</span>'
        +         '<span><i class="'+networkIcon+'"></i> '+formatETH(data.estimatedBalance)+'</span>'
        +       '</div>'
        +     '</div>'
        +   '</div>'
        +   '<div class="wallet-header-bottom">'
        +     '<button class="copy-btn" onclick="copyAddress(\''+(data.walletAddress||'')+'\')"><i class="fa-regular fa-copy"></i> Salin</button>'
        +     networkBadge
        +     '<span class="status-badge" style="color:'+(data.statusColor||'#fff')+'; background:'+(data.statusBg||'transparent')+';"><i class="fa-solid '+(data.statusIcon||'fa-circle')+'"></i> '+(data.status||'N/A')+'</span>'
        +   '</div>'
        + '</div>'

        /* --- 1. GAUGE (Prioritas #1) --- */
        + '<div class="gauge-section">'
        +   '<div class="gauge-wrapper">'
        +     '<svg viewBox="0 0 '+viewBoxSize+' '+viewBoxSize+'">'
        +       '<circle class="gauge-track" cx="'+(radius+20)+'" cy="'+(radius+20)+'" r="'+radius+'"></circle>'
        +       '<circle class="gauge-glow-ring" id="gaugeGlow" cx="'+(radius+20)+'" cy="'+(radius+20)+'" r="'+radius+'"></circle>'
        +       '<circle class="gauge-fill-ring" id="gaugeFill" cx="'+(radius+20)+'" cy="'+(radius+20)+'" r="'+radius+'"></circle>'
        +     '</svg>'
        +     '<div class="gauge-center">'
        +       '<div class="gauge-score-num" id="gaugeScoreNum" style="color:'+scoreColor+';">0</div>'
        +       '<div class="gauge-score-label">Wallet Score</div>'
        +       '<div class="gauge-status-tag" style="color:'+scoreStatus.color+'; background:'+scoreStatus.bg+';">'+scoreStatus.text+'</div>'
        +     '</div>'
        +   '</div>'
        + '</div>'

        /* --- 2. AI INSIGHT (Prioritas #2) --- */
        + '<div class="ai-card">'
        +   '<div class="ai-header">'
        +     '<div class="ai-icon"><i class="fa-solid fa-robot"></i></div>'
        +     '<span class="ai-label">AI Insight</span>'
        +     '<div class="ai-typing" id="aiTyping"><span></span><span></span><span></span></div>'
        +   '</div>'
        +   '<div class="ai-text" id="aiTextContent"></div>'
        + '</div>'

        /* --- 3. PREDICTION (Prioritas #3) --- */
        + '<div class="prediction-card">'
        +   '<div class="prediction-icon"><i class="fa-solid fa-chart-line"></i></div>'
        +   '<div class="prediction-body">'
        +     '<div class="prediction-title">Next Month Prediction</div>'
        +     '<div class="prediction-nums">'
        +       '<span class="prediction-current">Current: <strong>'+score+'</strong></span>'
        +       '<span class="prediction-arrow"><i class="fa-solid fa-arrow-right"></i></span>'
        +       '<span class="prediction-next">Prediksi: <strong>'+prediction.next+'</strong></span>'
        +     '</div>'
        +   '</div>'
        +   '<div class="prediction-delta"><i class="fa-solid fa-arrow-up"></i> +'+prediction.delta+'</div>'
        + '</div>'

        /* --- 4. ACHIEVEMENT BADGES (Prioritas #4) --- */
        + '<div class="badges-section">'
        +   '<div class="badges-section-title"><i class="fa-solid fa-trophy" style="color:var(--accent-secondary); margin-right:6px;"></i>Achievements</div>'
        +   '<div class="badges-grid" id="badgesGrid">'+badgesHtml+'</div>'
        + '</div>'

        /* --- 5. TIMELINE CHART (Prioritas #5) --- */
        + timelineHtml

        /* --- STATS GRID (tetap ada) --- */
        + '<div class="stats-grid">'
        +   '<div class="stat-card accent">'
        +     '<div class="stat-card-header"><span class="stat-card-label">Credit Score</span><div class="stat-card-icon"><i class="fa-solid fa-shield-halved"></i></div></div>'
        +     '<div class="stat-card-value" id="animScore">0</div>'
        +     '<span class="stat-card-change '+changeClass+'"><i class="fa-solid '+changeIcon+'"></i> '+changeText+' dari bulan lalu</span>'
        +     '<div class="stat-card-sub">Top '+(data.percentile||0)+'% wallet</div>'
        +   '</div>'
        +   '<div class="stat-card green">'
        +     '<div class="stat-card-header"><span class="stat-card-label">Total Transaksi</span><div class="stat-card-icon"><i class="fa-solid fa-arrow-right-arrow-left"></i></div></div>'
        +     '<div class="stat-card-value" id="animTx">0</div>'
        +     '<span class="stat-card-change up"><i class="fa-solid fa-arrow-up"></i> '+(txData.recentWeek||0)+' minggu ini</span>'
        +     '<div class="stat-card-sub">'+formatNumber(txData.success||0)+' berhasil, '+(txData.failed||0)+' gagal</div>'
        +   '</div>'
        +   '<div class="stat-card amber">'
        +     '<div class="stat-card-header"><span class="stat-card-label">Success Rate</span><div class="stat-card-icon"><i class="fa-solid fa-circle-check"></i></div></div>'
        +     '<div class="stat-card-value" id="animRate">0%</div>'
        +     '<span class="stat-card-change '+(successRate>=95?'up':'down')+'"><i class="fa-solid '+(successRate>=95?'fa-arrow-up':'fa-arrow-down')+'"></i> '+(successRate>=95?'Di atas rata-rata':'Di bawah rata-rata')+'</span>'
        +     '<div class="stat-card-sub">Network avg: ~94%</div>'
        +   '</div>'
        +   '<div class="stat-card '+(flags.length===0?'green':'red')+'">'
        +     '<div class="stat-card-header"><span class="stat-card-label">Risk Flags</span><div class="stat-card-icon"><i class="fa-solid '+(flags.length===0?'fa-shield':'fa-triangle-exclamation')+'"></i></div></div>'
        +     '<div class="stat-card-value">'+flags.length+'</div>'
        +     '<div class="stat-card-sub">'+(flags.length===0?'Wallet bersih':flags.filter(function(f){return f.severity==='critical'}).length+' kritis, '+flags.filter(function(f){return f.severity==='high'}).length+' tinggi')+'</div>'
        +   '</div>'
        + '</div>'

        /* --- BOTTOM GRID --- */
        + '<div class="bottom-grid">'

        /* Score Breakdown */
        +   '<div class="card">'
        +     '<div class="card-header"><span class="card-title"><i class="fa-solid fa-list-check" style="color:var(--accent); margin-right:8px;"></i>Score Breakdown</span></div>'
        +     '<div class="card-body"><div class="breakdown-list">'
        +       bdItem(bd.walletAge, 'teal', wDays, ' hari')
        +       bdItem(bd.transactionHistory, 'green', formatNumber(txData.total||0), ' tx')
        +       bdItem(bd.successRate, 'amber', successRate, '%')
        +       bdItem(bd.riskProfile, 'red', flags.length, ' flags')
        +     '</div>'+flagsHtml+'</div>'
        +   '</div>'

        /* Right Column: DNA + Risk Radar + Pi Trust */
        +   '<div style="display:flex; flex-direction:column; gap:16px;">'

        /* Wallet DNA */
        +     '<div class="card">'
        +       '<div class="card-header"><span class="card-title"><i class="fa-solid fa-dna" style="color:var(--purple); margin-right:8px;"></i>Wallet DNA</span></div>'
        +       '<div class="card-body">'+dnaHtml+'</div>'
        +     '</div>'

        /* Risk Radar */
        +     '<div class="card">'
        +       '<div class="card-header"><span class="card-title"><i class="fa-solid fa-radar" style="color:var(--danger); margin-right:8px;"></i>Risk Radar</span></div>'
        +       '<div class="card-body"><div class="risk-radar-grid">'+radarHtml+'</div></div>'
        +     '</div>'

        /* Pi Trust Level */
        +     '<div class="card">'
        +       '<div class="card-header"><span class="card-title"><i class="fa-solid fa-star" style="color:var(--accent-secondary); margin-right:8px;"></i>Pi Trust Level</span></div>'
        +       '<div class="card-body"><div class="trust-section">'
        +         '<div class="trust-stars">'+starsHtml+'</div>'
        +         '<div class="trust-label" style="color:'+scoreStatus.color+';">'+trustLabel+'</div>'
        +         '<div class="trust-sub">Based on on-chain behavior analysis</div>'
        +       '</div></div>'
        +     '</div>'

        +   '</div>'
        + '</div>'

        /* --- RECOMMENDATIONS --- */
        + '<div class="card" style="margin-top:16px;">'
        +   '<div class="card-header"><span class="card-title"><i class="fa-solid fa-lightbulb" style="color:var(--accent-secondary); margin-right:8px;"></i>Improve Your Score</span></div>'
        +   '<div class="card-body">'+recsHtml+'</div>'
        + '</div>'

        /* --- 6. EXPORT (Prioritas #6) --- */
        + '<div class="export-section">'
        +   '<button class="export-btn" onclick="exportPDF(currentDashboardData)"><i class="fa-solid fa-file-pdf"></i> Download PDF</button>'
        +   '<button class="export-btn" onclick="shareResult()"><i class="fa-solid fa-share-nodes"></i> Share Result</button>'
        +   '<button class="export-btn" onclick="copyShareLink()"><i class="fa-solid fa-link"></i> Copy Link</button>'
        + '</div>'

        /* --- TRANSACTIONS --- */
        + '<div class="card" style="margin-bottom:16px;">'
        +   '<div class="card-header"><span class="card-title"><i class="fa-solid fa-arrow-right-arrow-left" style="color:var(--accent); margin-right:8px;"></i>Recent Transactions</span>'
        +   '<a href="history.html" class="card-action">Lihat semua <i class="fa-solid fa-arrow-right"></i></a></div>'
        +   '<div class="card-body">'+txHtml+'</div>'
        + '</div>';

      /* Simpan data untuk export */
      window.currentDashboardData = data;

      /* ========================================
         TRIGGER ANIMATIONS
      ======================================== */

      /* Gauge */
      setTimeout(function(){ animateGauge(score); }, 200);
      animateNumber(document.getElementById('gaugeScoreNum'), score, 1800);

      /* Stats */
      setTimeout(function(){
        animateNumber(document.getElementById('animScore'), score, 1400);
        animateNumber(document.getElementById('animTx'), txData.total || 0, 1200);
        var rateEl = document.getElementById('animRate');
        animateNumber(rateEl, successRate, 1200);
        setTimeout(function(){ rateEl.textContent = successRate + '%'; }, 1300);
      }, 400);

      /* AI Typewriter */
      setTimeout(function(){
        var typingEl = document.getElementById('aiTyping');
        if (typingEl) typingEl.style.display = 'none';
        typewriterEffect(document.getElementById('aiTextContent'), aiText, 16);
      }, 800);

      /* Badges stagger */
      var badgeItems = document.querySelectorAll('#badgesGrid .badge-item');
      badgeItems.forEach(function(b, idx){
        setTimeout(function(){ b.classList.add('show'); }, 600 + idx * 150);
      });

      /* Breakdown bars */
      setTimeout(function(){
        var bars = document.querySelectorAll('.breakdown-bar-fill');
        bars.forEach(function(bar){
          var w = bar.getAttribute('data-width');
          if (w) bar.style.width = w + '%';
        });
      }, 500);

      /* DNA bars */
      setTimeout(function(){
        var dnaBars = document.querySelectorAll('.dna-bar-fill');
        dnaBars.forEach(function(bar){
          var w = bar.getAttribute('data-width');
          if (w) bar.style.width = w + '%';
        });
      }, 700);

      /* Trust stars stagger */
      setTimeout(function(){
        var stars = document.querySelectorAll('.trust-stars .star.active');
        stars.forEach(function(star, idx){
          star.style.opacity = '0';
          star.style.transform = 'scale(0.5)';
          star.style.transition = 'all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) ' + (idx * 0.1) + 's';
          setTimeout(function(){ star.style.opacity = '1'; star.style.transform = 'scale(1)'; }, 50);
        });
      }, 900);

      /* Timeline Chart */
      setTimeout(function(){ renderTimelineChart(score); }, 300);
    }
  </script>
</body>
</html>
