<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Riwayat Transaksi — Wallet Health Score</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    :root {
      --bg-primary: #060a13;
      --bg-secondary: #0c1222;
      --bg-card: rgba(14, 22, 42, 0.65);
      --bg-input: rgba(6, 10, 19, 0.6);
      --bg-row-hover: rgba(45, 212, 191, 0.03);
      --border-color: rgba(45, 212, 191, 0.12);
      --border-color-hover: rgba(45, 212, 191, 0.3);
      --border-subtle: rgba(255, 255, 255, 0.06);
      --accent: #2dd4bf;
      --accent-dim: rgba(45, 212, 191, 0.12);
      --accent-glow: rgba(45, 212, 191, 0.2);
      --accent-secondary: #f59e0b;
      --accent-secondary-dim: rgba(245, 158, 11, 0.12);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #475569;
      --text-accent: #2dd4bf;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-full: 9999px;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
      --shadow-glow: 0 0 40px rgba(45, 212, 191, 0.06);
      --topbar-height: 56px;
      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font-body); background: var(--bg-primary);
      color: var(--text-primary); line-height: 1.6; overflow-x: hidden; min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; transition: color var(--transition-fast); }
    button { font-family: var(--font-body); cursor: pointer; border: none; outline: none; background: none; }

    /* Background */
    .bg-atmosphere {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .bg-atmosphere .orb {
      position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.18;
      animation: orbFloat 25s ease-in-out infinite; will-change: transform;
    }
    .bg-atmosphere .orb-1 {
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(45, 212, 191, 0.12) 0%, transparent 70%);
      top: -8%; left: -5%;
    }
    .bg-atmosphere .orb-2 {
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(245, 158, 11, 0.06) 0%, transparent 70%);
      bottom: -8%; right: -5%; animation-delay: -10s; animation-duration: 28s;
    }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(15px, -20px) scale(1.03); }
      66% { transform: translate(-10px, 10px) scale(0.97); }
    }

    /* Topbar — Konsisten */
    .topbar {
      height: var(--topbar-height); padding: 0 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border-subtle);
      background: rgba(6, 10, 19, 0.85); backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position: sticky; top: 0; z-index: 40;
    }
    .topbar-left {
      display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; font-size: 0.82rem; font-weight: 600;
      color: var(--accent); border: 1px solid var(--border-color);
      border-radius: var(--radius-full); transition: all var(--transition-fast);
      white-space: nowrap; flex-shrink: 0; background: var(--accent-dim);
    }
    .back-btn:hover {
      background: rgba(45, 212, 191, 0.18); border-color: var(--border-color-hover);
      box-shadow: 0 0 16px var(--accent-glow);
    }
    .back-btn:active { transform: scale(0.97); }
    .back-btn i { font-size: 0.8rem; }
    .topbar-title {
      font-family: var(--font-display); font-size: 1rem; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;
    }
    .topbar-right {
      display: flex; align-items: center; gap: 4px; flex-shrink: 0;
    }
    .topbar-btn {
      width: 36px; height: 36px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 0.9rem; transition: all var(--transition-fast);
    }
    .topbar-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
    .btn-logout {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 6px 10px; font-size: 0.78rem; font-weight: 500;
      color: var(--text-muted); border-radius: var(--radius-full); transition: all var(--transition-fast);
      white-space: nowrap;
    }
    .btn-logout:hover { color: var(--danger); background: rgba(239,68,68,0.08); }
    .btn-logout .logout-text { display: none; }

    /* Page Content */
    .page-content { flex: 1; padding: 20px 16px 32px; position: relative; z-index: 1; }

    /* ---- Summary Stats ---- */
    .summary-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px;
    }
    .summary-card {
      background: var(--bg-card); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md); padding: 14px 14px;
      display: flex; align-items: center; gap: 12px;
      transition: all var(--transition-fast);
    }
    .summary-card:active { border-color: var(--border-color); }
    .summary-icon {
      width: 38px; height: 38px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center; font-size: 0.85rem; flex-shrink: 0;
    }
    .summary-icon.total { background: var(--accent-dim); color: var(--accent); }
    .summary-icon.success { background: rgba(34,197,94,0.12); color: var(--success); }
    .summary-icon.failed { background: rgba(239,68,68,0.12); color: var(--danger); }
    .summary-icon.gas { background: var(--accent-secondary-dim); color: var(--accent-secondary); }
    .summary-value {
      font-family: var(--font-display); font-size: 1.15rem; font-weight: 700; line-height: 1.1;
    }
    .summary-label { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }

    /* ---- Filter & Search ---- */
    .toolbar {
      display: flex; flex-direction: column; gap: 10px;
      margin-bottom: 16px;
    }
    .filter-tabs {
      display: flex; gap: 3px; padding: 3px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-full);
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filter-tabs::-webkit-scrollbar { display: none; }
    .filter-tab {
      padding: 7px 16px; border-radius: var(--radius-full);
      font-size: 0.78rem; font-weight: 500;
      color: var(--text-muted); transition: all var(--transition-fast);
      display: flex; align-items: center; gap: 5px;
      white-space: nowrap; flex-shrink: 0;
    }
    .filter-tab:active { color: var(--text-secondary); }
    .filter-tab.active {
      color: var(--accent); background: var(--accent-dim);
    }
    .filter-tab .count {
      font-size: 0.65rem; font-weight: 700;
      padding: 1px 5px; border-radius: 10px;
      background: rgba(255,255,255,0.06); color: var(--text-muted);
    }
    .filter-tab.active .count { background: rgba(45,212,191,0.2); color: var(--accent); }

    .search-box {
      display: flex; align-items: center; gap: 8px;
      padding: 0 14px; height: 38px;
      background: var(--bg-input); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-full); transition: all var(--transition-fast);
    }
    .search-box:focus-within { border-color: var(--border-color-hover); box-shadow: 0 0 0 3px rgba(45,212,191,0.08); }
    .search-box i { color: var(--text-muted); font-size: 0.82rem; flex-shrink: 0; }
    .search-box input {
      flex: 1; background: none; border: none; outline: none;
      font-family: var(--font-body); font-size: 0.84rem;
      color: var(--text-primary); padding: 0;
    }
    .search-box input::placeholder { color: var(--text-muted); }
    .search-clear {
      color: var(--text-muted); font-size: 0.78rem; padding: 4px;
      display: flex; align-items: center; justify-content: center;
    }
    .search-clear:hover { color: var(--text-secondary); }

    /* ---- Card List (mobile) ---- */
    .tx-card-list {
      display: flex; flex-direction: column; gap: 2px;
    }

    .tx-card-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.025);
    }
    .tx-card-item:last-child { border-bottom: none; }

    .tx-card-type {
      width: 36px; height: 36px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; flex-shrink: 0;
    }
    .tx-card-type.send { background: rgba(239,68,68,0.1); color: #f87171; }
    .tx-card-type.receive { background: rgba(34,197,94,0.1); color: #4ade80; }
    .tx-card-type.swap { background: rgba(168,85,247,0.1); color: #c084fc; }
    .tx-card-type.approve { background: rgba(59,130,246,0.1); color: #60a5fa; }
    .tx-card-type.stake { background: var(--accent-dim); color: var(--accent); }
    .tx-card-type.unstake { background: var(--accent-secondary-dim); color: var(--accent-secondary); }
    .tx-card-type.bridge { background: rgba(236,72,153,0.1); color: #f472b6; }
    .tx-card-type.mint { background: rgba(34,197,94,0.1); color: #4ade80; }
    .tx-card-type.burn { background: rgba(239,68,68,0.1); color: #f87171; }

    .tx-card-info { flex: 1; min-width: 0; }
    .tx-card-top {
      display: flex; align-items: center; gap: 8px; margin-bottom: 2px;
    }
    .tx-card-type-label {
      font-size: 0.8rem; font-weight: 600; text-transform: capitalize;
    }
    .tx-card-status {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 0.65rem; font-weight: 600;
      padding: 1px 6px; border-radius: 10px;
    }
    .tx-card-status.success { background: rgba(34,197,94,0.1); color: #4ade80; }
    .tx-card-status.failed { background: rgba(239,68,68,0.1); color: #f87171; }
    .tx-card-status i { font-size: 0.5rem; }
    .tx-card-hash {
      font-family: 'Space Grotesk', monospace; font-size: 0.68rem;
      color: var(--text-muted); display: block; cursor: pointer;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .tx-card-hash:active { color: var(--text-accent); }

    .tx-card-right { text-align: right; flex-shrink: 0; }
    .tx-card-amount {
      font-family: var(--font-display); font-weight: 600; font-size: 0.82rem; display: block;
    }
    .tx-card-amount.negative { color: #f87171; }
    .tx-card-amount.positive { color: #4ade80; }
    .tx-card-meta {
      font-size: 0.68rem; color: var(--text-muted); margin-top: 2px;
      display: flex; align-items: center; gap: 6px; justify-content: flex-end;
    }

    /* ---- Desktop Table (hidden on mobile) ---- */
    .table-wrapper { display: none; }

    .table-card {
      background: var(--bg-card); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg); overflow: hidden;
    }
    .table-scroll {
      overflow-x: auto; overflow-y: auto; max-height: calc(100vh - 360px);
    }
    .table-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    .table-scroll::-webkit-scrollbar-track { background: transparent; }
    .table-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    .table-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }

    .tx-table { width: 100%; border-collapse: collapse; min-width: 800px; }
    .tx-table thead { position: sticky; top: 0; z-index: 5; }
    .tx-table th {
      text-align: left; padding: 14px 20px;
      font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-muted);
      background: var(--bg-secondary); border-bottom: 1px solid var(--border-subtle);
      white-space: nowrap; user-select: none;
    }
    .tx-table td {
      padding: 14px 20px; font-size: 0.85rem;
      border-bottom: 1px solid rgba(255,255,255,0.025);
      vertical-align: middle; white-space: nowrap;
    }
    .tx-table tbody tr { transition: background var(--transition-fast); }
    .tx-table tbody tr:hover { background: var(--bg-row-hover); }
    .tx-table tbody tr:last-child td { border-bottom: none; }

    .tx-hash {
      font-family: 'Space Grotesk', monospace; font-size: 0.82rem;
      color: var(--text-accent); cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px;
      transition: gap var(--transition-fast);
    }
    .tx-hash:hover { gap: 8px; }
    .tx-hash i { font-size: 0.65rem; opacity: 0; transition: opacity var(--transition-fast); }
    .tx-hash:hover i { opacity: 1; }

    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: var(--radius-full);
      font-size: 0.78rem; font-weight: 600;
    }
    .status-badge.success { background: rgba(34,197,94,0.1); color: #4ade80; }
    .status-badge.failed { background: rgba(239,68,68,0.1); color: #f87171; }
    .status-badge i { font-size: 0.6rem; }

    .type-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: var(--radius-full);
      font-size: 0.75rem; font-weight: 600; text-transform: capitalize;
    }
    .type-badge.send { background: rgba(239,68,68,0.1); color: #f87171; }
    .type-badge.receive { background: rgba(34,197,94,0.1); color: #4ade80; }
    .type-badge.swap { background: rgba(168,85,247,0.1); color: #c084fc; }
    .type-badge.approve { background: rgba(59,130,246,0.1); color: #60a5fa; }
    .type-badge.stake { background: var(--accent-dim); color: var(--accent); }
    .type-badge.unstake { background: var(--accent-secondary-dim); color: var(--accent-secondary); }
    .type-badge.bridge { background: rgba(236,72,153,0.1); color: #f472b6; }
    .type-badge.mint { background: rgba(34,197,94,0.1); color: #4ade80; }
    .type-badge.burn { background: rgba(239,68,68,0.1); color: #f87171; }

    .tx-amount { font-family: var(--font-display); font-weight: 600; font-size: 0.85rem; }
    .tx-amount.negative { color: #f87171; }
    .tx-amount.positive { color: #4ade80; }
    .tx-token { font-size: 0.75rem; color: var(--text-muted); font-weight: 400; margin-left: 4px; }
    .tx-addr { font-family: 'Space Grotesk', monospace; font-size: 0.8rem; color: var(--text-muted); }
    .tx-addr-label { font-size: 0.7rem; color: var(--text-muted); opacity: 0.6; margin-bottom: 1px; }
    .tx-time { font-size: 0.8rem; color: var(--text-muted); }
    .tx-date { font-size: 0.72rem; color: var(--text-muted); opacity: 0.6; margin-top: 1px; }
    .tx-gas { font-family: 'Space Grotesk', monospace; font-size: 0.8rem; color: var(--text-muted); }

    /* ---- Table Footer / Pagination ---- */
    .table-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-top: 1px solid var(--border-subtle);
      background: rgba(6,10,19,0.3); font-size: 0.78rem; color: var(--text-muted);
      flex-wrap: wrap; gap: 8px;
    }
    .table-footer-info { display: flex; align-items: center; gap: 4px; }
    .table-footer-info strong { color: var(--text-secondary); font-weight: 600; }

    .pagination {
      display: flex; align-items: center; gap: 3px;
    }
    .page-btn {
      width: 32px; height: 32px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; font-weight: 500;
      color: var(--text-muted); transition: all var(--transition-fast);
    }
    .page-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
    .page-btn.active { color: var(--bg-primary); background: var(--accent); font-weight: 700; }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .page-btn:disabled:hover { background: none; color: var(--text-muted); }
    .page-ellipsis { color: var(--text-muted); padding: 0 2px; font-size: 0.75rem; }

    /* ---- Empty State ---- */
    .empty-state {
      text-align: center; padding: 48px 20px; color: var(--text-muted);
    }
    .empty-state i { font-size: 2rem; opacity: 0.3; margin-bottom: 10px; display: block; }
    .empty-state p { font-size: 0.88rem; }
    .empty-state .sub { font-size: 0.8rem; opacity: 0.6; margin-top: 4px; }

    /* Guard */
    .guard-screen {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: var(--bg-primary); flex-direction: column; align-items: center;
      justify-content: center; gap: 20px; text-align: center; padding: 24px;
    }
    .guard-screen.active { display: flex; }
    .guard-screen i { font-size: 2.2rem; color: var(--text-muted); opacity: 0.4; }
    .guard-screen h2 { font-family: var(--font-display); font-size: 1.3rem; font-weight: 600; }
    .guard-screen p { font-size: 0.9rem; color: var(--text-muted); max-width: 320px; line-height: 1.5; }
    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      font-family: var(--font-body); font-weight: 600; font-size: 0.88rem;
      padding: 12px 28px; border-radius: var(--radius-full); transition: all var(--transition-base);
      color: var(--bg-primary); background: linear-gradient(135deg, var(--accent), #0d9488);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 30px var(--accent-glow), 0 4px 16px rgba(45,212,191,0.2);
    }

    /* Toast */
    .toast-container {
      position: fixed; top: 68px; left: 16px; right: 16px;
      z-index: 200; display: flex; flex-direction: column; gap: 8px; pointer-events: none;
    }
    .toast {
      display: flex; align-items: center; gap: 10px; padding: 12px 16px;
      background: var(--bg-secondary); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md); box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      font-size: 0.82rem; color: var(--text-primary);
      transform: translateY(-20px); opacity: 0;
      transition: all var(--transition-base); pointer-events: auto;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast i { font-size: 1rem; flex-shrink: 0; }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.success i { color: var(--success); }
    .toast.error { border-left: 3px solid var(--danger); }
    .toast.error i { color: var(--danger); }
    .toast.info { border-left: 3px solid var(--info); }
    .toast.info i { color: var(--info); }

    /* ========================================
       RESPONSIVE — Tablet
    ======================================== */
    @media (min-width: 640px) {
      .page-content { padding: 24px 20px 40px; }
      .summary-row { gap: 14px; }
      .summary-card { padding: 16px 18px; }
      .summary-value { font-size: 1.3rem; }
      .topbar { padding: 0 24px; }
      .topbar-title { font-size: 1.05rem; }
      .btn-logout .logout-text { display: inline; }
      .table-footer { padding: 14px 20px; }
    }

    /* ========================================
       RESPONSIVE — Desktop (tampilkan table)
    ======================================== */
    @media (min-width: 900px) {
      .page-content { padding: 28px 32px 48px; }
      .tx-card-list { display: none; }
      .table-wrapper { display: block; }
      .summary-row { grid-template-columns: repeat(4, 1fr); gap: 16px; }
      .summary-card { padding: 18px 20px; }
      .summary-value { font-size: 1.3rem; }
      .summary-label { font-size: 0.78rem; }
      .toolbar { flex-direction: row; align-items: center; justify-content: space-between; }
      .search-box { min-width: 260px; }
      .filter-tab { padding: 8px 20px; font-size: 0.82rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <div class="bg-atmosphere" aria-hidden="true"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

  <div class="guard-screen" id="guardScreen">
    <i class="fa-solid fa-lock"></i>
    <h2>Belum Masuk</h2>
    <p>Anda harus login dengan wallet address terlebih dahulu.</p>
    <a href="login.html" class="btn-primary"><i class="fa-solid fa-arrow-right-to-bracket"></i> Masuk Sekarang</a>
  </div>

  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <div id="mainWrapper" style="display:none;">

    <header class="topbar">
      <div class="topbar-left">
        <a href="index.html" class="back-btn" aria-label="Kembali ke beranda">
          <i class="fa-solid fa-arrow-left"></i>
          <span>Kembali</span>
        </a>
        <h1 class="topbar-title">Riwayat Transaksi</h1>
      </div>
      <div class="topbar-right">
        <button class="topbar-btn" id="refreshBtn" aria-label="Refresh" title="Refresh">
          <i class="fa-solid fa-arrows-rotate"></i>
        </button>
        <button class="btn-logout" id="logoutBtn">
          <i class="fa-solid fa-right-from-bracket"></i>
          <span class="logout-text">Keluar</span>
        </button>
      </div>
    </header>

    <main class="page-content" id="pageContent"></main>

  </div>

  <script src="js/data.js"></script>
  <script>
    /* Utilitas */
    function showToast(msg, type, dur) {
      type = type || 'info';
      dur = dur || 3000;
      var c = document.getElementById('toastContainer');
      var t = document.createElement('div');
      t.className = 'toast ' + type;
      var ic = { success: 'fa-circle-check', error: 'fa-circle-xmark', info: 'fa-circle-info' };
      t.innerHTML = '<i class="fa-solid ' + (ic[type] || ic.info) + '"></i><span>' + msg + '</span>';
      c.appendChild(t);
      requestAnimationFrame(function() {
        requestAnimationFrame(function() { t.classList.add('show'); });
      });
      setTimeout(function() {
        t.classList.remove('show');
        setTimeout(function() { t.remove(); }, 300);
      }, dur);
    }

    function formatNumber(n) {
      return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    function shortAddress(addr) {
      if (!addr || addr.length < 10) return addr || '—';
      return addr.slice(0, 6) + '...' + addr.slice(-4);
    }

    function formatTimestamp(ts) {
      var d = new Date(ts);
      var now = new Date();
      var diff = now - d;
      if (diff < 60000) return 'Baru saja';
      if (diff < 3600000) return Math.floor(diff / 60000) + 'm lalu';
      if (diff < 86400000) return Math.floor(diff / 3600000) + 'j lalu';
      if (diff < 604800000) return Math.floor(diff / 86400000) + 'h lalu';
      return d.getDate() + '/' + (d.getMonth() + 1) + '/' + d.getFullYear();
    }

    function formatDate(ts) {
      var d = new Date(ts);
      return d.getDate() + '/' + (d.getMonth() + 1) + '/' + d.getFullYear();
    }

    /* Auth Guard */
    var walletAddress = localStorage.getItem('whs_wallet');
    if (!walletAddress) {
      document.getElementById('guardScreen').classList.add('active');
    } else {
      document.getElementById('mainWrapper').style.display = 'block';
      init(walletAddress);
    }

    /* Logout */
    document.getElementById('logoutBtn').addEventListener('click', function() {
      localStorage.removeItem('whs_wallet');
      localStorage.removeItem('whs_login_time');
      sessionStorage.removeItem('currentWallet');
      sessionStorage.removeItem('walletData');
      showToast('Berhasil keluar', 'info', 2000);
      setTimeout(function() { window.location.href = 'login.html'; }, 600);
    });

    /* Refresh */
    document.getElementById('refreshBtn').addEventListener('click', function() {
      if (walletAddress) {
        var icon = document.querySelector('#refreshBtn i');
        icon.style.animation = 'spin 0.6s linear';
        setTimeout(function() { icon.style.animation = ''; }, 600);
        init(walletAddress);
        showToast('Data diperbarui', 'success', 2000);
      }
    });

    (function() {
      var s = document.createElement('style');
      s.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
      document.head.appendChild(s);
    })();

    /* State */
    var allTransactions = [];
    var filteredTransactions = [];
    var currentFilter = 'all';
    var searchQuery = '';
    var currentPage = 1;
    var perPage = 20;

    /* Type icons */
    var typeIcons = {
      send: 'fa-arrow-up-right', receive: 'fa-arrow-down-left',
      swap: 'fa-repeat', approve: 'fa-check-double',
      stake: 'fa-lock', unstake: 'fa-lock-open',
      bridge: 'fa-bridge', mint: 'fa-plus', burn: 'fa-fire'
    };

    /* Init */
    function init(addr) {
      var data = null;
      try {
        var stored = sessionStorage.getItem('walletData');
        if (stored) data = JSON.parse(stored);
      } catch (e) {}

      if (!data || data.walletAddress !== addr) {
        data = calculateCreditScore(addr);
        sessionStorage.setItem('walletData', JSON.stringify(data));
      }

      allTransactions = data.transactions.list;
      applyFilters();
      render();
    }

    /* Filter & Search */
    function applyFilters() {
      filteredTransactions = [];
      for (var i = 0; i < allTransactions.length; i++) {
        var tx = allTransactions[i];
        if (currentFilter === 'success' && tx.status !== 'success') continue;
        if (currentFilter === 'failed' && tx.status !== 'failed') continue;
        if (searchQuery) {
          var q = searchQuery.toLowerCase();
          var found = false;
          if (tx.txHash.toLowerCase().indexOf(q) !== -1) found = true;
          if (tx.token.toLowerCase().indexOf(q) !== -1) found = true;
          if (tx.type.toLowerCase().indexOf(q) !== -1) found = true;
          if (tx.from.toLowerCase().indexOf(q) !== -1) found = true;
          if (tx.to.toLowerCase().indexOf(q) !== -1) found = true;
          if (!found) continue;
        }
        filteredTransactions.push(tx);
      }
      currentPage = 1;
    }

    /* Render */
    function render() {
      var pc = document.getElementById('pageContent');
      var total = allTransactions.length;
      var successCount = 0;
      var totalGas = 0;
      for (var i = 0; i < allTransactions.length; i++) {
        if (allTransactions[i].status === 'success') {
          successCount++;
          totalGas += allTransactions[i].gasCostETH;
        }
      }
      var failedCount = total - successCount;

      var filtered = filteredTransactions;
      var totalPages = Math.max(1, Math.ceil(filtered.length / perPage));
      if (currentPage > totalPages) currentPage = totalPages;
      var startIdx = (currentPage - 1) * perPage;
      var pageTxs = filtered.slice(startIdx, startIdx + perPage);

      var html = '';

      /* Summary */
      html += '<div class="summary-row">'
        + '<div class="summary-card">'
        +   '<div class="summary-icon total"><i class="fa-solid fa-arrow-right-arrow-left"></i></div>'
        +   '<div><div class="summary-value">' + formatNumber(total) + '</div><div class="summary-label">Total Transaksi</div></div>'
        + '</div>'
        + '<div class="summary-card">'
        +   '<div class="summary-icon success"><i class="fa-solid fa-circle-check"></i></div>'
        +   '<div><div class="summary-value" style="color:var(--success)">' + formatNumber(successCount) + '</div><div class="summary-label">Berhasil</div></div>'
        + '</div>'
        + '<div class="summary-card">'
        +   '<div class="summary-icon failed"><i class="fa-solid fa-circle-xmark"></i></div>'
        +   '<div><div class="summary-value" style="color:var(--danger)">' + formatNumber(failedCount) + '</div><div class="summary-label">Gagal</div></div>'
        + '</div>'
        + '<div class="summary-card">'
        +   '<div class="summary-icon gas"><i class="fa-solid fa-gas-pump"></i></div>'
        +   '<div><div class="summary-value" style="color:var(--accent-secondary)">' + totalGas.toFixed(4) + '</div><div class="summary-label">Total Gas (ETH)</div></div>'
        + '</div>'
        + '</div>';

      /* Toolbar */
      html += '<div class="toolbar">'
        + '<div class="filter-tabs" id="filterTabs">'
        +   '<button class="filter-tab ' + (currentFilter === 'all' ? 'active' : '') + '" data-filter="all">Semua <span class="count">' + formatNumber(total) + '</span></button>'
        +   '<button class="filter-tab ' + (currentFilter === 'success' ? 'active' : '') + '" data-filter="success">Berhasil <span class="count">' + formatNumber(successCount) + '</span></button>'
        +   '<button class="filter-tab ' + (currentFilter === 'failed' ? 'active' : '') + '" data-filter="failed">Gagal <span class="count">' + formatNumber(failedCount) + '</span></button>'
        + '</div>'
        + '<div class="search-box">'
        +   '<i class="fa-solid fa-magnifying-glass"></i>'
        +   '<input type="text" id="searchInput" placeholder="Cari hash, token, tipe..." value="' + (searchQuery || '') + '" />'
        +   (searchQuery ? '<button class="search-clear" id="clearSearch" aria-label="Hapus pencarian"><i class="fa-solid fa-xmark"></i></button>' : '')
        + '</div>'
        + '</div>';

      /* Mobile Card List */
      html += '<div class="tx-card-list" id="txCardList">';
      if (pageTxs.length > 0) {
        for (var c = 0; c < pageTxs.length; c++) {
          html += renderCardItem(pageTxs[c]);
        }
      } else {
        html += '<div class="empty-state">'
          + '<i class="fa-solid fa-inbox"></i>'
          + '<p>Tidak ada transaksi ditemukan</p>'
          + '<p class="sub">' + (searchQuery ? 'Coba ubah kata kunci pencarian' : 'Tidak ada transaksi dengan filter ini') + '</p>'
          + '</div>';
      }
      html += '</div>';

      /* Desktop Table */
      html += '<div class="table-wrapper"><div class="table-card"><div class="table-scroll">';
      if (pageTxs.length > 0) {
        html += '<table class="tx-table"><thead><tr>'
          + '<th>Tx Hash</th><th>Tipe</th><th>Dari / Ke</th><th>Gas</th><th>Jumlah</th><th>Status</th><th>Waktu</th>'
          + '</tr></thead><tbody>';
        for (var t = 0; t < pageTxs.length; t++) {
          html += renderTableRow(pageTxs[t]);
        }
        html += '</tbody></table>';
      } else {
        html += '<div class="empty-state">'
          + '<i class="fa-solid fa-inbox"></i>'
          + '<p>Tidak ada transaksi ditemukan</p>'
          + '<p class="sub">' + (searchQuery ? 'Coba ubah kata kunci pencarian' : 'Tidak ada transaksi dengan filter ini') + '</p>'
          + '</div>';
      }
      html += '</div>';

      /* Footer + Pagination */
      if (filtered.length > 0) {
        html += '<div class="table-footer">'
          + '<div class="table-footer-info">Menampilkan <strong>' + (startIdx + 1) + '-' + Math.min(startIdx + perPage, filtered.length) + '</strong> dari <strong>' + formatNumber(filtered.length) + '</strong></div>'
          + '<div class="pagination" id="pagination"></div>'
          + '</div>';
      }

      html += '</div>'; /* .table-card */

      pc.innerHTML = html;

      /* Render pagination */
      renderPagination(totalPages);

      /* Bind events */
      bindEvents();
    }

    /* Render card item (mobile) */
    function renderCardItem(tx) {
      var isOutgoing = (['send', 'approve', 'stake', 'bridge', 'burn'].indexOf(tx.type) !== -1);
      var amountClass = isOutgoing ? 'negative' : 'positive';
      var amountPrefix = isOutgoing ? '-' : '+';

      return '<div class="tx-card-item">'
        + '<div class="tx-card-type ' + tx.type + '">'
        +   '<i class="fa-solid ' + (typeIcons[tx.type] || 'fa-circle') + '"></i>'
        + '</div>'
        + '<div class="tx-card-info">'
        +   '<div class="tx-card-top">'
        +     '<span class="tx-card-type-label">' + tx.type + '</span>'
        +     '<span class="tx-card-status ' + tx.status + '">'
        +       '<i class="fa-solid ' + (tx.status === 'success' ? 'fa-circle-check' : 'fa-circle-xmark') + '"></i> '
        +       (tx.status === 'success' ? 'OK' : 'Gagal')
        +     '</span>'
        +   '</div>'
        +   '<span class="tx-card-hash" onclick="copyHash(\'' + tx.txHash + '\')">' + tx.txHash.slice(0, 10) + '...' + tx.txHash.slice(-6) + '</span>'
        + '</div>'
        + '<div class="tx-card-right">'
        +   '<span class="tx-card-amount ' + amountClass + '">' + amountPrefix + tx.amount + ' ' + tx.token + '</span>'
        +   '<div class="tx-card-meta">' + formatTimestamp(tx.timestamp) + '</div>'
        + '</div>'
        + '</div>';
    }

    /* Render table row (desktop) */
    function renderTableRow(tx) {
      var isOutgoing = (['send', 'approve', 'stake', 'bridge', 'burn'].indexOf(tx.type) !== -1);
      var counterparty = isOutgoing ? tx.to : tx.from;
      var dirLabel = isOutgoing ? 'Ke' : 'Dari';
      var amountClass = isOutgoing ? 'negative' : 'positive';
      var amountPrefix = isOutgoing ? '-' : '+';

      return '<tr>'
        + '<td><span class="tx-hash" onclick="copyHash(\'' + tx.txHash + '\')" title="Klik untuk salin">'
        +   tx.txHash.slice(0, 10) + '...' + tx.txHash.slice(-6)
        +   ' <i class="fa-solid fa-copy"></i>'
        + '</span></td>'
        + '<td><span class="type-badge ' + tx.type + '"><i class="fa-solid ' + (typeIcons[tx.type] || 'fa-circle') + '"></i> ' + tx.type + '</span></td>'
        + '<td><div class="tx-addr-label">' + dirLabel + '</div><span class="tx-addr">' + shortAddress(counterparty) + '</span></td>'
        + '<td><span class="tx-gas">' + tx.gasCostETH.toFixed(6) + '</span></td>'
        + '<td><span class="tx-amount ' + amountClass + '">' + amountPrefix + tx.amount + '</span><span class="tx-token">' + tx.token + '</span></td>'
        + '<td><span class="status-badge ' + tx.status + '"><i class="fa-solid ' + (tx.status === 'success' ? 'fa-circle-check' : 'fa-circle-xmark') + '"></i> ' + (tx.status === 'success' ? 'Berhasil' : 'Gagal') + '</span></td>'
        + '<td><div class="tx-time">' + formatTimestamp(tx.timestamp) + '</div><div class="tx-date">' + formatDate(tx.timestamp) + '</div></td>'
        + '</tr>';
    }

    /* Pagination */
    function renderPagination(totalPages) {
      var container = document.getElementById('pagination');
      if (!container || totalPages <= 1) return;

      var html = '';
      html += '<button class="page-btn" data-page="' + (currentPage - 1) + '" ' + (currentPage === 1 ? 'disabled' : '') + ' aria-label="Sebelumnya">'
        + '<i class="fa-solid fa-chevron-left" style="font-size:0.65rem;"></i></button>';

      var pages = getPageNumbers(currentPage, totalPages);
      for (var p = 0; p < pages.length; p++) {
        if (pages[p] === '...') {
          html += '<span class="page-ellipsis">...</span>';
        } else {
          html += '<button class="page-btn ' + (pages[p] === currentPage ? 'active' : '') + '" data-page="' + pages[p] + '">' + pages[p] + '</button>';
        }
      }

      html += '<button class="page-btn" data-page="' + (currentPage + 1) + '" ' + (currentPage === totalPages ? 'disabled' : '') + ' aria-label="Berikutnya">'
        + '<i class="fa-solid fa-chevron-right" style="font-size:0.65rem;"></i></button>';

      container.innerHTML = html;
    }

    function getPageNumbers(current, total) {
      if (total <= 7) {
        var arr = [];
        for (var i = 1; i <= total; i++) arr.push(i);
        return arr;
      }
      var pages = [1];
      if (current > 3) pages.push('...');
      var start = Math.max(2, current - 1);
      var end = Math.min(total - 1, current + 1);
      for (var j = start; j <= end; j++) pages.push(j);
      if (current < total - 2) pages.push('...');
      pages.push(total);
      return pages;
    }

    /* Bind events */
    function bindEvents() {
      var tabs = document.querySelectorAll('.filter-tab');
      for (var i = 0; i < tabs.length; i++) {
        tabs[i].addEventListener('click', function() {
          currentFilter = this.getAttribute('data-filter');
          applyFilters();
          render();
        });
      }

      var searchInput = document.getElementById('searchInput');
      if (searchInput) {
        var debounceTimer;
        searchInput.addEventListener('input', function() {
          clearTimeout(debounceTimer);
          var val = this.value;
          debounceTimer = setTimeout(function() {
            searchQuery = val.trim();
            applyFilters();
            render();
            var newInput = document.getElementById('searchInput');
            if (newInput) {
              newInput.focus();
              newInput.setSelectionRange(newInput.value.length, newInput.value.length);
            }
          }, 300);
        });
      }

      var clearBtn = document.getElementById('clearSearch');
      if (clearBtn) {
        clearBtn.addEventListener('click', function() {
          searchQuery = '';
          applyFilters();
          render();
        });
      }

      var pageBtns = document.querySelectorAll('.page-btn[data-page]');
      for (var b = 0; b < pageBtns.length; b++) {
        pageBtns[b].addEventListener('click', function() {
          var page = parseInt(this.getAttribute('data-page'));
          var maxPage = Math.ceil(filteredTransactions.length / perPage);
          if (!isNaN(page) && page >= 1 && page <= maxPage) {
            currentPage = page;
            render();
            var tableCard = document.querySelector('.table-card');
            var cardList = document.querySelector('.tx-card-list');
            var target = tableCard || cardList;
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        });
      }
    }

    /* Copy hash */
    function copyHash(hash) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(hash)
          .then(function() { showToast('Tx hash disalin', 'success', 2000); })
          .catch(function() { showToast('Gagal menyalin', 'error'); });
      } else {
        var ta = document.createElement('textarea');
        ta.value = hash;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand('copy');
          showToast('Tx hash disalin', 'success', 2000);
        } catch(e) {
          showToast('Gagal menyalin', 'error');
        }
        document.body.removeChild(ta);
      }
    }
  </script>

</body>
</html>
