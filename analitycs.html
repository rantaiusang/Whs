<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analitik — Wallet Health Score</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --bg-primary: #060a13;
      --bg-secondary: #0c1222;
      --bg-card: rgba(14, 22, 42, 0.65);
      --bg-card-hover: rgba(20, 32, 58, 0.75);
      --bg-sidebar: rgba(8, 14, 28, 0.92);
      --bg-input: rgba(6, 10, 19, 0.6);
      --border-color: rgba(45, 212, 191, 0.12);
      --border-color-hover: rgba(45, 212, 191, 0.3);
      --border-subtle: rgba(255, 255, 255, 0.06);

      --accent: #2dd4bf;
      --accent-dim: rgba(45, 212, 191, 0.12);
      --accent-glow: rgba(45, 212, 191, 0.2);
      --accent-secondary: #f59e0b;
      --accent-secondary-dim: rgba(245, 158, 11, 0.12);

      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #475569;

      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-full: 9999px;

      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'DM Sans', sans-serif;

      --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
      --shadow-glow: 0 0 40px rgba(45, 212, 191, 0.06);

      --sidebar-width: 260px;
      --topbar-height: 64px;

      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font-body); background: var(--bg-primary);
      color: var(--text-primary); line-height: 1.6; overflow-x: hidden; min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; transition: color var(--transition-fast); }
    button { font-family: var(--font-body); cursor: pointer; border: none; outline: none; background: none; }

    .bg-atmosphere {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .bg-atmosphere .orb {
      position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.2;
      animation: orbFloat 25s ease-in-out infinite;
    }
    .bg-atmosphere .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(45, 212, 191, 0.1) 0%, transparent 70%);
      top: -10%; left: -5%;
    }
    .bg-atmosphere .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(245, 158, 11, 0.06) 0%, transparent 70%);
      bottom: -10%; right: -5%; animation-delay: -10s; animation-duration: 28s;
    }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -30px) scale(1.03); }
      66% { transform: translate(-15px, 15px) scale(0.97); }
    }
    .bg-noise {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; opacity: 0.02;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    .dashboard-layout { position: relative; z-index: 1; display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width); background: var(--bg-sidebar);
      border-right: 1px solid var(--border-subtle);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0;
      z-index: 50; transition: transform var(--transition-base);
    }
    .sidebar-brand {
      padding: 20px 24px; display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border-subtle);
      font-family: var(--font-display); font-weight: 700; font-size: 1.1rem;
    }
    .sidebar-brand-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), #0d9488);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; color: var(--bg-primary);
      box-shadow: 0 0 14px var(--accent-glow);
    }
    .sidebar-nav {
      flex: 1; padding: 16px 12px;
      display: flex; flex-direction: column; gap: 4px; overflow-y: auto;
    }
    .nav-section-label {
      font-size: 0.68rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--text-muted); padding: 16px 12px 8px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: var(--radius-md);
      font-size: 0.9rem; font-weight: 500; color: var(--text-secondary);
      transition: all var(--transition-fast); position: relative;
    }
    .nav-item i { width: 20px; text-align: center; font-size: 0.9rem; }
    .nav-item:hover { color: var(--text-primary); background: rgba(255,255,255,0.04); }
    .nav-item.active { color: var(--accent); background: var(--accent-dim); }
    .nav-item.active::before {
      content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      width: 3px; height: 20px; background: var(--accent); border-radius: 0 3px 3px 0;
    }
    .sidebar-footer { padding: 16px; border-top: 1px solid var(--border-subtle); }
    .sidebar-wallet {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      background: rgba(255,255,255,0.02); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md); cursor: pointer; transition: all var(--transition-fast);
    }
    .sidebar-wallet:hover { border-color: var(--border-color); background: rgba(255,255,255,0.04); }
    .sidebar-wallet-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-dim), rgba(45,212,191,0.25));
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; color: var(--accent);
      font-family: var(--font-display); font-weight: 700; flex-shrink: 0;
    }
    .sidebar-wallet-info { flex: 1; min-width: 0; }
    .sidebar-wallet-addr {
      font-family: 'Space Grotesk', monospace; font-size: 0.8rem; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sidebar-wallet-label { font-size: 0.7rem; color: var(--text-muted); }

    /* Main */
    .main-content {
      flex: 1; margin-left: var(--sidebar-width);
      display: flex; flex-direction: column; min-height: 100vh;
    }
    .topbar {
      height: var(--topbar-height); padding: 0 32px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border-subtle);
      background: rgba(6,10,19,0.6); backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 40;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .sidebar-toggle {
      display: none; width: 36px; height: 36px; border-radius: var(--radius-sm);
      align-items: center; justify-content: center; color: var(--text-secondary);
      font-size: 1.1rem; transition: all var(--transition-fast);
    }
    .sidebar-toggle:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
    .topbar-breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
    .topbar-breadcrumb a { color: var(--text-muted); }
    .topbar-breadcrumb a:hover { color: var(--accent); }
    .topbar-breadcrumb .sep { color: var(--text-muted); opacity: 0.4; }
    .topbar-breadcrumb .current { color: var(--text-primary); font-weight: 500; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .btn-logout {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 16px; font-size: 0.82rem; font-weight: 500;
      color: var(--text-muted); border-radius: var(--radius-full); transition: all var(--transition-fast);
    }
    .btn-logout:hover { color: var(--danger); background: rgba(239,68,68,0.08); }

    /* Page Content */
    .page-content { flex: 1; padding: 32px; }

    /* ---- Chart Grid ---- */
    .chart-grid-top {
      display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 20px;
    }
    .chart-grid-bottom {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;
    }

    .chart-card {
      background: var(--bg-card); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg); overflow: hidden;
      transition: border-color var(--transition-base);
    }
    .chart-card:hover { border-color: var(--border-color); }
    .chart-card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px 0;
    }
    .chart-card-title-group { display: flex; align-items: center; gap: 12px; }
    .chart-card-icon {
      width: 36px; height: 36px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center; font-size: 0.9rem;
    }
    .chart-card-icon.teal { background: var(--accent-dim); color: var(--accent); }
    .chart-card-icon.amber { background: var(--accent-secondary-dim); color: var(--accent-secondary); }
    .chart-card-icon.green { background: rgba(34,197,94,0.12); color: var(--success); }
    .chart-card-title {
      font-family: var(--font-display); font-size: 0.95rem; font-weight: 600;
    }
    .chart-card-subtitle { font-size: 0.78rem; color: var(--text-muted); margin-top: 1px; }
    .chart-card-badge {
      font-size: 0.75rem; font-weight: 600; padding: 4px 12px;
      border-radius: var(--radius-full);
    }
    .chart-card-badge.up { color: var(--success); background: rgba(34,197,94,0.1); }
    .chart-card-badge.down { color: var(--danger); background: rgba(239,68,68,0.1); }
    .chart-card-badge.neutral { color: var(--text-muted); background: rgba(255,255,255,0.04); }

    .chart-card-body { padding: 16px 20px 20px; position: relative; }

    .chart-container { position: relative; width: 100%; }
    .chart-container.tall { height: 320px; }
    .chart-container.short { height: 260px; }

    /* ---- Insight Cards ---- */
    .insights-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
    }
    .insight-card {
      background: var(--bg-card); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md); padding: 20px;
      transition: all var(--transition-fast);
    }
    .insight-card:hover { border-color: var(--border-color); transform: translateY(-2px); }
    .insight-label {
      font-size: 0.78rem; color: var(--text-muted); margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .insight-label i { font-size: 0.7rem; }
    .insight-value {
      font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; line-height: 1.1;
    }
    .insight-sub { font-size: 0.78rem; color: var(--text-muted); margin-top: 6px; }
    .insight-bar {
      height: 4px; background: rgba(255,255,255,0.04);
      border-radius: var(--radius-full); margin-top: 12px; overflow: hidden;
    }
    .insight-bar-fill {
      height: 100%; border-radius: var(--radius-full);
      transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1); width: 0;
    }

    /* Guard */
    .guard-screen {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: var(--bg-primary); flex-direction: column; align-items: center;
      justify-content: center; gap: 20px; text-align: center; padding: 24px;
    }
    .guard-screen.active { display: flex; }
    .guard-screen i { font-size: 2.5rem; color: var(--text-muted); opacity: 0.4; }
    .guard-screen h2 { font-family: var(--font-display); font-size: 1.4rem; font-weight: 600; }
    .guard-screen p { font-size: 0.95rem; color: var(--text-muted); max-width: 360px; }
    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      font-family: var(--font-body); font-weight: 600; font-size: 0.9rem;
      padding: 12px 28px; border-radius: var(--radius-full); transition: all var(--transition-base);
      color: var(--bg-primary); background: linear-gradient(135deg, var(--accent), #0d9488);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 0 30px var(--accent-glow), 0 4px 16px rgba(45,212,191,0.2); }

    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 45; opacity: 0; transition: opacity var(--transition-base); }
    .sidebar-overlay.active { opacity: 1; }

    .toast-container { position: fixed; top: 80px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      display: flex; align-items: center; gap: 12px; padding: 14px 20px;
      background: var(--bg-secondary); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md); box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      font-size: 0.88rem; color: var(--text-primary); transform: translateX(120%);
      transition: transform var(--transition-base); max-width: 380px;
    }
    .toast.show { transform: translateX(0); }
    .toast i { font-size: 1.1rem; flex-shrink: 0; }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.success i { color: var(--success); }
    .toast.info { border-left: 3px solid var(--info); }
    .toast.info i { color: var(--info); }

    /* Responsive */
    @media (max-width: 1024px) {
      .chart-grid-bottom { grid-template-columns: 1fr; }
      .insights-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay { display: block; }
      .main-content { margin-left: 0; }
      .sidebar-toggle { display: flex; }
      .page-content { padding: 20px 16px; }
      .chart-container.tall { height: 260px; }
      .chart-container.short { height: 220px; }
    }
    @media (max-width: 480px) {
      .insights-grid { grid-template-columns: 1fr; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>

  <div class="bg-atmosphere" aria-hidden="true"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
  <div class="bg-noise" aria-hidden="true"></div>

  <div class="guard-screen" id="guardScreen">
    <i class="fa-solid fa-lock"></i>
    <h2>Belum Masuk</h2>
    <p>Anda harus login dengan wallet address terlebih dahulu.</p>
    <a href="login.html" class="btn-primary"><i class="fa-solid fa-arrow-right-to-bracket"></i> Masuk Sekarang</a>
  </div>

  <div class="toast-container" id="toastContainer" aria-live="polite"></div>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="dashboard-layout" id="dashboardLayout" style="display:none;">
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Sidebar navigasi">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon"><i class="fa-solid fa-shield-halved"></i></div>
        <span>WalletScore</span>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-label">Menu Utama</div>
        <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-grid-2"></i> Dashboard</a>
        <a href="wallet.html" class="nav-item"><i class="fa-solid fa-wallet"></i> Wallet Detail</a>
        <a href="history.html" class="nav-item"><i class="fa-solid fa-clock-rotate-left"></i> Riwayat</a>
        <a href="analytics.html" class="nav-item active"><i class="fa-solid fa-chart-mixed"></i> Analitik</a>
        <div class="nav-section-label">Lainnya</div>
        <a href="settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> Pengaturan</a>
        <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i> Beranda</a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-wallet" id="sidebarWallet" title="Klik untuk salin">
          <div class="sidebar-wallet-avatar" id="sidebarAvatar">?</div>
          <div class="sidebar-wallet-info">
            <div class="sidebar-wallet-addr" id="sidebarAddr">—</div>
            <div class="sidebar-wallet-label">Tersambung</div>
          </div>
          <i class="fa-solid fa-copy" style="color:var(--text-muted); font-size:0.75rem;"></i>
        </div>
      </div>
    </aside>

    <div class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar"><i class="fa-solid fa-bars"></i></button>
          <div class="topbar-breadcrumb">
            <a href="dashboard.html">Dashboard</a>
            <span class="sep"><i class="fa-solid fa-chevron-right" style="font-size:0.6rem;"></i></span>
            <span class="current">Analitik</span>
          </div>
        </div>
        <div class="topbar-right">
          <button class="btn-logout" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i><span>Keluar</span></button>
        </div>
      </header>

      <main class="page-content" id="pageContent"></main>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script>
    /* Utilitas */
    function showToast(msg, type = 'info', dur = 3000) {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      const ic = { success: 'fa-circle-check', error: 'fa-circle-xmark', info: 'fa-circle-info' };
      t.innerHTML = `<i class="fa-solid ${ic[type]||ic.info}"></i><span>${msg}</span>`;
      c.appendChild(t);
      requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
      setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, dur);
    }

    /* Auth */
    const walletAddress = localStorage.getItem('whs_wallet');
    if (!walletAddress) {
      document.getElementById('guardScreen').classList.add('active');
    } else {
      document.getElementById('dashboardLayout').style.display = 'flex';
      init(walletAddress);
    }

    /* Sidebar */
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    document.getElementById('sidebarToggle').addEventListener('click', () => {
      sidebar.classList.toggle('open'); sidebarOverlay.classList.toggle('active');
    });
    sidebarOverlay.addEventListener('click', () => {
      sidebar.classList.remove('open'); sidebarOverlay.classList.remove('active');
    });
    document.getElementById('sidebarWallet').addEventListener('click', () => {
      if (walletAddress) navigator.clipboard.writeText(walletAddress).then(() => showToast('Alamat disalin', 'success', 2000));
    });
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('whs_wallet'); localStorage.removeItem('whs_login_time');
      sessionStorage.removeItem('currentWallet');
      showToast('Berhasil keluar', 'info', 2000);
      setTimeout(() => { window.location.href = 'login.html'; }, 600);
    });

    /* Simpan referensi chart untuk destroy saat re-render */
    let chartInstances = [];

    function destroyCharts() {
      chartInstances.forEach(c => c.destroy());
      chartInstances = [];
    }

    /* Init */
    function init(addr) {
      document.getElementById('sidebarAddr').textContent = addr;
      document.getElementById('sidebarAvatar').textContent = addr.slice(2, 4).toUpperCase();

      let data = null;
      try {
        const stored = sessionStorage.getItem('walletData');
        if (stored) data = JSON.parse(stored);
      } catch (e) {}

      if (!data || data.walletAddress !== addr) {
        data = calculateCreditScore(addr);
        sessionStorage.setItem('walletData', JSON.stringify(data));
      }

      render(data);
    }

    /* ========================================
       Chart.js Global Config
    ======================================== */
    Chart.defaults.font.family = "'DM Sans', sans-serif";
    Chart.defaults.color = '#475569';
    Chart.defaults.borderColor = 'rgba(255,255,255,0.04)';
    Chart.defaults.plugins.legend.display = false;
    Chart.defaults.elements.point.radius = 0;
    Chart.defaults.elements.point.hoverRadius = 5;
    Chart.defaults.elements.point.hoverBorderWidth = 2;

    /* ========================================
       RENDER
    ======================================== */
    function render(data) {
      destroyCharts();
      const pc = document.getElementById('pageContent');

      // Generate trend data
      const scoreTrend = generateScoreTrend(data.score);
      const txPerDay = generateTxPerDay(data.transactions.list);
      const successRateTrend = generateSuccessRateTrend(data.transactions.list);

      // Hitung insight
      const avgScore = Math.round(scoreTrend.reduce((s, d) => s + d.score, 0) / scoreTrend.length);
      const minScore = Math.min(...scoreTrend.map(d => d.score));
      const maxScore = Math.max(...scoreTrend.map(d => d.score));
      const avgTxPerDay = (txPerDay.reduce((s, d) => s + d.count, 0) / txPerDay.length).toFixed(1);
      const avgSuccessRate = (successRateTrend.reduce((s, d) => s + d.rate, 0) / successRateTrend.length).toFixed(1);
      const scoreChange = data.score - scoreTrend[0].score;
      const scoreChangeClass = scoreChange >= 0 ? 'up' : 'down';
      const scoreChangeText = scoreChange >= 0 ? `+${scoreChange}` : `${scoreChange}`;

      // Label tanggal singkat
      const scoreLabels = scoreTrend.map(d => {
        const dt = new Date(d.date);
        return dt.getDate() + '/' + (dt.getMonth() + 1);
      });
      const txLabels = txPerDay.map(d => {
        const dt = new Date(d.date);
        return dt.getDate() + '/' + (dt.getMonth() + 1);
      });
      const rateLabels = successRateTrend.map(d => {
        const dt = new Date(d.date);
        return dt.getDate() + '/' + (dt.getMonth() + 1);
      });

      pc.innerHTML = `

            <div class="chart-card-header">

                <div>
                  <div class="chart-card-title">Tren Credit Score</div>
                  <div class="chart-card-subtitle">30 hari terakhir</div>
                </div>
              </div>
              <span class="chart-card-badge ${scoreChangeClass}">
                <i class="fa-solid ${scoreChange >= 0 ? 'fa-arrow-up' : 'fa-arrow-down'}" style="font-size:0.65rem;"></i>
                ${scoreChangeText} poin
              </span>
            </div>
            <div class="chart-card-body">
              <div class="chart-container tall">
                <canvas id="scoreChart"></canvas>
              </div>
            </div>
          </div>
        </div>

        <!-- Tx Per Day + Success Rate -->
        <div class="chart-grid-bottom">
          <div class="chart-card">
            <div class="chart-card-header">
              <div class="chart-card-title-group">
                <div class="chart-card-icon amber"><i class="fa-solid fa-chart-column"></i></div>
                <div>
                  <div class="chart-card-title">Transaksi Per Hari</div>
                  <div class="chart-card-subtitle">30 hari terakhir</div>
                </div>
              </div>
              <span class="chart-card-badge neutral">Avg ${avgTxPerDay}/hari</span>
            </div>
            <div class="chart-card-body">
              <div class="chart-container short">
                <canvas id="txChart"></canvas>
              </div>
            </div>
          </div>

          <div class="chart-card">
            <div class="chart-card-header">
              <div class="chart-card-title-group">
                <div class="chart-card-icon green"><i class="fa-solid fa-circle-check"></i></div>
                <div>
                  <div class="chart-card-title">Success Rate Harian</div>
                  <div class="chart-card-subtitle">30 hari terakhir</div>
                </div>
              </div>
              <span class="chart-card-badge ${parseFloat(avgSuccessRate) >= 95 ? 'up' : 'down'}">
                Avg ${avgSuccessRate}%
              </span>
            </div>
            <div class="chart-card-body">
              <div class="chart-container short">
                <canvas id="rateChart"></canvas>
              </div>
            </div>
          </div>
        </div>

        <!-- Insight Cards -->
        <div class="insights-grid">
          <div class="insight-card">
            <div class="insight-label"><i class="fa-solid fa-chart-simple"></i> Rata-rata Skor</div>
            <div class="insight-value" style="color:var(--accent)">${avgScore}</div>
            <div class="insight-sub">dari 1000</div>
            <div class="insight-bar">
              <div class="insight-bar-fill" data-width="${(avgScore / 1000) * 100}" style="background:linear-gradient(90deg, #0d9488, var(--accent));"></div>
            </div>
          </div>
          <div class="insight-card">
            <div class="insight-label"><i class="fa-solid fa-arrow-down"></i> Skor Terendah</div>
            <div class="insight-value" style="color:var(--danger)">${minScore}</div>
            <div class="insight-sub">${scoreTrend.find(d => d.score === minScore).date}</div>
            <div class="insight-bar">
              <div class="insight-bar-fill" data-width="${(minScore / 1000) * 100}" style="background:linear-gradient(90deg, #dc2626, #f87171);"></div>
            </div>
          </div>
          <div class="insight-card">
            <div class="insight-label"><i class="fa-solid fa-arrow-up"></i> Skor Tertinggi</div>
            <div class="insight-value" style="color:var(--success)">${maxScore}</div>
            <div class="insight-sub">${scoreTrend.find(d => d.score === maxScore).date}</div>
            <div class="insight-bar">
              <div class="insight-bar-fill" data-width="${(maxScore / 1000) * 100}" style="background:linear-gradient(90deg, #16a34a, #4ade80);"></div>
            </div>
          </div>
          <div class="insight-card">
            <div class="insight-label"><i class="fa-solid fa-arrows-up-down"></i> Volatilitas</div>
            <div class="insight-value" style="color:var(--accent-secondary)">${maxScore - minScore}</div>
            <div class="insight-sub">Rentang skor 30 hari</div>
            <div class="insight-bar">
              <div class="insight-bar-fill" data-width="${Math.min(100, ((maxScore - minScore) / 400) * 100)}" style="background:linear-gradient(90deg, #d97706, #fbbf24);"></div>

      // Animasi insight bars
      setTimeout(() => {
        document.querySelectorAll('.insight-bar-fill').forEach(bar => {
          bar.style.width = bar.getAttribute('data-width') + '%';
        });
      }, 200);

      // Render charts
      requestAnimationFrame(() => {
        renderScoreChart(scoreLabels, scoreTrend);
        renderTxChart(txLabels, txPerDay);
        renderRateChart(rateLabels, successRateTrend);
      });

    /* ========================================
       CHART 1: Credit Score Trend (Line)
    ======================================== */
    function renderScoreChart(labels, trendData) {
      const ctx = document.getElementById('scoreChart');
      if (!ctx) return;

      const scores = trendData.map(d => d.score);

      // Gradient fill
      const canvas = ctx;
      const context = canvas.getContext('2d');
      const gradient = context.createLinearGradient(0, 0, 0, canvas.parentElement.clientHeight || 320);
      gradient.addColorStop(0, 'rgba(45, 212, 191, 0.25)');
      gradient.addColorStop(0.5, 'rgba(45, 212, 191, 0.06)');
      gradient.addColorStop(1, 'rgba(45, 212, 191, 0.0)');

      const chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            data: scores,
            borderColor: '#2dd4bf',
            borderWidth: 2.5,
            backgroundColor: gradient,
            fill: true,
            tension: 0.4,
            pointBackgroundColor: '#2dd4bf',
            pointBorderColor: '#060a13',
            pointHoverBackgroundColor: '#fff',
            pointHoverBorderColor: '#2dd4bf',
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          scales: {
            x: {
              grid: { display: false },
              ticks: { maxRotation: 0, autoSkip: true, maxTicksLimit: 10, font: { size: 11 } }
            },
            y: {
              min: 0, max: 1000,
              grid: { color: 'rgba(255,255,255,0.03)' },
              ticks: {
                stepSize: 200,
                font: { size: 11 },
                callback: v => v
              }
            }
          },
          plugins: {
            tooltip: {
              backgroundColor: 'rgba(12, 18, 34, 0.95)',
              borderColor: 'rgba(45, 212, 191, 0.2)',
              borderWidth: 1,
              titleFont: { family: "'Space Grotesk', sans-serif", weight: '600', size: 13 },
              bodyFont: { size: 12 },
              padding: 12,
              cornerRadius: 8,
              displayColors: false,
              callbacks: {
                title: items => 'Tanggal: ' + items[0].label,
                label: item => 'Skor: ' + item.raw + ' / 1000'
              }
            }
          },
          animation: {
            duration: 1200,
            easing: 'easeOutQuart'
          }
        }
      });

      chartInstances.push(chart);
    }

    /* ========================================
       CHART 2: Transaksi Per Hari (Bar)
    ======================================== */
    function renderTxChart(labels, txData) {
      const ctx = document.getElementById('txChart');
      if (!ctx) return;

      const counts = txData.map(d => d.count);
      const maxCount = Math.max(...counts, 1);

      // Warna bar berdasarkan intensitas
      const barColors = counts.map(c => {
        const ratio = c / maxCount;
        if (ratio > 0.7) return 'rgba(245, 158, 11, 0.85)';
        if (ratio > 0.4) return 'rgba(245, 158, 11, 0.55)';
        return 'rgba(245, 158, 11, 0.3)';
      });

      const hoverColors = counts.map(() => 'rgba(245, 158, 11, 1)');

      const chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            data: counts,
            backgroundColor: barColors,
            hoverBackgroundColor: hoverColors,
            borderRadius: 4,
            borderSkipped: false,
            maxBarThickness: 18,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          scales: {
            x: {
              grid: { display: false },
              ticks: { maxRotation: 0, autoSkip: true, maxTicksLimit: 10, font: { size: 11 } }
            },
            y: {
              beginAtZero: true,
              grid: { color: 'rgba(255,255,255,0.03)' },
              ticks: {
                stepSize: Math.max(1, Math.ceil(maxCount / 5)),
                font: { size: 11 },
                precision: 0
              }
            }
          },
          plugins: {
            tooltip: {
              backgroundColor: 'rgba(12, 18, 34, 0.95)',
              borderColor: 'rgba(245, 158, 11, 0.2)',
              borderWidth: 1,
              titleFont: { family: "'Space Grotesk', sans-serif", weight: '600', size: 13 },
              bodyFont: { size: 12 },
              padding: 12,
              cornerRadius: 8,
              displayColors: false,
              callbacks: {
                title: items => 'Tanggal: ' + items[0].label,
                label: item => item.raw + ' transaksi'
              }
            }
          },
          animation: {
            duration: 1000,
            easing: 'easeOutQuart',
            delay: (context) => context.dataIndex * 30
          }
        }
      });

      chartInstances.push(chart);
    }

    /* ========================================
       CHART 3: Success Rate Trend (Line)
    ======================================== */
    function renderRateChart(labels, rateData) {
      const ctx = document.getElementById('rateChart');
      if (!ctx) return;

      const rates = rateData.map(d => d.rate);

      // Gradient fill
      const canvas = ctx;
      const context = canvas.getContext('2d');
      const gradient = context.createLinearGradient(0, 0, 0, canvas.parentElement.clientHeight || 260);
      gradient.addColorStop(0, 'rgba(34, 197, 94, 0.2)');
      gradient.addColorStop(0.5, 'rgba(34, 197, 94, 0.04)');
      gradient.addColorStop(1, 'rgba(34, 197, 94, 0.0)');

      // Garis rata-rata 95%
      const avgLine = Array(labels.length).fill(95);

      const chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Success Rate',
              data: rates,
              borderColor: '#22c55e',
              borderWidth: 2.5,
              backgroundColor: gradient,
              fill: true,
              tension: 0.4,
              pointBackgroundColor: '#22c55e',
              pointBorderColor: '#060a13',
              pointHoverBackgroundColor: '#fff',
              pointHoverBorderColor: '#22c55e',
            },
            {
              label: 'Target',
              data: avgLine,
              borderColor: 'rgba(245, 158, 11, 0.4)',
              borderWidth: 1.5,
              borderDash: [6, 4],
              fill: false,
              tension: 0,
              pointRadius: 0,
              pointHoverRadius: 0,
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          scales: {
            x: {
              grid: { display: false },
              ticks: { maxRotation: 0, autoSkip: true, maxTicksLimit: 10, font: { size: 11 } }
            },
            y: {
              min: Math.max(0, Math.min(...rates) - 10),
              max: 100,
              grid: { color: 'rgba(255,255,255,0.03)' },
              ticks: {
                stepSize: 10,
                font: { size: 11 },
                callback: v => v + '%'
              }
            }
          },
          plugins: {
            legend: {
              display: true,
              position: 'top',
              align: 'end',
              labels: {
                boxWidth: 12, boxHeight: 2,
                padding: 16,
                font: { size: 11 },
                usePointStyle: false,
                color: '#94a3b8',
              }
            },
            tooltip: {
              backgroundColor: 'rgba(12, 18, 34, 0.95)',
              borderColor: 'rgba(34, 197, 94, 0.2)',
              borderWidth: 1,
              titleFont: { family: "'Space Grotesk', sans-serif", weight: '600', size: 13 },
              bodyFont: { size: 12 },
              padding: 12,
              cornerRadius: 8,
              callbacks: {
                title: items => 'Tanggal: ' + items[0].label,
                label: item => {
                  if (item.datasetIndex === 0) return 'Success Rate: ' + item.raw.toFixed(1) + '%';
                  return 'Target: ' + item.raw + '%';
                }
              }
            }
          },
          animation: {
            duration: 1200,
            easing: 'easeOutQuart'
          }
        }
      });

      chartInstances.push(chart);
    }

    /* ========================================
       DATA GENERATORS (lokal untuk chart)
    ======================================== */

    /**
     * Transaksi per hari — 30 hari terakhir
     */
    function generateTxPerDay(transactions) {
      const now = Date.now();
      const days = [];

      for (let i = 29; i >= 0; i--) {
        const dayStart = new Date(now - i * 86400000);
        dayStart.setHours(0, 0, 0, 0);
        const dayEnd = new Date(dayStart.getTime() + 86400000);

        const count = transactions.filter(t => t.timestamp >= dayStart.getTime() && t.timestamp < dayEnd.getTime()).length;

        days.push({
          date: dayStart.toISOString().split('T')[0],
          count: count
        });
      }

      return days;
    }

    /**
     * Success rate harian — 30 hari terakhir
     * Minimal 1 tx per hari untuk dihitung, else null
     */
    function generateSuccessRateTrend(transactions) {
      const now = Date.now();
      const days = [];

      for (let i = 29; i >= 0; i--) {
        const dayStart = new Date(now - i * 86400000);
        dayStart.setHours(0, 0, 0, 0);
        const dayEnd = new Date(dayStart.getTime() + 86400000);

        const dayTxs = transactions.filter(t => t.timestamp >= dayStart.getTime() && t.timestamp < dayEnd.getTime());

        if (dayTxs.length > 0) {
          const success = dayTxs.filter(t => t.status === 'success').length;
          days.push({
            date: dayStart.toISOString().split('T')[0],
            rate: parseFloat(((success / dayTxs.length) * 100).toFixed(1))
          });
        } else {
          // Interpolasi: gunakan rate terdekat yang valid, atau 95 default
          const prevValid = days.slice().reverse().find(d => d.rate !== null);
          days.push({
            date: dayStart.toISOString().split('T')[0],
            rate: prevValid ? prevValid.rate : 95.0
          });
        }
      }

      return days;
    }
  </script>
