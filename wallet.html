<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Wallet Detail — Real Blockchain Health Score</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  
  <!-- Pi SDK WAJIB ada untuk akses on-chain -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    :root {
      --bg-primary: #060a13;
      --bg-secondary: #0c1222;
      --bg-card: rgba(14, 22, 42, 0.65);
      --border-color: rgba(45, 212, 191, 0.12);
      --border-color-hover: rgba(45, 212, 191, 0.3);
      --border-subtle: rgba(255, 255, 255, 0.06);
      --accent: #2dd4bf;
      --accent-dim: rgba(45, 212, 191, 0.12);
      --accent-glow: rgba(45, 212, 191, 0.2);
      --accent-secondary: #f59e0b;
      --accent-secondary-dim: rgba(245, 158, 11, 0.12);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #475569;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-full: 9999px;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --topbar-height: 56px;
      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body { font-family: var(--font-body); background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; overflow-x: hidden; min-height: 100vh; }
    a { color: inherit; text-decoration: none; transition: color var(--transition-fast); }
    button { font-family: var(--font-body); cursor: pointer; border: none; outline: none; background: none; }

    .bg-atmosphere { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .bg-atmosphere .orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.18; animation: orbFloat 25s ease-in-out infinite; }
    .orb-1 { width: 320px; height: 320px; background: radial-gradient(circle, rgba(45,212,191,0.12) 0%, transparent 70%); top: -8%; left: -5%; }
    .orb-2 { width: 260px; height: 260px; background: radial-gradient(circle, rgba(245,158,11,0.06) 0%, transparent 70%); bottom: -8%; right: -5%; animation-delay: -10s; animation-duration: 28s; }
    @keyframes orbFloat { 0%, 100% { transform: translate(0,0) scale(1); } 33% { transform: translate(15px,-20px) scale(1.03); } 66% { transform: translate(-10px,10px) scale(0.97); } }

    .topbar { height: var(--topbar-height); padding: 0 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-subtle); background: rgba(6,10,19,0.85); backdrop-filter: blur(16px); position: sticky; top: 0; z-index: 40; }
    .topbar-left { display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1; }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; font-size: 0.82rem; font-weight: 600; color: var(--accent); border: 1px solid var(--border-color); border-radius: var(--radius-full); transition: all var(--transition-fast); white-space: nowrap; flex-shrink: 0; background: var(--accent-dim); }
    .back-btn:hover { background: rgba(45,212,191,0.18); border-color: var(--border-color-hover); box-shadow: 0 0 16px var(--accent-glow); }
    .topbar-title { font-family: var(--font-display); font-size: 1rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
    .topbar-right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .topbar-btn { width: 36px; height: 36px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 0.9rem; transition: all var(--transition-fast); }
    .topbar-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
    .btn-logout { display: inline-flex; align-items: center; gap: 4px; padding: 6px 10px; font-size: 0.78rem; font-weight: 500; color: var(--text-muted); border-radius: var(--radius-full); transition: all var(--transition-fast); white-space: nowrap; }
    .btn-logout:hover { color: var(--danger); background: rgba(239,68,68,0.08); }
    .btn-logout .logout-text { display: none; }

    #mainWrapper { display: none; flex-direction: column; min-height: 100vh; position: relative; z-index: 1; }
    .page-content { flex: 1; padding: 20px 16px 32px; }

    .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; min-height: 60vh; text-align: center; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(45,212,191,0.15); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-screen p { font-size: 0.88rem; color: var(--text-muted); }
    .loading-sub { font-size: 0.75rem; color: var(--accent); opacity: 0.7; margin-top: -8px; }

    .identity-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 20px; position: relative; overflow: hidden; margin-bottom: 20px; }
    .identity-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0.5; }
    .identity-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; position: relative; z-index: 1; }
    .identity-left { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }
    .identity-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #0d9488); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; color: var(--bg-primary); font-family: var(--font-display); font-weight: 700; box-shadow: 0 0 20px var(--accent-glow); flex-shrink: 0; }
    .identity-info { flex: 1; min-width: 0; }
    .identity-info h1 { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; line-height: 1.3; }
    .identity-uid-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
    .identity-uid-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; background: var(--accent-dim); border: 1px solid var(--border-color); border-radius: var(--radius-full); font-family: 'Space Grotesk', monospace; font-size: 0.65rem; font-weight: 600; color: var(--accent); }
    .identity-uid-badge i { font-size: 0.55rem; }
    .identity-uid-text { font-family: 'Space Grotesk', monospace; font-size: 0.68rem; color: var(--text-muted); word-break: break-all; }
    .identity-meta { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; font-size: 0.72rem; color: var(--text-muted); }
    .identity-meta span { display: flex; align-items: center; gap: 4px; }
    .identity-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-sm { display: inline-flex; align-items: center; gap: 5px; padding: 7px 12px; font-size: 0.75rem; font-weight: 500; border-radius: var(--radius-full); transition: all var(--transition-fast); border: 1px solid var(--border-subtle); color: var(--text-secondary); }
    .btn-sm:hover { border-color: var(--border-color); color: var(--accent); background: var(--accent-dim); }
    .score-est-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); border-radius: var(--radius-full); font-size: 0.6rem; font-weight: 600; color: var(--success); margin-left: 6px; }

    .identity-stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border-subtle); position: relative; z-index: 1; }
    .identity-stat { text-align: center; }
    .identity-stat-value { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; }
    .identity-stat-label { font-size: 0.68rem; color: var(--text-muted); margin-top: 1px; }

    .section { margin-bottom: 20px; }
    .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .section-icon { width: 32px; height: 32px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 0.82rem; }
    .section-icon.teal { background: var(--accent-dim); color: var(--accent); }
    .section-icon.amber { background: var(--accent-secondary-dim); color: var(--accent-secondary); }
    .section-icon.red { background: rgba(239,68,68,0.12); color: var(--danger); }
    .section-icon.green { background: rgba(34,197,94,0.12); color: var(--success); }
    .section-icon.blue { background: rgba(59,130,246,0.12); color: var(--info); }
    .section-title { font-family: var(--font-display); font-size: 0.95rem; font-weight: 600; }
    .section-subtitle { font-size: 0.72rem; color: var(--text-muted); margin-left: auto; }

    .card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); overflow: hidden; }
    .card-body { padding: 18px; }

    .score-detail-grid { display: grid; grid-template-columns: 1fr; gap: 0; }
    .breakdown-list { display: flex; flex-direction: column; gap: 18px; }
    .breakdown-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; gap: 8px; }
    .breakdown-label { font-size: 0.82rem; font-weight: 500; color: var(--text-secondary); display: flex; align-items: center; gap: 7px; white-space: nowrap; }
    .breakdown-label i { font-size: 0.7rem; width: 14px; text-align: center; }
    .breakdown-values { font-family: var(--font-display); font-size: 0.82rem; font-weight: 600; white-space: nowrap; }
    .breakdown-values .bv-score { color: var(--text-primary); }
    .breakdown-values .bv-max { color: var(--text-muted); font-weight: 400; }
    .breakdown-values .bv-detail { color: var(--text-muted); font-weight: 400; font-size: 0.72rem; margin-left: 4px; }
    .breakdown-bar { height: 8px; background: rgba(255,255,255,0.04); border-radius: var(--radius-full); overflow: hidden; position: relative; }
    .breakdown-bar-fill { height: 100%; border-radius: var(--radius-full); transition: width 1.4s cubic-bezier(0.4,0,0.2,1); width: 0; }
    .breakdown-bar-fill.teal { background: linear-gradient(90deg, #0d9488, var(--accent), #5eead4); }
    .breakdown-bar-fill.green { background: linear-gradient(90deg, #16a34a, #4ade80); }
    .breakdown-bar-fill.amber { background: linear-gradient(90deg, #d97706, #fbbf24); }
    .breakdown-bar-fill.mixed-green { background: linear-gradient(90deg, #16a34a, #4ade80); }
    .breakdown-bar-fill.mixed-amber { background: linear-gradient(90deg, #d97706, #fbbf24); }
    .breakdown-bar-fill.mixed-red { background: linear-gradient(90deg, #dc2626, #f87171); }
    .breakdown-bar-marker { position: absolute; top: -2px; bottom: -2px; width: 2px; background: var(--text-primary); border-radius: 1px; z-index: 2; opacity: 0.6; }
    .breakdown-explain { font-size: 0.72rem; color: var(--text-muted); margin-top: 5px; line-height: 1.5; }

    .why-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
    .why-card { padding: 16px; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); }
    .why-card-top { display: flex; align-items: flex-start; gap: 12px; }
    .why-card-icon { width: 34px; height: 34px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 0.85rem; flex-shrink: 0; }
    .why-card-icon.positive { background: rgba(34,197,94,0.1); color: var(--success); }
    .why-card-icon.negative { background: rgba(239,68,68,0.1); color: var(--danger); }
    .why-card-icon.neutral { background: rgba(59,130,246,0.1); color: var(--info); }
    .why-card-body { flex: 1; min-width: 0; }
    .why-card-title { font-family: var(--font-display); font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; }
    .why-card-text { font-size: 0.78rem; color: var(--text-secondary); line-height: 1.55; }
    .why-card-impact { display: inline-flex; align-items: center; gap: 4px; font-size: 0.7rem; font-weight: 600; margin-top: 8px; padding: 2px 8px; border-radius: var(--radius-full); }
    .why-card-impact.positive { color: var(--success); background: rgba(34,197,94,0.1); }
    .why-card-impact.negative { color: var(--danger); background: rgba(239,68,68,0.1); }
    .why-card-impact.neutral { color: var(--info); background: rgba(59,130,246,0.1); }

    .risk-overview { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
    .risk-metric { padding: 14px 10px; background: rgba(255,255,255,0.02); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); text-align: center; }
    .risk-metric-value { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; }
    .risk-metric-label { font-size: 0.68rem; color: var(--text-muted); margin-top: 2px; }

    .risk-flag-list { display: flex; flex-direction: column; gap: 10px; }
    .risk-flag-card { display: flex; gap: 12px; padding: 14px; background: rgba(239,68,68,0.03); border: 1px solid rgba(239,68,68,0.1); border-radius: var(--radius-md); }
    .risk-flag-card.severity-critical { border-left: 3px solid #ef4444; }
    .risk-flag-card.severity-high { border-left: 3px solid #f97316; }
    .risk-flag-card.severity-medium { border-left: 3px solid #f59e0b; }
    .risk-flag-card.severity-low { border-left: 3px solid #3b82f6; }
    .risk-flag-icon { width: 32px; height: 32px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 0.78rem; }
    .risk-flag-card.severity-critical .risk-flag-icon { background: rgba(239,68,68,0.15); color: #f87171; }
    .risk-flag-card.severity-high .risk-flag-icon { background: rgba(249,115,22,0.15); color: #fb923c; }
    .risk-flag-card.severity-medium .risk-flag-icon { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .risk-flag-card.severity-low .risk-flag-icon { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .risk-flag-content { flex: 1; min-width: 0; }
    .risk-flag-header { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
    .risk-flag-label { font-size: 0.82rem; font-weight: 600; }
    .severity-tag { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 1px 6px; border-radius: 4px; }
    .severity-tag.critical { background: rgba(239,68,68,0.2); color: #f87171; }
    .severity-tag.high { background: rgba(249,115,22,0.2); color: #fb923c; }
    .severity-tag.medium { background: rgba(245,158,11,0.2); color: #fbbf24; }
    .severity-tag.low { background: rgba(59,130,246,0.2); color: #60a5fa; }
    .risk-flag-desc { font-size: 0.75rem; color: var(--text-muted); line-height: 1.5; }
    .risk-flag-penalty { font-family: var(--font-display); font-size: 0.78rem; font-weight: 700; color: var(--danger); white-space: nowrap; align-self: flex-start; margin-top: 2px; }
    .no-flags-full { text-align: center; padding: 36px 20px; background: rgba(34,197,94,0.03); border: 1px solid rgba(34,197,94,0.1); border-radius: var(--radius-md); }
    .no-flags-full i { font-size: 2rem; color: var(--success); opacity: 0.5; margin-bottom: 10px; }
    .no-flags-full h4 { font-family: var(--font-display); font-size: 0.95rem; font-weight: 600; margin-bottom: 4px; }
    .no-flags-full p { font-size: 0.82rem; color: var(--text-muted); max-width: 360px; margin: 0 auto; }

    /* CSS TAMBAHAN HANYA UNTUK BUKTI ON-CHAIN (Proof Table) */
    .proof-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
    .proof-table th { padding: 12px; text-align: left; color: var(--text-muted); font-weight: 600; border-bottom: 1px solid var(--border-subtle); }
    .proof-table td { padding: 10px 12px; border-bottom: 1px solid var(--border-subtle); }
    .tx-hash { color: var(--info); font-family: monospace; text-decoration: underline; text-underline-offset: 2px; }
    .tx-hash:hover { color: var(--accent); }
    .mono { font-family: 'Space Grotesk', monospace; color: var(--text-secondary); font-size: 0.7rem; }
    .val { text-align: right; font-family: var(--font-display); font-weight: 600; }
    .status-badge { padding: 2px 8px; border-radius: var(--radius-full); font-size: 0.65rem; font-weight: 700; }
    .status-badge.success { color: var(--success); background: rgba(34,197,94,0.1); }
    .status-badge.failed { color: var(--danger); background: rgba(239,68,68,0.1); }

    .guard-screen { display: none; position: fixed; inset: 0; z-index: 500; background: var(--bg-primary); flex-direction: column; align-items: center; justify-content: center; gap: 20px; text-align: center; padding: 24px; }
    .guard-screen.active { display: flex; }
    .guard-screen i { font-size: 2.2rem; color: var(--text-muted); opacity: 0.4; }
    .guard-screen h2 { font-family: var(--font-display); font-size: 1.3rem; font-weight: 600; }
    .guard-screen p { font-size: 0.9rem; color: var(--text-muted); max-width: 320px; line-height: 1.5; }
    .guard-screen .guard-detail { font-size: 0.75rem; color: var(--danger); margin-top: -8px; opacity: 0.7; }
    .btn-primary { display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600; font-size: 0.88rem; padding: 12px 28px; border-radius: var(--radius-full); transition: all var(--transition-base); color: var(--bg-primary); background: linear-gradient(135deg, var(--accent), #0d9488); box-shadow: 0 0 20px var(--accent-glow); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 0 30px var(--accent-glow), 0 4px 16px rgba(45,212,191,0.2); }

    .toast-container { position: fixed; top: 68px; left: 16px; right: 16px; z-index: 200; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
    .toast { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--bg-secondary); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); box-shadow: 0 8px 32px rgba(0,0,0,0.5); font-size: 0.82rem; color: var(--text-primary); transform: translateY(-20px); opacity: 0; transition: all var(--transition-base); pointer-events: auto; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast i { font-size: 1rem; flex-shrink: 0; }
    .toast.success { border-left: 3px solid var(--success); } .toast.success i { color: var(--success); }
    .toast.error { border-left: 3px solid var(--danger); } .toast.error i { color: var(--danger); }
    .toast.info { border-left: 3px solid var(--info); } .toast.info i { color: var(--info); }
    .toast.warning { border-left: 3px solid var(--warning); } .toast.warning i { color: var(--warning); }

    @media (min-width: 640px) {
      .page-content { padding: 24px 20px 40px; }
      .topbar { padding: 0 24px; }
      .btn-logout .logout-text { display: inline; }
      .identity-card { padding: 24px; }
      .identity-avatar { width: 56px; height: 56px; font-size: 1.6rem; }
      .identity-info h1 { font-size: 1.2rem; }
      .identity-stats-row { grid-template-columns: repeat(5, 1fr); gap: 14px; }
      .card-body { padding: 22px; }
      .score-detail-grid { grid-template-columns: 1fr 1fr; gap: 24px; }
      .why-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
    }
    @media (min-width: 900px) {
      .page-content { padding: 28px 32px 48px; max-width: 900px; margin: 0 auto; }
      .identity-card { padding: 32px; border-radius: var(--radius-xl); }
      .identity-avatar { width: 64px; height: 64px; font-size: 1.8rem; }
      .identity-info h1 { font-size: 1.35rem; }
      .identity-stats-row { margin-top: 24px; padding-top: 24px; }
      .section-title { font-size: 1.05rem; }
      .risk-metric { padding: 20px; }
      .risk-metric-value { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <div class="bg-atmosphere" aria-hidden="true"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

  <div class="guard-screen" id="guardScreen">
    <i class="fa-solid fa-lock"></i>
    <h2>Belum Masuk</h2>
    <p>Anda harus login dengan akun Pi Network terlebih dahulu.</p>
    <p class="guard-detail" id="guardDetail"></p>
    <a href="login.html" class="btn-primary"><i class="fa-solid fa-arrow-right-to-bracket"></i> Masuk via Pi Network</a>
  </div>

  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <div id="mainWrapper">
    <header class="topbar">
      <div class="topbar-left">
        <a href="dashboard.html" class="back-btn" aria-label="Kembali ke dashboard">
          <i class="fa-solid fa-arrow-left"></i><span>Kembali</span>
        </a>
        <h1 class="topbar-title">On-Chain Wallet Health</h1>
      </div>
      <div class="topbar-right">
        <button class="topbar-btn" id="refreshBtn" aria-label="Refresh On-Chain" title="Fetch ulang dari Blockchain">
          <i class="fa-solid fa-arrows-rotate"></i>
        </button>
        <button class="btn-logout" id="logoutBtn">
          <i class="fa-solid fa-right-from-bracket"></i>
          <span class="logout-text">Keluar</span>
        </button>
      </div>
    </header>
    <main class="page-content" id="pageContent">
      <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner"></div>
        <p>Menganalisis On-Chain Data...</p>
        <p class="loading-sub">Menghubungi Node Blockchain via Backend API</p>
      </div>
    </main>
  </div>

  <script>
    /* ╔════════════════════════════════════════════════════════════════╗
       ║  KONFIGURASI BACKEND API                                     ║
       ║  TIDAK ADA API KEY DI SINI (AMAN)                            ║
       ║  Kita memanggil /api/analyze yang ada di Vercel Serverless    ║
       ╚════════════════════════════════════════════════════════════════╝ */
    var API_BASE = '/api/analyze'; 

    /* ╔════════════════════════════════════════════════════════════════╗
       ║  UTILITAS UMUM                                               ║
       ╚════════════════════════════════════════════════════════════════╝ */

    function showToast(msg, type, dur) {
      type = type || 'info'; dur = dur || 3000;
      var c = document.getElementById('toastContainer');
      var t = document.createElement('div');
      t.className = 'toast ' + type;
      var ic = { success:'fa-circle-check', error:'fa-circle-xmark', info:'fa-circle-info', warning:'fa-triangle-exclamation' };
      t.innerHTML = '<i class="fa-solid ' + (ic[type]||ic.info) + '"></i><span>' + msg + '</span>';
      c.appendChild(t);
      requestAnimationFrame(function() { requestAnimationFrame(function() { t.classList.add('show'); }); });
      setTimeout(function() { t.classList.remove('show'); setTimeout(function() { t.remove(); }, 300); }, dur);
    }

    function escapeHtml(str) {
      var d = document.createElement('div');
      d.appendChild(document.createTextNode(str || ''));
      return d.innerHTML;
    }

    function formatNumber(n) { return (n || 0).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
    function safeGet(k)  { try { return localStorage.getItem(k); } catch(e) { return null; } }
    function safeDel(k)  { try { localStorage.removeItem(k); } catch(e) {} }

    var verifiedUser = null;

    /* ╔════════════════════════════════════════════════════════════════╗
       ║  VERIFY SESSION (MENGAMBIL WALLET ASLI DARI PI SDK)         ║
       ╚════════════════════════════════════════════════════════════════╝ */

    function verifySession() {
      var raw = safeGet('whs_pi_user');
      var localUser = null;
      try { if (raw) localUser = JSON.parse(raw); } catch(e) {}

      if (!localUser || !localUser.username) {
        return { ok: false, reason: 'no_local_data' };
      }

      // PRIORITY: Wallet address asli dari Pi SDK Auth result
      var walletAddress = localUser.wallet_address || localUser.uid || localUser.username;
      
      return { 
        ok: true, 
        uid: localUser.uid || localUser.username, 
        username: localUser.username,
        wallet: walletAddress 
      };
    }

    /* ╔════════════════════════════════════════════════════════════════╗
       ║  FETCH REAL ON-CHAIN DATA VIA BACKEND                       ║
       ╚════════════════════════════════════════════════════════════════╝ */

    async function fetchOnChainData(walletAddress) {
      var res = await fetch(API_BASE + '?wallet=' + encodeURIComponent(walletAddress));
      
      if (!res.ok) {
        var errText = ''; try { errText = await res.text(); } catch(e){}
        throw new Error('API Error ' + res.status + ': ' + errText);
      }
      
      return await res.json();
    }

    /* ╔════════════════════════════════════════════════════════════════╗
       ║  HITUNG SKOR DARI DATA ON-CHAIN YANG SUDAH DIVALIDASI       ║
       ╚════════════════════════════════════════════════════════════════╝ */

    function calculateRealScore(chainData) {
      var m = chainData.metrics;
      var r = chainData.risk;

      var srScore = Math.min(250, Math.round((m.success_rate / 100) * 250));
      var volScore = Math.min(250, Math.round(m.tx_total * 5));

      var ageDays = m.age_days_on_chain;
      var ageScore = 0; // Jika 0 tx, age juga 0 (bukan 50 seperti fake data)
      if (ageDays >= 365) ageScore = 250;
      else if (ageDays >= 180) ageScore = 220;
      else if (ageDays >= 90) ageScore = 180;
      else if (ageDays >= 30) ageScore = 100;

      var riskScore = Math.max(0, 250 - r.penalty);
      var totalScore = srScore + volScore + ageScore + riskScore;

      var networkAvg = 580; 
      var vsNetwork = totalScore - networkAvg;

      var status, statusColor;
      if (totalScore >= 800)      { status = 'Excellent'; statusColor = 'var(--success)'; }
      else if (totalScore >= 600) { status = 'Good'; statusColor = 'var(--accent)'; }
      else if (totalScore >= 400) { status = 'Fair'; statusColor = 'var(--warning)'; }
      else                   { status = 'Poor'; statusColor = 'var(--danger)'; }

      return {
        score: totalScore, networkAvg: networkAvg, vsNetwork: vsNetwork, status: status, statusColor: statusColor,
        breakdown: {
          successRate: { label: 'Success Rate', score: srScore, max: 250 },
          volume:       { label: 'Volume', score: volScore, max: 250, value: m.tx_total },
          age:          { label: 'On-Chain Age', score: ageScore, max: 250 },
          risk:         { label: 'Risk Assessment', score: riskScore, max: 250, penalty: r.penalty }
        },
        rawMetrics: m,
        riskFlags: r.flags
      };
    }

    /* ╔════════════════════════════════════════════════════════════════╗
       ║  INIT APP                                                    ║
       ╚════════════════════════════════════════════════════════════════╝ */

    async function initApp() {
      var guardScreen  = document.getElementById('guardScreen');
      var mainWrapper  = document.getElementById('mainWrapper');
      var loadingScreen = document.getElementById('loadingScreen');
      var guardDetail  = document.getElementById('guardDetail');

      var authResult = verifySession();

      if (!authResult.ok) {
        mainWrapper.style.display = 'none';
        guardScreen.classList.add('active');
        loadingScreen.style.display = 'none';
        guardDetail.textContent = 'Tidak menemukan sesi login yang valid.';
        return;
      }

      verifiedUser = authResult;

      try {
        var chainData = await fetchOnChainData(verifiedUser.wallet);
        var scoreData = calculateRealScore(chainData);

        mainWrapper.style.display = 'flex';
        loadingScreen.style.display = 'none';

        render({
          walletAddress: verifiedUser.wallet,
          username: verifiedUser.username,
          source: chainData.source || 'evm_blockchain',
          scoreData: scoreData,
          proofTxs: chainData.proofTxs || [] // Data Tx Hash Asli dari Backend
        });

        showToast('Data On-Chain berhasil dianalisis', 'success', 3000);

      } catch (e) {
        console.error('[CHAIN] Fatal error:', e);
        mainWrapper.style.display = 'flex';
        loadingScreen.style.display = 'none';
        document.getElementById('pageContent').innerHTML = 
          '<div style="text-align:center;padding:60px 20px;">' +
            '<i class="fa-solid fa-link-slash" style="font-size:2rem;color:var(--danger);opacity:0.5;margin-bottom:12px;display:block;"></i>' +
            '<h3 style="font-family:var(--font-display);margin-bottom:8px;">Gagal Terhubung ke Blockchain</h3>' +
            '<p style="color:var(--text-muted);font-size:0.82rem;max-width:320px;margin:0 auto 20px;line-height:1.6;">Tidak bisa mengambil data on-chain. Pastikan file /api/analyze.js sudah benar dan API Key BSC valid.</p>' +
            '<button class="btn-primary" onclick="location.reload()" style="font-size:0.82rem;padding:10px 24px;"><i class="fa-solid fa-arrows-rotate"></i> Coba Lagi</button>' +
            '<p style="color:var(--text-muted);font-size:0.7rem;margin-top:16px;opacity:0.5;">' + escapeHtml(e.message) + '</p>' +
          '</div>';
      }
    }

    /* ╔════════════════════════════════════════════════════════════════╗
       ║  RENDER UI (STRUKTUR HTML TIDAK BERUBAH)                     ║
       ╚════════════════════════════════════════════════════════════════╝ */

    function render(data) {
      var pc = document.getElementById('pageContent');
      var sd = data.scoreData;
      var m = sd.rawMetrics;
      var safeAddr = escapeHtml(data.walletAddress);
      
      var vsText = sd.vsNetwork >= 0 ? '+' + sd.vsNetwork : '' + sd.vsNetwork;
      var vsClass = sd.vsNetwork >= 0 ? 'color:var(--success)' : 'color:var(--danger)';
      
      var criticalCount = 0, highCount = 0;
      for (var r = 0; r < sd.riskFlags.length; r++) {
        if (sd.riskFlags[r].severity === 'critical') criticalCount++;
        if (sd.riskFlags[r].severity === 'high') highCount++;
      }
      var totalPenalty = sd.breakdown.risk.penalty;
      var networkAvgPct = Math.round((sd.networkAvg / 4) / 250 * 100);
      var ageDisplay = m.age_days_on_chain >= 30 ? Math.floor(m.age_days_on_chain/30) + ' bulan' : m.age_days_on_chain + ' hari';

      var html = '';
      
      // Identity Card
      html += '<div class="identity-card"><div class="identity-top"><div class="identity-left"><div class="identity-avatar">&pi;</div><div class="identity-info"><h1>' + escapeHtml('@' + data.username) + '<span class="score-est-badge"><i class="fa-solid fa-link"></i> On-Chain</span></h1><div class="identity-uid-row"><span class="identity-uid-badge"><i class="fa-solid fa-fingerprint"></i> Wallet</span><span class="identity-uid-text">' + safeAddr + '</span></div><div class="identity-meta"><span><i class="fa-solid fa-shield-halved" style="color:' + sd.statusColor + '"></i> <b style="color:' + sd.statusColor + '">' + sd.status + '</b></span><span><i class="fa-regular fa-clock"></i> ' + ageDisplay + ' on-chain</span><span><i class="fa-solid fa-cubes" style="color:var(--info)"></i> Sumber: ' + escapeHtml(data.source) + '</span></div></div></div><div class="identity-actions"><button class="btn-sm" id="copyUidBtn"><i class="fa-regular fa-copy"></i> Salin</button></div></div>';
      
      html += '<div class="identity-stats-row"><div class="identity-stat"><div class="identity-stat-value" style="color:var(--accent);" id="animScore">0</div><div class="identity-stat-label">Health Score</div></div><div class="identity-stat"><div class="identity-stat-value" id="animTx">0</div><div class="identity-stat-label">Total Tx</div></div><div class="identity-stat"><div class="identity-stat-value" id="animRate">0%</div><div class="identity-stat-label">Success Rate</div></div><div class="identity-stat"><div class="identity-stat-value" style="color:' + (sd.riskFlags.length > 0 ? 'var(--danger)' : 'var(--success)') + ';">' + sd.riskFlags.length + '</div><div class="identity-stat-label">Risk Flags</div></div><div class="identity-stat"><div class="identity-stat-value" style="' + vsClass + '">' + vsText + '</div><div class="identity-stat-label">vs Network Avg</div></div></div></div>';

      // Breakdown
      html += '<div class="section"><div class="section-header"><div class="section-icon teal"><i class="fa-solid fa-chart-bar"></i></div><h2 class="section-title">Breakdown Skor On-Chain</h2><span class="section-subtitle">Maks 250 poin/kategori</span></div><div class="card"><div class="card-body"><div class="score-detail-grid"><div class="breakdown-list">' + renderBreakdown(sd.breakdown.successRate, 'teal', 'fa-circle-check', m.success_rate + '%', 'Persentase transaksi yang berhasil di verifikasi blockchain.', networkAvgPct) + renderBreakdown(sd.breakdown.volume, 'green', 'fa-arrow-right-arrow-left', formatNumber(m.tx_total) + ' tx', 'Total volume transaksi nyata di blockchain.', networkAvgPct) + '</div><div class="breakdown-list">' + renderBreakdown(sd.breakdown.age, 'amber', 'fa-clock', ageDisplay, 'Usia wallet dihitung dari transaksi pertama kali di blockchain.', networkAvgPct) + renderBreakdownRisk(sd.breakdown.risk, networkAvgPct) + '</div></div></div></div></div>';

      // Why
      html += '<div class="section"><div class="section-header"><div class="section-icon blue"><i class="fa-solid fa-lightbulb"></i></div><h2 class="section-title">Mengapa Skor Ini?</h2></div><div class="why-grid">' + generateWhyCards(sd, m) + '</div></div>';

      // Risk
      html += '<div class="section"><div class="section-header"><div class="section-icon red"><i class="fa-solid fa-triangle-exclamation"></i></div><h2 class="section-title">Analisis Risiko On-Chain</h2><span class="section-subtitle">' + sd.riskFlags.length + ' flag terdeteksi</span></div><div class="card"><div class="card-body">';
      html += '<div class="risk-overview"><div class="risk-metric"><div class="risk-metric-value" style="color:' + (criticalCount>0?'var(--danger)':'var(--success)') + '">' + criticalCount + '</div><div class="risk-metric-label">Critical</div></div><div class="risk-metric"><div class="risk-metric-value" style="color:' + (highCount>0?'var(--warning)':'var(--success)') + '">' + highCount + '</div><div class="risk-metric-label">High</div></div><div class="risk-metric"><div class="risk-metric-value" style="color:' + (totalPenalty>0?'var(--danger)':'var(--success)') + '">-' + totalPenalty + '</div><div class="risk-metric-label">Total Penalty</div></div></div>';

      if (sd.riskFlags.length === 0) {
        html += '<div class="no-flags-full"><i class="fa-solid fa-shield-halved"></i><h4>Wallet Bersih</h4><p>Tidak ada indikasi risiko dari analisa on-chain.</p></div>';
      } else {
        html += '<div class="risk-flag-list">';
        var penaltyMap = { critical: 80, high: 50, medium: 30, low: 10 };
        var severityIcons = { critical:'fa-skull-crossbones', high:'fa-circle-exclamation', medium:'fa-triangle-exclamation', low:'fa-circle-info' };
        for (var f = 0; f < sd.riskFlags.length; f++) {
          var flag = sd.riskFlags[f];
          html += '<div class="risk-flag-card severity-' + (flag.severity||'low') + '"><div class="risk-flag-icon"><i class="fa-solid ' + (severityIcons[flag.severity]||'fa-circle-info') + '"></i></div><div class="risk-flag-content"><div class="risk-flag-header"><span class="risk-flag-label">' + escapeHtml(flag.label) + '</span><span class="severity-tag ' + (flag.severity||'low') + '">' + (flag.severity||'low') + '</span></div><div class="risk-flag-desc">' + escapeHtml(flag.description) + '</div></div><div class="risk-flag-penalty">-' + (penaltyMap[flag.severity]||0) + '</div></div>';
        }
        html += '</div>';
      }
      html += '</div></div></div>';

      // PROOF OF ON-CHAIN (Tabel Bukti Fisik Blockchain)
      if (data.proofTxs && data.proofTxs.length > 0) {
        html += '<div class="section"><div class="section-header"><div class="section-icon green"><i class="fa-solid fa-link"></i></div><h2 class="section-title">Proof of On-Chain</h2><span class="section-subtitle">Klik hash untuk verifikasi</span></div><div class="card"><div class="card-body" style="padding:0; overflow-x:auto;">';
        html += '<table class="proof-table"><thead><tr><th>Tx Hash</th><th>Block</th><th>Dari / Ke</th><th class="val">Value</th><th style="text-align:center">Status</th></tr></thead><tbody>';
        for (var p = 0; p < data.proofTxs.length; p++) {
          var tx = data.proofTxs[p];
          html += '<tr>';
          html += '<td><a href="https://bscscan.com/tx/' + tx.hash + '" target="_blank" class="tx-hash">' + tx.hash.substring(0, 8) + '... <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:0.6rem;opacity:0.4;"></i></a></td>';
          html += '<td style="color:var(--text-muted)">' + tx.block + '</td>';
          html += '<td class="mono">' + tx.from.substring(0, 6) + '... → ' + tx.to.substring(0, 6) + '...</td>';
          html += '<td class="val">' + tx.value + ' BNB</td>';
          html += '<td style="text-align:center"><span class="status-badge ' + (tx.status === 'SUCCESS' ? 'success' : 'failed') + '">' + tx.status + '</span></td>';
          html += '</tr>';
        }
        html += '</tbody></table></div></div></div>';
      }
      
      pc.innerHTML = html;

      // Event Listeners
      document.getElementById('copyUidBtn').addEventListener('click', function() {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(data.walletAddress).then(function() { showToast('Wallet Address disalin', 'success', 2000); }).catch(function() { fallbackCopy(data.walletAddress); });
        } else { fallbackCopy(data.walletAddress); }
      });

      // Animasi
      requestAnimationFrame(function() {
        animateCounter('animScore', 0, sd.score, 1200);
        animateCounter('animTx', 0, m.tx_total, 1000);
        animateCounter('animRate', 0, m.success_rate, 1000, '%', 1);
        setTimeout(function() {
          var bars = document.querySelectorAll('.breakdown-bar-fill');
          for (var b = 0; b < bars.length; b++) { bars[b].style.width = bars[b].getAttribute('data-width') + '%'; }
        }, 200);
      });
    }

    function renderBreakdown(item, colorClass, icon, displayVal, explain, avgPct) {
      var pct = Math.round((item.score / item.max) * 100);
      var markerPct = Math.min(100, Math.max(0, avgPct));
      var colorVar = colorClass === 'teal' ? 'accent' : colorClass === 'green' ? 'success' : 'warning';
      return '<div class="breakdown-item"><div class="breakdown-item-header"><span class="breakdown-label"><i class="fa-solid ' + icon + '" style="color:var(--' + colorVar + ')"></i> ' + item.label + '</span><span class="breakdown-values"><span class="bv-score">' + item.score + '</span><span class="bv-max">/' + item.max + '</span><span class="bv-detail">(' + displayVal + ')</span></span></div><div class="breakdown-bar"><div class="breakdown-bar-fill ' + colorClass + '" data-width="' + pct + '"></div><div class="breakdown-bar-marker" style="left:' + markerPct + '%;"></div></div><div class="breakdown-explain">' + explain + '</div></div>';
    }

    function renderBreakdownRisk(item, avgPct) {
      var pct = Math.round((item.score / item.max) * 100);
      var colorClass = pct >= 70 ? 'mixed-green' : pct >= 40 ? 'mixed-amber' : 'mixed-red';
      var displayVal = item.penalty > 0 ? '-' + item.penalty + ' poin penalty' : 'Tidak ada penalty';
      var explain = item.penalty === 0 ? 'Tidak ada penalti risiko on-chain.' : item.penalty <= 30 ? 'Penalti ringan.' : item.penalty <= 80 ? 'Penalti sedang.' : 'Penalti berat.';
      var markerPct = Math.min(100, Math.max(0, avgPct));
      return '<div class="breakdown-item"><div class="breakdown-item-header"><span class="breakdown-label"><i class="fa-solid fa-shield-halved" style="color:var(--danger)"></i> ' + item.label + '</span><span class="breakdown-values"><span class="bv-score">' + item.score + '</span><span class="bv-max">/' + item.max + '</span><span class="bv-detail">(' + displayVal + ')</span></span></div><div class="breakdown-bar"><div class="breakdown-bar-fill ' + colorClass + '" data-width="' + pct + '"></div><div class="breakdown-bar-marker" style="left:' + markerPct + '%;"></div></div><div class="breakdown-explain">' + explain + '</div></div>';
    }

    function generateWhyCards(sd, m) {
      var cards = [];
      
      if (m.tx_total === 0) {
        cards.push({ icon: 'fa-hourglass-start', type: 'neutral', title: 'Belum Ada Transaksi On-Chain', text: 'Wallet ini belum memiliki riwayat transaksi di blockchain. Skor akan meningkat otomatis saat ada aktivitas.', impact: '0 / 500 poin (SR + Vol)', impactType: 'neutral' });
      } else {
        if (m.success_rate >= 90) cards.push({ icon: 'fa-circle-check', type: 'positive', title: 'Tingkat Keberhasilan Tinggi', text: m.success_rate + '% dari ' + m.tx_total + ' transaksi berhasil dikonfirmasi blockchain.', impact: '+' + sd.breakdown.successRate.score + ' poin', impactType: 'positive' });
        else if (m.success_rate < 50 && m.tx_total > 5) cards.push({ icon: 'fa-circle-xmark', type: 'negative', title: 'Banyak Transaksi Gagal', text: 'Terdapat ' + m.tx_failed + ' transaksi gagal dari total ' + m.tx_total + '.', impact: '+' + sd.breakdown.successRate.score + ' poin', impactType: 'negative' });
        
        if (m.tx_total > 20) cards.push({ icon: 'fa-chart-line', type: 'positive', title: 'Volume Aktivitas Tinggi', text: 'Sudah melakukan ' + m.tx_total + ' transaksi di blockchain.', impact: '+' + sd.breakdown.volume.score + ' poin', impactType: 'positive' });
      }
      
      if (m.age_days_on_chain >= 180) cards.push({ icon: 'fa-calendar-check', type: 'positive', title: 'Wallet Mapan', text: 'Aktif di blockchain selama lebih dari 6 bulan.', impact: '+' + sd.breakdown.age.score + ' poin', impactType: 'positive' });
      else if (m.age_days_on_chain === 0) cards.push({ icon: 'fa-clock', type: 'neutral', title: 'Usia On-Chain Unknown', text: 'Belum bisa dihitung karena belum ada transaksi pertama.', impact: '+' + sd.breakdown.age.score + ' poin', impactType: 'neutral' });

      if (sd.riskFlags.length === 0) cards.push({ icon: 'fa-shield-halved', type: 'positive', title: 'Profil Risiko Bersih', text: 'Analisa on-chain tidak menemukan indikasi penyalahgunaan.', impact: 'Penuh (250/250)', impactType: 'positive' });
      else cards.push({ icon: 'fa-triangle-exclamation', type: 'negative', title: 'Terdapat Risk Flags On-Chain', text: 'Ditemukan ' + sd.riskFlags.length + ' tanda bahaya dari analisa blockchain.', impact: '-' + sd.breakdown.risk.penalty + ' poin penalty', impactType: 'negative' });

      var html = '';
      for (var i = 0; i < cards.length; i++) {
        var c = cards[i];
        html += '<div class="why-card"><div class="why-card-top"><div class="why-card-icon ' + c.type + '"><i class="fa-solid ' + c.icon + '"></i></div><div class="why-card-body"><div class="why-card-title">' + c.title + '</div><div class="why-card-text">' + c.text + '</div><div class="why-card-impact ' + c.type + '"><i class="fa-solid ' + (c.type === 'positive' ? 'fa-arrow-up' : c.type === 'negative' ? 'fa-arrow-down' : 'fa-minus') + '"></i> ' + c.impact + '</div></div></div></div>';
      }
      return html;
    }

    function animateCounter(id, start, end, duration, suffix, decimals) {
      suffix = suffix || ''; decimals = decimals || 0;
      var el = document.getElementById(id); if (!el) return;
      var range = end - start; var startTime = null;
      function step(timestamp) {
        if (!startTime) startTime = timestamp;
        var progress = Math.min((timestamp - startTime) / duration, 1);
        var ease = 1 - Math.pow(1 - progress, 3);
        var current = start + (range * ease);
        el.textContent = (decimals > 0 ? current.toFixed(decimals) : Math.floor(current)) + suffix;
        if (progress < 1) { requestAnimationFrame(step); } else { el.textContent = (decimals > 0 ? end.toFixed(decimals) : end) + suffix; }
      }
      requestAnimationFrame(step);
    }

    function fallbackCopy(text) {
      var textArea = document.createElement("textarea"); textArea.value = text; textArea.style.position = "fixed"; textArea.style.left = "-9999px"; document.body.appendChild(textArea); textArea.focus(); textArea.select();
      try { document.execCommand('copy'); showToast('Wallet Address disalin', 'success', 2000); } catch (err) { showToast('Gagal menyalin', 'error', 2000); }
      document.body.removeChild(textArea);
    }

    document.getElementById('refreshBtn').addEventListener('click', function() {
      var btn = this; var icon = btn.querySelector('i'); icon.classList.add('fa-spin'); btn.disabled = true;
      fetchOnChainData(verifiedUser.wallet).then(function(chainData) {
        var scoreData = calculateRealScore(chainData);
        render({ walletAddress: verifiedUser.wallet, username: verifiedUser.username, source: chainData.source, scoreData: scoreData, proofTxs: chainData.proofTxs || [] });
        showToast('Data On-Chain diperbarui', 'success');
      }).catch(function(e) { showToast('Gagal fetch on-chain: ' + e.message, 'error'); }).finally(function() { icon.classList.remove('fa-spin'); btn.disabled = false; });
    });

    document.getElementById('logoutBtn').addEventListener('click', function() {
      safeDel('whs_pi_user'); safeDel('whs_login_time'); safeDel('whs_pi_token');
      try { if(window.Pi && window.Pi.auth) window.Pi.auth.signOut(); } catch(e){}
      showToast('Sesi berakhir', 'info', 1500);
      setTimeout(function() { window.location.href = 'login.html'; }, 800);
    });

    document.addEventListener('DOMContentLoaded', initApp);
  </script>
</body>
</html>
