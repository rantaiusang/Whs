<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Wallet Detail — Wallet Health Score</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    :root {
      --bg-primary: #060a13;
      --bg-secondary: #0c1222;
      --bg-card: rgba(14, 22, 42, 0.65);
      --bg-card-hover: rgba(20, 32, 58, 0.75);
      --bg-input: rgba(6, 10, 19, 0.6);
      --border-color: rgba(45, 212, 191, 0.12);
      --border-color-hover: rgba(45, 212, 191, 0.3);
      --border-subtle: rgba(255, 255, 255, 0.06);

      --accent: #2dd4bf;
      --accent-dim: rgba(45, 212, 191, 0.12);
      --accent-glow: rgba(45, 212, 191, 0.2);
      --accent-secondary: #f59e0b;
      --accent-secondary-dim: rgba(245, 158, 11, 0.12);

      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #475569;
      --text-accent: #2dd4bf;

      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-full: 9999px;

      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'DM Sans', sans-serif;

      --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
      --shadow-glow: 0 0 40px rgba(45, 212, 191, 0.06);

      --topbar-height: 56px;

      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font-body); background: var(--bg-primary);
      color: var(--text-primary); line-height: 1.6; overflow-x: hidden; min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; transition: color var(--transition-fast); }
    button { font-family: var(--font-body); cursor: pointer; border: none; outline: none; background: none; }

    /* Background */
    .bg-atmosphere {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .bg-atmosphere .orb {
      position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.18;
      animation: orbFloat 25s ease-in-out infinite; will-change: transform;
    }
    .bg-atmosphere .orb-1 {
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(45, 212, 191, 0.12) 0%, transparent 70%);
      top: -8%; left: -5%;
    }
    .bg-atmosphere .orb-2 {
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(245, 158, 11, 0.06) 0%, transparent 70%);
      bottom: -8%; right: -5%; animation-delay: -10s; animation-duration: 28s;
    }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(15px, -20px) scale(1.03); }
      66% { transform: translate(-10px, 10px) scale(0.97); }
    }

    /* ===== Topbar — Konsisten ===== */
    .topbar {
      height: var(--topbar-height); padding: 0 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border-subtle);
      background: rgba(6, 10, 19, 0.85); backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position: sticky; top: 0; z-index: 40;
    }
    .topbar-left {
      display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; font-size: 0.82rem; font-weight: 600;
      color: var(--accent); border: 1px solid var(--border-color);
      border-radius: var(--radius-full); transition: all var(--transition-fast);
      white-space: nowrap; flex-shrink: 0; background: var(--accent-dim);
    }
    .back-btn:hover {
      background: rgba(45, 212, 191, 0.18); border-color: var(--border-color-hover);
      box-shadow: 0 0 16px var(--accent-glow);
    }
    .back-btn:active { transform: scale(0.97); }
    .back-btn i { font-size: 0.8rem; }
    .topbar-title {
      font-family: var(--font-display); font-size: 1rem; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;
    }
    .topbar-right {
      display: flex; align-items: center; gap: 4px; flex-shrink: 0;
    }
    .topbar-btn {
      width: 36px; height: 36px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 0.9rem; transition: all var(--transition-fast);
    }
    .topbar-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
    .btn-logout {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 6px 10px; font-size: 0.78rem; font-weight: 500;
      color: var(--text-muted); border-radius: var(--radius-full); transition: all var(--transition-fast);
      white-space: nowrap;
    }
    .btn-logout:hover { color: var(--danger); background: rgba(239,68,68,0.08); }
    .btn-logout .logout-text { display: none; }

    /* ===== Main Wrapper ===== */
    #mainWrapper {
      display: none; flex-direction: column; min-height: 100vh; position: relative; z-index: 1;
    }

    /* ===== Page Content ===== */
    .page-content { flex: 1; padding: 20px 16px 32px; }

    /* ---- Wallet Identity Card ---- */
    .identity-card {
      background: var(--bg-card); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg); padding: 20px; position: relative; overflow: hidden;
      margin-bottom: 20px;
    }
    .identity-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0.5;
    }
    .identity-card::after {
      content: ''; position: absolute; top: -60px; right: -60px;
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(45,212,191,0.06), transparent 70%);
      pointer-events: none;
    }
    .identity-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 16px; flex-wrap: wrap; position: relative; z-index: 1;
    }
    .identity-left { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }
    .identity-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #0d9488);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; color: var(--bg-primary);
      font-family: var(--font-display); font-weight: 700;
      box-shadow: 0 0 20px var(--accent-glow); flex-shrink: 0;
    }
    .identity-info { flex: 1; min-width: 0; }
    .identity-info h1 {
      font-family: var(--font-display); font-size: 0.88rem; font-weight: 600;
      letter-spacing: 0.02em; word-break: break-all; line-height: 1.4;
    }
    .identity-meta {
      display: flex; flex-wrap: wrap; gap: 10px; margin-top: 6px;
      font-size: 0.72rem; color: var(--text-muted);
    }
    .identity-meta span { display: flex; align-items: center; gap: 4px; }
    .identity-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-sm {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 12px; font-size: 0.75rem; font-weight: 500;
      border-radius: var(--radius-full); transition: all var(--transition-fast);
      border: 1px solid var(--border-subtle); color: var(--text-secondary);
    }
    .btn-sm:hover { border-color: var(--border-color); color: var(--accent); background: var(--accent-dim); }

    .identity-stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
      margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border-subtle);
      position: relative; z-index: 1;
    }
    .identity-stat { text-align: center; }
    .identity-stat-value {
      font-family: var(--font-display); font-size: 1.1rem; font-weight: 700;
    }
    .identity-stat-label { font-size: 0.68rem; color: var(--text-muted); margin-top: 1px; }

    /* ---- Section System ---- */
    .section { margin-bottom: 20px; }
    .section-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
    }
    .section-icon {
      width: 32px; height: 32px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center; font-size: 0.82rem;
    }
    .section-icon.teal { background: var(--accent-dim); color: var(--accent); }
    .section-icon.amber { background: var(--accent-secondary-dim); color: var(--accent-secondary); }
    .section-icon.red { background: rgba(239,68,68,0.12); color: var(--danger); }
    .section-icon.green { background: rgba(34,197,94,0.12); color: var(--success); }
    .section-icon.blue { background: rgba(59,130,246,0.12); color: var(--info); }
    .section-title {
      font-family: var(--font-display); font-size: 0.95rem; font-weight: 600;
    }
    .section-subtitle {
      font-size: 0.72rem; color: var(--text-muted); margin-left: auto;
    }

    /* Card */
    .card {
      background: var(--bg-card); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg); overflow: hidden;
    }
    .card-body { padding: 18px; }

    /* ---- Score Detail Grid ---- */
    .score-detail-grid {
      display: grid; grid-template-columns: 1fr; gap: 0;
    }

    /* Breakdown */
    .breakdown-list { display: flex; flex-direction: column; gap: 18px; }
    .breakdown-item-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; gap: 8px;
    }
    .breakdown-label {
      font-size: 0.82rem; font-weight: 500; color: var(--text-secondary);
      display: flex; align-items: center; gap: 7px; white-space: nowrap;
    }
    .breakdown-label i { font-size: 0.7rem; width: 14px; text-align: center; }
    .breakdown-values {
      font-family: var(--font-display); font-size: 0.82rem; font-weight: 600;
      white-space: nowrap;
    }
    .breakdown-values .bv-score { color: var(--text-primary); }
    .breakdown-values .bv-max { color: var(--text-muted); font-weight: 400; }
    .breakdown-values .bv-detail {
      color: var(--text-muted); font-weight: 400; font-size: 0.72rem; margin-left: 4px;
    }
    .breakdown-bar {
      height: 8px; background: rgba(255,255,255,0.04);
      border-radius: var(--radius-full); overflow: hidden; position: relative;
    }
    .breakdown-bar-fill {
      height: 100%; border-radius: var(--radius-full);
      transition: width 1.4s cubic-bezier(0.4, 0, 0.2, 1); width: 0;
      position: relative;
    }
    .breakdown-bar-fill.teal { background: linear-gradient(90deg, #0d9488, var(--accent), #5eead4); }
    .breakdown-bar-fill.green { background: linear-gradient(90deg, #16a34a, #4ade80); }
    .breakdown-bar-fill.amber { background: linear-gradient(90deg, #d97706, #fbbf24); }
    .breakdown-bar-fill.red { background: linear-gradient(90deg, #dc2626, #f87171); }
    .breakdown-bar-fill.mixed-green { background: linear-gradient(90deg, #16a34a, #4ade80); }
    .breakdown-bar-fill.mixed-amber { background: linear-gradient(90deg, #d97706, #fbbf24); }
    .breakdown-bar-fill.mixed-red { background: linear-gradient(90deg, #dc2626, #f87171); }
    .breakdown-bar-marker {
      position: absolute; top: -2px; bottom: -2px; width: 2px;
      background: var(--text-primary); border-radius: 1px; z-index: 2; opacity: 0.6;
    }
    .breakdown-explain {
      font-size: 0.72rem; color: var(--text-muted); margin-top: 5px; line-height: 1.5;
    }

    /* ---- Why This Score ---- */
    .why-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
    .why-card {
      padding: 16px; border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle); transition: all var(--transition-fast);
    }
    .why-card:active { border-color: var(--border-color); background: var(--bg-card-hover); }
    .why-card-top {
      display: flex; align-items: flex-start; gap: 12px;
    }
    .why-card-icon {
      width: 34px; height: 34px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; flex-shrink: 0;
    }
    .why-card-icon.positive { background: rgba(34,197,94,0.1); color: var(--success); }
    .why-card-icon.negative { background: rgba(239,68,68,0.1); color: var(--danger); }
    .why-card-icon.neutral { background: rgba(59,130,246,0.1); color: var(--info); }
    .why-card-body { flex: 1; min-width: 0; }
    .why-card-title {
      font-family: var(--font-display); font-size: 0.85rem; font-weight: 600; margin-bottom: 4px;
    }
    .why-card-text { font-size: 0.78rem; color: var(--text-secondary); line-height: 1.55; }
    .why-card-impact {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.7rem; font-weight: 600; margin-top: 8px;
      padding: 2px 8px; border-radius: var(--radius-full);
    }
    .why-card-impact.positive { color: var(--success); background: rgba(34,197,94,0.1); }
    .why-card-impact.negative { color: var(--danger); background: rgba(239,68,68,0.1); }
    .why-card-impact.neutral { color: var(--info); background: rgba(59,130,246,0.1); }

    /* ---- Risk Analysis ---- */
    .risk-overview {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px;
    }
    .risk-metric {
      padding: 14px 10px; background: rgba(255,255,255,0.02);
      border: 1px solid var(--border-subtle); border-radius: var(--radius-md); text-align: center;
    }
    .risk-metric-value {
      font-family: var(--font-display); font-size: 1.3rem; font-weight: 700;
    }
    .risk-metric-label { font-size: 0.68rem; color: var(--text-muted); margin-top: 2px; }

    .risk-flag-list { display: flex; flex-direction: column; gap: 10px; }
    .risk-flag-card {
      display: flex; gap: 12px; padding: 14px;
      background: rgba(239,68,68,0.03); border: 1px solid rgba(239,68,68,0.1);
      border-radius: var(--radius-md); transition: all var(--transition-fast);
    }
    .risk-flag-card:active { background: rgba(239,68,68,0.06); }
    .risk-flag-card.severity-critical { border-left: 3px solid #ef4444; }
    .risk-flag-card.severity-high { border-left: 3px solid #f97316; }
    .risk-flag-card.severity-medium { border-left: 3px solid #f59e0b; }
    .risk-flag-card.severity-low { border-left: 3px solid #3b82f6; }
    .risk-flag-icon {
      width: 32px; height: 32px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      font-size: 0.78rem;
    }
    .risk-flag-card.severity-critical .risk-flag-icon { background: rgba(239,68,68,0.15); color: #f87171; }
    .risk-flag-card.severity-high .risk-flag-icon { background: rgba(249,115,22,0.15); color: #fb923c; }
    .risk-flag-card.severity-medium .risk-flag-icon { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .risk-flag-card.severity-low .risk-flag-icon { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .risk-flag-content { flex: 1; min-width: 0; }
    .risk-flag-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 3px;
    }
    .risk-flag-label { font-size: 0.82rem; font-weight: 600; }
    .severity-tag {
      font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; padding: 1px 6px; border-radius: 4px;
    }
    .severity-tag.critical { background: rgba(239,68,68,0.2); color: #f87171; }
    .severity-tag.high { background: rgba(249,115,22,0.2); color: #fb923c; }
    .severity-tag.medium { background: rgba(245,158,11,0.2); color: #fbbf24; }
    .severity-tag.low { background: rgba(59,130,246,0.2); color: #60a5fa; }
    .risk-flag-desc { font-size: 0.75rem; color: var(--text-muted); line-height: 1.5; }
    .risk-flag-penalty {
      font-family: var(--font-display); font-size: 0.78rem; font-weight: 700;
      color: var(--danger); white-space: nowrap; align-self: flex-start;
      margin-top: 2px;
    }

    .no-flags-full {
      text-align: center; padding: 36px 20px;
      background: rgba(34,197,94,0.03); border: 1px solid rgba(34,197,94,0.1);
      border-radius: var(--radius-md);
    }
    .no-flags-full i { font-size: 2rem; color: var(--success); opacity: 0.5; margin-bottom: 10px; }
    .no-flags-full h4 {
      font-family: var(--font-display); font-size: 0.95rem; font-weight: 600; margin-bottom: 4px;
    }
    .no-flags-full p { font-size: 0.82rem; color: var(--text-muted); max-width: 360px; margin: 0 auto; }

    /* Guard */
    .guard-screen {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: var(--bg-primary); flex-direction: column; align-items: center;
      justify-content: center; gap: 20px; text-align: center; padding: 24px;
    }
    .guard-screen.active { display: flex; }
    .guard-screen i { font-size: 2.2rem; color: var(--text-muted); opacity: 0.4; }
    .guard-screen h2 { font-family: var(--font-display); font-size: 1.3rem; font-weight: 600; }
    .guard-screen p { font-size: 0.9rem; color: var(--text-muted); max-width: 320px; line-height: 1.5; }
    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      font-family: var(--font-body); font-weight: 600; font-size: 0.88rem;
      padding: 12px 28px; border-radius: var(--radius-full); transition: all var(--transition-base);
      color: var(--bg-primary); background: linear-gradient(135deg, var(--accent), #0d9488);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 30px var(--accent-glow), 0 4px 16px rgba(45,212,191,0.2);
    }

    /* Toast */
    .toast-container {
      position: fixed; top: 68px; left: 16px; right: 16px;
      z-index: 200; display: flex; flex-direction: column; gap: 8px; pointer-events: none;
    }
    .toast {
      display: flex; align-items: center; gap: 10px; padding: 12px 16px;
      background: var(--bg-secondary); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md); box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      font-size: 0.82rem; color: var(--text-primary);
      transform: translateY(-20px); opacity: 0;
      transition: all var(--transition-base); pointer-events: auto;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast i { font-size: 1rem; flex-shrink: 0; }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.success i { color: var(--success); }
    .toast.error { border-left: 3px solid var(--danger); }
    .toast.error i { color: var(--danger); }
    .toast.info { border-left: 3px solid var(--info); }
    .toast.info i { color: var(--info); }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ========================================
       RESPONSIVE — Tablet
    ======================================== */
    @media (min-width: 640px) {
      .page-content { padding: 24px 20px 40px; }
      .topbar { padding: 0 24px; }
      .topbar-title { font-size: 1.05rem; }
      .btn-logout .logout-text { display: inline; }
      .identity-card { padding: 24px; }
      .identity-avatar { width: 56px; height: 56px; font-size: 1.15rem; }
      .identity-info h1 { font-size: 0.95rem; }
      .identity-stats-row { grid-template-columns: repeat(5, 1fr); gap: 14px; }
      .identity-stat-value { font-size: 1.2rem; }
      .card-body { padding: 22px; }
      .score-detail-grid { grid-template-columns: 1fr 1fr; gap: 24px; }
      .why-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
    }

    /* ========================================
       RESPONSIVE — Desktop
    ======================================== */
    @media (min-width: 900px) {
      .page-content {
        padding: 28px 32px 48px;
        max-width: 900px;
        margin: 0 auto;
      }
      .identity-card { padding: 32px; border-radius: var(--radius-xl); }
      .identity-avatar { width: 64px; height: 64px; font-size: 1.3rem; }
      .identity-info h1 { font-size: 1.15rem; }
      .identity-stats-row { margin-top: 24px; padding-top: 24px; }
      .identity-stat-value { font-size: 1.3rem; }
      .section-title { font-size: 1.05rem; }
      .risk-overview { gap: 16px; }
      .risk-metric { padding: 20px; }
      .risk-metric-value { font-size: 1.6rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <div class="bg-atmosphere" aria-hidden="true"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

  <!-- Guard -->
  <div class="guard-screen" id="guardScreen">
    <i class="fa-solid fa-lock"></i>
    <h2>Belum Masuk</h2>
    <p>Anda harus login dengan wallet address terlebih dahulu.</p>
    <a href="login.html" class="btn-primary"><i class="fa-solid fa-arrow-right-to-bracket"></i> Masuk Sekarang</a>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <!-- Main -->
  <div id="mainWrapper">

    <header class="topbar">
      <div class="topbar-left">
        <a href="index.html" class="back-btn" aria-label="Kembali ke beranda">
          <i class="fa-solid fa-arrow-left"></i>
          <span>Kembali</span>
        </a>
        <h1 class="topbar-title">Wallet Detail</h1>
      </div>
      <div class="topbar-right">
        <button class="topbar-btn" id="refreshBtn" aria-label="Refresh" title="Refresh">
          <i class="fa-solid fa-arrows-rotate"></i>
        </button>
        <button class="btn-logout" id="logoutBtn">
          <i class="fa-solid fa-right-from-bracket"></i>
          <span class="logout-text">Keluar</span>
        </button>
      </div>
    </header>

    <main class="page-content" id="pageContent"></main>

  </div>

  <script src="js/data.js"></script>
  <script>
    /* ========================================
       Utilitas
    ======================================== */
    function showToast(msg, type, dur) {
      type = type || 'info';
      dur = dur || 3000;
      var c = document.getElementById('toastContainer');
      var t = document.createElement('div');
      t.className = 'toast ' + type;
      var ic = { success: 'fa-circle-check', error: 'fa-circle-xmark', info: 'fa-circle-info' };
      t.innerHTML = '<i class="fa-solid ' + (ic[type] || ic.info) + '"></i><span>' + msg + '</span>';
      c.appendChild(t);
      requestAnimationFrame(function() {
        requestAnimationFrame(function() { t.classList.add('show'); });
      });
      setTimeout(function() {
        t.classList.remove('show');
        setTimeout(function() { t.remove(); }, 300);
      }, dur);
    }

    function escapeHtml(str) {
      var d = document.createElement('div');
      d.appendChild(document.createTextNode(str));
      return d.innerHTML;
    }

    function formatNumber(n) {
      return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    function formatETH(v) {
      if (v === undefined || v === null) return '0 ETH';
      if (v >= 1) return v.toFixed(4) + ' ETH';
      if (v >= 0.001) return v.toFixed(6) + ' ETH';
      return v.toFixed(8) + ' ETH';
    }

    /* ========================================
       Auth Guard
    ======================================== */
    var walletAddress = localStorage.getItem('whs_wallet');
    if (!walletAddress) {
      document.getElementById('guardScreen').classList.add('active');
    } else {
      document.getElementById('mainWrapper').style.display = 'flex';
      init(walletAddress);
    }

    /* ========================================
       Logout
    ======================================== */
    document.getElementById('logoutBtn').addEventListener('click', function() {
      localStorage.removeItem('whs_wallet');
      localStorage.removeItem('whs_login_time');
      sessionStorage.removeItem('currentWallet');
      sessionStorage.removeItem('walletData');
      showToast('Berhasil keluar', 'info', 2000);
      setTimeout(function() { window.location.href = 'login.html'; }, 600);
    });

    /* ========================================
       Refresh
    ======================================== */
    document.getElementById('refreshBtn').addEventListener('click', function() {
      if (walletAddress) {
        var icon = document.querySelector('#refreshBtn i');
        icon.style.animation = 'spin 0.6s linear';
        setTimeout(function() { icon.style.animation = ''; }, 600);
        sessionStorage.removeItem('walletData');
        init(walletAddress);
        showToast('Data diperbarui', 'success', 2000);
      }
    });

    /* ========================================
       Init
    ======================================== */
    function init(addr) {
      var data = null;
      try {
        var stored = sessionStorage.getItem('walletData');
        if (stored) data = JSON.parse(stored);
      } catch (e) {}

      if (!data || data.walletAddress !== addr) {
        data = calculateCreditScore(addr);
        sessionStorage.setItem('walletData', JSON.stringify(data));
      }

      render(data);
    }

    /* ========================================
       RENDER
    ======================================== */
    function render(data) {
      var pc = document.getElementById('pageContent');
      var safeAddr = escapeHtml(data.walletAddress);

      /* Format umur */
      var ageText;
      if (data.walletAgeDays >= 365) {
        var y = Math.floor(data.walletAgeDays / 365);
        var m = Math.floor((data.walletAgeDays % 365) / 30);
        ageText = y + ' tahun' + (m > 0 ? ' ' + m + ' bulan' : '');
      } else if (data.walletAgeDays >= 30) {
        ageText = Math.floor(data.walletAgeDays / 30) + ' bulan';
      } else {
        ageText = data.walletAgeDays + ' hari';
      }

      /* Persentil */
      var vsNetwork = data.score - data.networkAvg;
      var vsText = vsNetwork >= 0 ? '+' + vsNetwork : '' + vsNetwork;
      var vsClass = vsNetwork >= 0 ? 'color:var(--success)' : 'color:var(--danger)';

      /* Risk summary */
      var criticalCount = 0, highCount = 0;
      for (var r = 0; r < data.riskFlags.length; r++) {
        if (data.riskFlags[r].severity === 'critical') criticalCount++;
        if (data.riskFlags[r].severity === 'high') highCount++;
      }
      var totalPenalty = data.breakdown.risk.penalty;

      /* Network avg marker position */
      var networkAvgPct = Math.round((data.networkAvg / 4) / 250 * 100);

      var html = '';

      /* ===== Identity Card ===== */
      html += '<div class="identity-card">'
        + '<div class="identity-top">'
        +   '<div class="identity-left">'
        +     '<div class="identity-avatar">' + data.walletAddress.slice(2, 4).toUpperCase() + '</div>'
        +     '<div class="identity-info">'
        +       '<h1>' + safeAddr + '</h1>'
        +       '<div class="identity-meta">'
        +         '<span><i class="fa-solid fa-shield-halved" style="color:' + data.statusColor + '"></i> <b style="color:' + data.statusColor + '">' + data.status + '</b></span>'
        +         '<span><i class="fa-regular fa-clock"></i> ' + ageText + '</span>'
        +         '<span><i class="fa-solid fa-gas-pump"></i> ' + formatETH(data.transactions.totalGasETH) + '</span>'
        +       '</div>'
        +     '</div>'
        +   '</div>'
        +   '<div class="identity-actions">'
        +     '<button class="btn-sm" id="copyAddrBtn"><i class="fa-regular fa-copy"></i> Salin</button>'
        +     '<button class="btn-sm" id="etherscanBtn"><i class="fa-solid fa-arrow-up-right-from-square"></i> Etherscan</button>'
        +   '</div>'
        + '</div>'
        + '<div class="identity-stats-row">'
        +   '<div class="identity-stat">'
        +     '<div class="identity-stat-value" style="color:var(--accent);" id="animScore">0</div>'
        +     '<div class="identity-stat-label">Credit Score</div>'
        +   '</div>'
        +   '<div class="identity-stat">'
        +     '<div class="identity-stat-value" id="animTx">0</div>'
        +     '<div class="identity-stat-label">Total Transaksi</div>'
        +   '</div>'
        +   '<div class="identity-stat">'
        +     '<div class="identity-stat-value" id="animRate">0%</div>'
        +     '<div class="identity-stat-label">Success Rate</div>'
        +   '</div>'
        +   '<div class="identity-stat">'
        +     '<div class="identity-stat-value" style="color:' + (data.riskFlags.length > 0 ? 'var(--danger)' : 'var(--success)') + ';">' + data.riskFlags.length + '</div>'
        +     '<div class="identity-stat-label">Risk Flags</div>'
        +   '</div>'
        +   '<div class="identity-stat">'
        +     '<div class="identity-stat-value" style="' + vsClass + '">' + vsText + '</div>'
        +     '<div class="identity-stat-label">vs Network Avg</div>'
        +   '</div>'
        + '</div>'
        + '</div>';

      /* ===== Score Breakdown ===== */
      html += '<div class="section">'
        + '<div class="section-header">'
        +   '<div class="section-icon teal"><i class="fa-solid fa-chart-bar"></i></div>'
        +   '<h2 class="section-title">Breakdown Skor</h2>'
        +   '<span class="section-subtitle">Maks 250 poin/kategori</span>'
        + '</div>'
        + '<div class="card"><div class="card-body">'
        + '<div class="score-detail-grid">';

      /* Kolom kiri: success rate + volume */
      html += '<div class="breakdown-list">';
      html += renderBreakdown(data.breakdown.successRate, 'teal', 'fa-circle-check',
        data.transactions.successRate + '%', getSuccessRateExplain(data.transactions.successRate), networkAvgPct);
      html += renderBreakdown(data.breakdown.volume, 'green', 'fa-arrow-right-arrow-left',
        formatNumber(data.breakdown.volume.value) + ' tx', getVolumeExplain(data.breakdown.volume.value), networkAvgPct);
      html += '</div>';

      /* Kolom kanan: age + risk */
      html += '<div class="breakdown-list">';
      html += renderBreakdown(data.breakdown.age, 'amber', 'fa-clock', ageText, getAgeExplain(data.walletAgeDays), networkAvgPct);
      html += renderBreakdownRisk(data.breakdown.risk, networkAvgPct);
      html += '</div>';

      html += '</div></div></div></div>';

      /* ===== Why This Score ===== */
      html += '<div class="section">'
        + '<div class="section-header">'
        +   '<div class="section-icon blue"><i class="fa-solid fa-lightbulb"></i></div>'
        +   '<h2 class="section-title">Mengapa Skor Ini?</h2>'
        + '</div>'
        + '<div class="why-grid">'
        + generateWhyCards(data)
        + '</div>'
        + '</div>';

      /* ===== Risk Analysis ===== */
      html += '<div class="section">'
        + '<div class="section-header">'
        +   '<div class="section-icon red"><i class="fa-solid fa-triangle-exclamation"></i></div>'
        +   '<h2 class="section-title">Analisis Risiko</h2>'
        +   '<span class="section-subtitle">' + data.riskFlags.length + ' flag terdeteksi</span>'
        + '</div>'
        + '<div class="card"><div class="card-body">';

      /* Risk overview metrics */
      html += '<div class="risk-overview">'
        + '<div class="risk-metric">'
        +   '<div class="risk-metric-value" style="color:' + (criticalCount > 0 ? 'var(--danger)' : 'var(--success)') + '">' + criticalCount + '</div>'
        +   '<div class="risk-metric-label">Critical</div>'
        + '</div>'
        + '<div class="risk-metric">'
        +   '<div class="risk-metric-value" style="color:' + (highCount > 0 ? 'var(--warning)' : 'var(--success)') + '">' + highCount + '</div>'
        +   '<div class="risk-metric-label">High</div>'
        + '</div>'
        + '<div class="risk-metric">'
        +   '<div class="risk-metric-value" style="color:' + (totalPenalty > 0 ? 'var(--danger)' : 'var(--success)') + '">-' + totalPenalty + '</div>'
        +   '<div class="risk-metric-label">Total Penalty</div>'
        + '</div>'
        + '</div>';

      /* Risk flags list */
      if (data.riskFlags.length === 0) {
        html += '<div class="no-flags-full">'
          + '<i class="fa-solid fa-shield-check"></i>'
          + '<h4>Wallet Bersih</h4>'
          + '<p>Tidak ada risk flag terdeteksi. Wallet menunjukkan perilaku transaksi yang sehat.</p>'
          + '</div>';
      } else {
        html += '<div class="risk-flag-list">';
        var penaltyMap = { critical: 80, high: 50, medium: 30, low: 10 };
        var severityIcons = { critical: 'fa-skull-crossbones', high: 'fa-circle-exclamation', medium: 'fa-triangle-exclamation', low: 'fa-circle-info' };

        for (var f = 0; f < data.riskFlags.length; f++) {
          var flag = data.riskFlags[f];
          html += '<div class="risk-flag-card severity-' + flag.severity + '">'
            + '<div class="risk-flag-icon"><i class="fa-solid ' + (severityIcons[flag.severity] || 'fa-circle-info') + '"></i></div>'
            + '<div class="risk-flag-content">'
            +   '<div class="risk-flag-header">'
            +     '<span class="risk-flag-label">' + escapeHtml(flag.label) + '</span>'
            +     '<span class="severity-tag ' + flag.severity + '">' + flag.severity + '</span>'
            +   '</div>'
            +   '<div class="risk-flag-desc">' + escapeHtml(flag.description) + '</div>'
            + '</div>'
            + '<div class="risk-flag-penalty">-' + (penaltyMap[flag.severity] || 0) + '</div>'
            + '</div>';
        }
        html += '</div>';
      }

      html += '</div></div></div>';

      pc.innerHTML = html;

      /* Bind events */
      document.getElementById('copyAddrBtn').addEventListener('click', function() {
        copyAddr(data.walletAddress);
      });
      document.getElementById('etherscanBtn').addEventListener('click', function() {
        window.open('https://etherscan.io/address/' + data.walletAddress, '_blank');
      });

      /* Animasi */
      requestAnimationFrame(function() {
        animateCounter('animScore', 0, data.score, 1200);
        animateCounter('animTx', 0, data.transactions.total, 1000);
        animateCounter('animRate', 0, data.transactions.successRate, 1000, '%', 1);
        setTimeout(function() {
          var bars = document.querySelectorAll('.breakdown-bar-fill');
          for (var b = 0; b < bars.length; b++) {
            bars[b].style.width = bars[b].getAttribute('data-width') + '%';
          }
        }, 200);
      });
    }

    /* ========================================
       Render Helpers
    ======================================== */
    function renderBreakdown(item, colorClass, icon, displayVal, explain, avgPct) {
      var pct = Math.round((item.score / item.max) * 100);
      var markerPct = Math.min(100, Math.max(0, avgPct));
      var colorVar = colorClass === 'teal' ? 'accent' : colorClass === 'green' ? 'success' : 'warning';

      return '<div class="breakdown-item">'
        + '<div class="breakdown-item-header">'
        +   '<span class="breakdown-label"><i class="fa-solid ' + icon + '" style="color:var(--' + colorVar + ')"></i> ' + item.label + '</span>'
        +   '<span class="breakdown-values">'
        +     '<span class="bv-score">' + item.score + '</span><span class="bv-max">/' + item.max + '</span>'
        +     '<span class="bv-detail">(' + displayVal + ')</span>'
        +   '</span>'
        + '</div>'
        + '<div class="breakdown-bar">'
        +   '<div class="breakdown-bar-fill ' + colorClass + '" data-width="' + pct + '"></div>'
        +   '<div class="breakdown-bar-marker" style="left:' + markerPct + '%;" title="Rata-rata network"></div>'
        + '</div>'
        + '<div class="breakdown-explain">' + explain + '</div>'
        + '</div>';
    }

    function renderBreakdownRisk(item, avgPct) {
      var pct = Math.round((item.score / item.max) * 100);
      var colorClass = pct >= 70 ? 'mixed-green' : pct >= 40 ? 'mixed-amber' : 'mixed-red';
      var displayVal = item.penalty > 0 ? '-' + item.penalty + ' poin penalty' : 'Tidak ada penalty';
      var explain;
      if (item.penalty === 0) {
        explain = 'Tidak ada penalti risiko. Wallet tidak terdeteksi memiliki interaksi berisiko.';
      } else if (item.penalty <= 30) {
        explain = 'Penalti ringan. Ditemukan beberapa indikator risiko minor.';
      } else if (item.penalty <= 80) {
        explain = 'Penalti sedang. Ada interaksi dengan entitas atau pola yang cukup mencurigakan.';
      } else {
        explain = 'Penalti berat. Terdeteksi interaksi serius dengan kontrak berbahaya atau pola berisiko tinggi.';
      }
      var markerPct = Math.min(100, Math.max(0, avgPct));

      return '<div class="breakdown-item">'
        + '<div class="breakdown-item-header">'
        +   '<span class="breakdown-label"><i class="fa-solid fa-shield-halved" style="color:var(--danger)"></i> ' + item.label + '</span>'
        +   '<span class="breakdown-values">'
        +     '<span class="bv-score">' + item.score + '</span><span class="bv-max">/' + item.max + '</span>'
        +     '<span class="bv-detail">(' + displayVal + ')</span>'
        +   '</span>'
        + '</div>'
        + '<div class="breakdown-bar">'
        +   '<div class="breakdown-bar-fill ' + colorClass + '" data-width="' + pct + '"></div>'
        +   '<div class="breakdown-bar-marker" style="left:' + markerPct + '%;" title="Rata-rata network"></div>'
        + '</div>'
        + '<div class="breakdown-explain">' + explain + '</div>'
        + '</div>';
    }

    /* ========================================
       Explain Functions
    ======================================== */
    function getSuccessRateExplain(rate) {
      if (rate >= 98) return 'Sangat baik. Hampir semua transaksi berhasil tanpa error.';
      if (rate >= 95) return 'Baik. Sebagian besar transaksi berhasil dengan sedikit kegagalan.';
      if (rate >= 90) return 'Cukup baik. Masih di atas rata-rata network.';
      if (rate >= 80) return 'Di bawah rata-rata. Jumlah transaksi gagal cukup signifikan.';
      return 'Rendah. Tingkat kegagalan tinggi, mengindikasikan masalah teknis atau percobaan tidak hati-hati.';
    }

    function getVolumeExplain(count) {
      if (count >= 500) return 'Volume sangat tinggi. Wallet sangat aktif di berbagai protokol.';
      if (count >= 200) return 'Volume tinggi. Keterlibatan aktif dalam ekosistem DeFi dan dApps.';
      if (count >= 50) return 'Volume menengah. Penggunaan cukup reguler dengan frekuensi wajar.';
      if (count >= 20) return 'Volume rendah-menengah. Digunakan sesekali untuk keperluan spesifik.';
      return 'Volume rendah. Sangat sedikit transaksi tercatat.';
    }

    function getAgeExplain(days) {
      if (days >= 730) return 'Lebih dari 2 tahun. Sinyal kepercayaan sangat kuat.';
      if (days >= 365) return 'Lebih dari 1 tahun. Menunjukkan konsistensi dan riwayat panjang.';
      if (days >= 180) return '6 bulan - 1 tahun. Sudah cukup untuk menunjukkan pola perilaku jelas.';
      if (days >= 90) return '3-6 bulan. Relatif baru, mulai membangun riwayat.';
      if (days >= 30) return '1-3 bulan. Terlalu baru untuk sinyal kepercayaan kuat.';
      return 'Kurang dari 1 bulan. Risiko tinggi karena kurangnya data.';
    }

    /* ========================================
       Why This Score Cards
    ======================================== */
    function generateWhyCards(data) {
      var cards = [];

      /* Success rate */
      if (data.transactions.successRate >= 95) {
        cards.push({ icon: 'fa-circle-check', type: 'positive', title: 'Success Rate Tinggi',
          text: data.transactions.successRate + '% dari ' + formatNumber(data.transactions.total) + ' transaksi berhasil. Menunjukkan pengelolaan wallet yang cermat.',
          impact: '+' + data.breakdown.successRate.score + ' poin', impactType: 'positive' });
      } else if (data.transactions.successRate >= 85) {
        cards.push({ icon: 'fa-circle-minus', type: 'neutral', title: 'Success Rate Moderat',
          text: data.transactions.successRate + '% success rate dengan ' + data.transactions.failed + ' transaksi gagal. Masih di batas wajar.',
          impact: '+' + data.breakdown.successRate.score + ' poin', impactType: 'neutral' });
      } else {
        cards.push({ icon: 'fa-circle-xmark', type: 'negative', title: 'Success Rate Rendah',
          text: 'Hanya ' + data.transactions.successRate + '% transaksi berhasil. ' + data.transactions.failed + ' dari ' + formatNumber(data.transactions.total) + ' gagal.',
          impact: '+' + data.breakdown.successRate.score + ' poin', impactType: 'negative' });
      }

      /* Volume */
      if (data.breakdown.volume.score >= 200) {
        cards.push({ icon: 'fa-fire', type: 'positive', title: 'Volume Transaksi Tinggi',
          text: formatNumber(data.transactions.total) + ' transaksi menunjukkan wallet sangat aktif.',
          impact: '+' + data.breakdown.volume.score + ' poin', impactType: 'positive' });
      } else if (data.breakdown.volume.score >= 100) {
        cards.push({ icon: 'fa-chart-line', type: 'neutral', title: 'Volume Transaksi Menengah',
          text: formatNumber(data.transactions.total) + ' transaksi. Cukup untuk gambaran perilaku.',
          impact: '+' + data.breakdown.volume.score + ' poin', impactType: 'neutral' });
      } else {
        cards.push({ icon: 'fa-chart-line', type: 'negative', title: 'Volume Transaksi Rendah',
          text: 'Hanya ' + formatNumber(data.transactions.total) + ' transaksi. Data terlalu sedikit.',
          impact: '+' + data.breakdown.volume.score + ' poin', impactType: 'negative' });
      }

      /* Umur */
      if (data.walletAgeDays >= 365) {
        cards.push({ icon: 'fa-hourglass-half', type: 'positive', title: 'Wallet Terpercaya',
          text: 'Aktif lebih dari ' + Math.floor(data.walletAgeDays / 365) + ' tahun. Sinyal kepercayaan kuat.',
          impact: '+' + data.breakdown.age.score + ' poin', impactType: 'positive' });
      } else if (data.walletAgeDays >= 90) {
        cards.push({ icon: 'fa-hourglass-start', type: 'neutral', title: 'Wallet Masih Berkembang',
          text: 'Usia ' + Math.floor(data.walletAgeDays / 30) + ' bulan. Skor akan meningkat seiring waktu.',
          impact: '+' + data.breakdown.age.score + ' poin', impactType: 'neutral' });
      } else {
        cards.push({ icon: 'fa-seedling', type: 'negative', title: 'Wallet Sangat Baru',
          text: 'Baru ' + data.walletAgeDays + ' hari. Kurangnya riwayat menyebabkan skor umur rendah.',
          impact: '+' + data.breakdown.age.score + ' poin', impactType: 'negative' });
      }

      /* Risk */
      if (data.riskFlags.length === 0) {
        cards.push({ icon: 'fa-shield-halved', type: 'positive', title: 'Tanpa Risk Flag',
          text: 'Tidak terdeteksi interaksi berisiko. Perilaku wallet bersih.',
          impact: '+' + data.breakdown.risk.score + ' poin', impactType: 'positive' });
      } else {
        var penalty = data.breakdown.risk.penalty;
        var topFlag = data.riskFlags.slice().sort(function(a, b) {
          var ord = { critical: 0, high: 1, medium: 2, low: 3 };
          return (ord[a.severity] || 4) - (ord[b.severity] || 4);
        })[0];
        cards.push({ icon: 'fa-triangle-exclamation', type: 'negative', title: data.riskFlags.length + ' Risk Flag',
          text: 'Flag teratas: "' + topFlag.label + '" (' + topFlag.severity + '). Total penalti: -' + penalty + ' poin.',
          impact: '-' + penalty + ' poin', impactType: 'negative' });
      }

      var arrowMap = { positive: 'fa-arrow-up', negative: 'fa-arrow-down', neutral: 'fa-minus' };
      var out = '';
      for (var c = 0; c < cards.length; c++) {
        var card = cards[c];
        out += '<div class="why-card">'
          + '<div class="why-card-top">'
          +   '<div class="why-card-icon ' + card.type + '"><i class="fa-solid ' + card.icon + '"></i></div>'
          +   '<div class="why-card-body">'
          +     '<div class="why-card-title">' + card.title + '</div>'
          +     '<div class="why-card-text">' + card.text + '</div>'
          +     '<span class="why-card-impact ' + card.impactType + '">'
          +       '<i class="fa-solid ' + (arrowMap[card.impactType] || 'fa-minus') + '"></i> '
          +       card.impact
          +     '</span>'
          +   '</div>'
          + '</div>'
          + '</div>';
      }
      return out;
    }

    /* ========================================
       Counter Animation
    ======================================== */
    function animateCounter(id, start, end, duration, suffix, decimals) {
      suffix = suffix || '';
      decimals = decimals || 0;
      var el = document.getElementById(id);
      if (!el) return;
      var st = performance.now();
      function update(now) {
        var p = Math.min((now - st) / duration, 1);
        var eased = 1 - Math.pow(1 - p, 3);
        var v = start + (end - start) * eased;
        el.textContent = (decimals > 0 ? v.toFixed(decimals) : Math.round(v)) + suffix;
        if (p < 1) requestAnimationFrame(update);
      }
      requestAnimationFrame(update);
    }

    /* ========================================
       Copy
    ======================================== */
    function copyAddr(a) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(a)
          .then(function() { showToast('Alamat disalin', 'success', 2000); })
          .catch(function() { fallbackCopy(a); });
      } else {
        fallbackCopy(a);
      }
    }

    function fallbackCopy(a) {
      var ta = document.createElement('textarea');
      ta.value = a;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand('copy');
        showToast('Alamat disalin', 'success', 2000);
      } catch(e) {
        showToast('Gagal menyalin', 'error');
      }
      document.body.removeChild(ta);
    }
  </script>
