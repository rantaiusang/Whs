<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wallet Detail — Wallet Health Score</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    :root {
      --bg-primary: #060a13;
      --bg-secondary: #0c1222;
      --bg-card: rgba(14, 22, 42, 0.65);
      --bg-card-hover: rgba(20, 32, 58, 0.75);
      --bg-sidebar: rgba(8, 14, 28, 0.92);
      --bg-input: rgba(6, 10, 19, 0.6);
      --border-color: rgba(45, 212, 191, 0.12);
      --border-color-hover: rgba(45, 212, 191, 0.3);
      --border-subtle: rgba(255, 255, 255, 0.06);

      --accent: #2dd4bf;
      --accent-dim: rgba(45, 212, 191, 0.12);
      --accent-glow: rgba(45, 212, 191, 0.2);
      --accent-secondary: #f59e0b;
      --accent-secondary-dim: rgba(245, 158, 11, 0.12);

      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #475569;
      --text-accent: #2dd4bf;

      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-full: 9999px;

      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'DM Sans', sans-serif;

      --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
      --shadow-glow: 0 0 40px rgba(45, 212, 191, 0.06);

      --sidebar-width: 260px;
      --topbar-height: 64px;

      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; transition: color var(--transition-fast); }
    button { font-family: var(--font-body); cursor: pointer; border: none; outline: none; background: none; }

    /* Background */
    .bg-atmosphere {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .bg-atmosphere .orb {
      position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.2;
      animation: orbFloat 25s ease-in-out infinite;
    }
    .bg-atmosphere .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(45, 212, 191, 0.1) 0%, transparent 70%);
      top: -10%; left: -5%;
    }
    .bg-atmosphere .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(245, 158, 11, 0.06) 0%, transparent 70%);
      bottom: -10%; right: -5%;
      animation-delay: -10s; animation-duration: 28s;
    }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -30px) scale(1.03); }
      66% { transform: translate(-15px, 15px) scale(0.97); }
    }
    .bg-noise {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; opacity: 0.02;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    /* Layout */
    .dashboard-layout { position: relative; z-index: 1; display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-subtle);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0;
      z-index: 50;
      transition: transform var(--transition-base);
    }
    .sidebar-brand {
      padding: 20px 24px; display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border-subtle);
      font-family: var(--font-display); font-weight: 700; font-size: 1.1rem;
    }
    .sidebar-brand-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), #0d9488);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; color: var(--bg-primary);
      box-shadow: 0 0 14px var(--accent-glow);
    }
    .sidebar-nav {
      flex: 1; padding: 16px 12px;
      display: flex; flex-direction: column; gap: 4px; overflow-y: auto;
    }
    .nav-section-label {
      font-size: 0.68rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--text-muted); padding: 16px 12px 8px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: var(--radius-md);
      font-size: 0.9rem; font-weight: 500; color: var(--text-secondary);
      transition: all var(--transition-fast); position: relative;
    }
    .nav-item i { width: 20px; text-align: center; font-size: 0.9rem; }
    .nav-item:hover { color: var(--text-primary); background: rgba(255,255,255,0.04); }
    .nav-item.active { color: var(--accent); background: var(--accent-dim); }
    .nav-item.active::before {
      content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      width: 3px; height: 20px; background: var(--accent); border-radius: 0 3px 3px 0;
    }
    .nav-item .badge {
      margin-left: auto; padding: 2px 8px; font-size: 0.7rem; font-weight: 600;
      border-radius: var(--radius-full); background: rgba(239,68,68,0.15); color: var(--danger);
    }
    .sidebar-footer { padding: 16px; border-top: 1px solid var(--border-subtle); }
    .sidebar-wallet {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      background: rgba(255,255,255,0.02); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md); cursor: pointer; transition: all var(--transition-fast);
    }
    .sidebar-wallet:hover { border-color: var(--border-color); background: rgba(255,255,255,0.04); }
    .sidebar-wallet-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-dim), rgba(45,212,191,0.25));
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; color: var(--accent);
      font-family: var(--font-display); font-weight: 700; flex-shrink: 0;
    }
    .sidebar-wallet-info { flex: 1; min-width: 0; }
    .sidebar-wallet-addr {
      font-family: 'Space Grotesk', monospace; font-size: 0.8rem; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sidebar-wallet-label { font-size: 0.7rem; color: var(--text-muted); }

    /* Main */
    .main-content {
      flex: 1; margin-left: var(--sidebar-width);
      display: flex; flex-direction: column; min-height: 100vh;
    }

    /* Topbar */
    .topbar {
      height: var(--topbar-height); padding: 0 32px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border-subtle);
      background: rgba(6,10,19,0.6); backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 40;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .sidebar-toggle {
      display: none; width: 36px; height: 36px; border-radius: var(--radius-sm);
      align-items: center; justify-content: center; color: var(--text-secondary);
      font-size: 1.1rem; transition: all var(--transition-fast);
    }
    .sidebar-toggle:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
    .topbar-breadcrumb {
      display: flex; align-items: center; gap: 8px; font-size: 0.85rem;
    }
    .topbar-breadcrumb a { color: var(--text-muted); }
    .topbar-breadcrumb a:hover { color: var(--accent); }
    .topbar-breadcrumb .sep { color: var(--text-muted); opacity: 0.4; }
    .topbar-breadcrumb .current { color: var(--text-primary); font-weight: 500; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .topbar-btn {
      width: 38px; height: 38px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 0.95rem; transition: all var(--transition-fast);
      position: relative;
    }
    .topbar-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
    .btn-logout {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 16px; font-size: 0.82rem; font-weight: 500;
      color: var(--text-muted); border-radius: var(--radius-full); transition: all var(--transition-fast);
    }
    .btn-logout:hover { color: var(--danger); background: rgba(239,68,68,0.08); }

    /* Page Content */
    .page-content { flex: 1; padding: 32px; max-width: 1100px; }

    /* ---- Wallet Identity Card ---- */
    .identity-card {
      background: var(--bg-card); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl); padding: 36px; position: relative; overflow: hidden;
      margin-bottom: 28px;
    }
    .identity-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0.5;
    }
    .identity-card::after {
      content: ''; position: absolute; top: -80px; right: -80px;
      width: 250px; height: 250px;
      background: radial-gradient(circle, rgba(45,212,191,0.06), transparent 70%);
      pointer-events: none;
    }
    .identity-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 24px; flex-wrap: wrap; position: relative; z-index: 1;
    }
    .identity-left { display: flex; align-items: center; gap: 20px; }
    .identity-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #0d9488);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; color: var(--bg-primary);
      font-family: var(--font-display); font-weight: 700;
      box-shadow: 0 0 30px var(--accent-glow); flex-shrink: 0;
    }
    .identity-info h1 {
      font-family: var(--font-display); font-size: 1.3rem; font-weight: 600;
      letter-spacing: 0.02em; word-break: break-all;
    }
    .identity-meta {
      display: flex; flex-wrap: wrap; gap: 16px; margin-top: 8px;
      font-size: 0.82rem; color: var(--text-muted);
    }
    .identity-meta span { display: flex; align-items: center; gap: 5px; }
    .identity-actions { display: flex; gap: 10px; flex-shrink: 0; }
    .btn-sm {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; font-size: 0.82rem; font-weight: 500;
      border-radius: var(--radius-full); transition: all var(--transition-fast);
      border: 1px solid var(--border-subtle); color: var(--text-secondary);
    }
    .btn-sm:hover { border-color: var(--border-color); color: var(--accent); background: var(--accent-dim); }

    .identity-stats-row {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px;
      margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--border-subtle);
      position: relative; z-index: 1;
    }
    .identity-stat { text-align: center; }
    .identity-stat-value {
      font-family: var(--font-display); font-size: 1.25rem; font-weight: 700;
    }
    .identity-stat-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

    /* ---- Section System ---- */
    .section { margin-bottom: 28px; }
    .section-header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    }
    .section-icon {
      width: 36px; height: 36px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center; font-size: 0.9rem;
    }
    .section-icon.teal { background: var(--accent-dim); color: var(--accent); }
    .section-icon.amber { background: var(--accent-secondary-dim); color: var(--accent-secondary); }
    .section-icon.red { background: rgba(239,68,68,0.12); color: var(--danger); }
    .section-icon.green { background: rgba(34,197,94,0.12); color: var(--success); }
    .section-icon.blue { background: rgba(59,130,246,0.12); color: var(--info); }
    .section-title {
      font-family: var(--font-display); font-size: 1.05rem; font-weight: 600;
    }
    .section-subtitle {
      font-size: 0.8rem; color: var(--text-muted); margin-left: auto;
    }

    /* Card */
    .card {
      background: var(--bg-card); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg); overflow: hidden;
    }
    .card-body { padding: 24px; }

    /* ---- Score Detail Grid ---- */
    .score-detail-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
    }

    /* Breakdown */
    .breakdown-list { display: flex; flex-direction: column; gap: 22px; }
    .breakdown-item-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
    }
    .breakdown-label {
      font-size: 0.88rem; font-weight: 500; color: var(--text-secondary);
      display: flex; align-items: center; gap: 8px;
    }
    .breakdown-label i { font-size: 0.75rem; width: 16px; text-align: center; }
    .breakdown-values {
      font-family: var(--font-display); font-size: 0.88rem; font-weight: 600;
    }
    .breakdown-values .bv-score { color: var(--text-primary); }
    .breakdown-values .bv-max { color: var(--text-muted); font-weight: 400; }
    .breakdown-values .bv-detail {
      color: var(--text-muted); font-weight: 400; font-size: 0.78rem; margin-left: 6px;
    }
    .breakdown-bar {
      height: 10px; background: rgba(255,255,255,0.04);
      border-radius: var(--radius-full); overflow: hidden; position: relative;
    }
    .breakdown-bar-fill {
      height: 100%; border-radius: var(--radius-full);
      transition: width 1.4s cubic-bezier(0.4, 0, 0.2, 1); width: 0;
      position: relative;
    }
    .breakdown-bar-fill.teal { background: linear-gradient(90deg, #0d9488, var(--accent), #5eead4); }
    .breakdown-bar-fill.green { background: linear-gradient(90deg, #16a34a, #4ade80); }
    .breakdown-bar-fill.amber { background: linear-gradient(90deg, #d97706, #fbbf24); }
    .breakdown-bar-fill.red { background: linear-gradient(90deg, #dc2626, #f87171); }
    .breakdown-bar-fill.mixed-green { background: linear-gradient(90deg, #16a34a, #4ade80); }
    .breakdown-bar-fill.mixed-amber { background: linear-gradient(90deg, #d97706, #fbbf24); }
    .breakdown-bar-fill.mixed-red { background: linear-gradient(90deg, #dc2626, #f87171); }
    .breakdown-bar-marker {
      position: absolute; top: -3px; bottom: -3px; width: 2px;
      background: var(--text-primary); border-radius: 1px; z-index: 2;
    }
    .breakdown-explain {
      font-size: 0.78rem; color: var(--text-muted); margin-top: 6px; line-height: 1.5;
    }

    /* ---- Why This Score ---- */
    .why-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .why-card {
      padding: 20px; border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle); transition: all var(--transition-fast);
    }
    .why-card:hover { border-color: var(--border-color); background: var(--bg-card-hover); }
    .why-card-icon {
      width: 40px; height: 40px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; margin-bottom: 14px;
    }
    .why-card-icon.positive { background: rgba(34,197,94,0.1); color: var(--success); }
    .why-card-icon.negative { background: rgba(239,68,68,0.1); color: var(--danger); }
    .why-card-icon.neutral { background: rgba(59,130,246,0.1); color: var(--info); }
    .why-card-title {
      font-family: var(--font-display); font-size: 0.92rem; font-weight: 600; margin-bottom: 6px;
    }
    .why-card-text { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.6; }
    .why-card-impact {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.75rem; font-weight: 600; margin-top: 10px;
      padding: 3px 10px; border-radius: var(--radius-full);
    }
    .why-card-impact.positive { color: var(--success); background: rgba(34,197,94,0.1); }
    .why-card-impact.negative { color: var(--danger); background: rgba(239,68,68,0.1); }
    .why-card-impact.neutral { color: var(--info); background: rgba(59,130,246,0.1); }

    /* ---- Risk Analysis ---- */
    .risk-overview {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px;
    }
    .risk-metric {
      padding: 20px; background: rgba(255,255,255,0.02);
      border: 1px solid var(--border-subtle); border-radius: var(--radius-md); text-align: center;
    }
    .risk-metric-value {
      font-family: var(--font-display); font-size: 1.6rem; font-weight: 700;
    }
    .risk-metric-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }

    .risk-flag-list { display: flex; flex-direction: column; gap: 12px; }
    .risk-flag-card {
      display: flex; gap: 14px; padding: 18px;
      background: rgba(239,68,68,0.03); border: 1px solid rgba(239,68,68,0.1);
      border-radius: var(--radius-md); transition: all var(--transition-fast);
    }
    .risk-flag-card:hover { background: rgba(239,68,68,0.06); border-color: rgba(239,68,68,0.18); }
    .risk-flag-card.severity-critical { border-left: 3px solid #ef4444; }
    .risk-flag-card.severity-high { border-left: 3px solid #f97316; }
    .risk-flag-card.severity-medium { border-left: 3px solid #f59e0b; }
    .risk-flag-card.severity-low { border-left: 3px solid #3b82f6; }
    .risk-flag-icon {
      width: 36px; height: 36px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      font-size: 0.85rem;
    }
    .risk-flag-card.severity-critical .risk-flag-icon { background: rgba(239,68,68,0.15); color: #f87171; }
    .risk-flag-card.severity-high .risk-flag-icon { background: rgba(249,115,22,0.15); color: #fb923c; }
    .risk-flag-card.severity-medium .risk-flag-icon { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .risk-flag-card.severity-low .risk-flag-icon { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .risk-flag-content { flex: 1; }
    .risk-flag-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 4px;
    }
    .risk-flag-label { font-size: 0.88rem; font-weight: 600; }
    .severity-tag {
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; padding: 2px 8px; border-radius: 4px;
    }
    .severity-tag.critical { background: rgba(239,68,68,0.2); color: #f87171; }
    .severity-tag.high { background: rgba(249,115,22,0.2); color: #fb923c; }
    .severity-tag.medium { background: rgba(245,158,11,0.2); color: #fbbf24; }
    .severity-tag.low { background: rgba(59,130,246,0.2); color: #60a5fa; }
    .risk-flag-desc { font-size: 0.82rem; color: var(--text-muted); line-height: 1.55; }
    .risk-flag-penalty {
      font-family: var(--font-display); font-size: 0.82rem; font-weight: 700;
      color: var(--danger); white-space: nowrap; align-self: flex-start;
      margin-top: 2px;
    }

    .no-flags-full {
      text-align: center; padding: 48px 24px;
      background: rgba(34,197,94,0.03); border: 1px solid rgba(34,197,94,0.1);
      border-radius: var(--radius-md);
    }
    .no-flags-full i { font-size: 2.5rem; color: var(--success); opacity: 0.5; margin-bottom: 12px; }
    .no-flags-full h4 {
      font-family: var(--font-display); font-size: 1.05rem; font-weight: 600; margin-bottom: 6px;
    }
    .no-flags-full p { font-size: 0.88rem; color: var(--text-muted); max-width: 400px; margin: 0 auto; }

    /* Guard */
    .guard-screen {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: var(--bg-primary); flex-direction: column; align-items: center;
      justify-content: center; gap: 20px; text-align: center; padding: 24px;
    }
    .guard-screen.active { display: flex; }
    .guard-screen i { font-size: 2.5rem; color: var(--text-muted); opacity: 0.4; }
    .guard-screen h2 { font-family: var(--font-display); font-size: 1.4rem; font-weight: 600; }
    .guard-screen p { font-size: 0.95rem; color: var(--text-muted); max-width: 360px; }
    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      font-family: var(--font-body); font-weight: 600; font-size: 0.9rem;
      padding: 12px 28px; border-radius: var(--radius-full); transition: all var(--transition-base);
      color: var(--bg-primary); background: linear-gradient(135deg, var(--accent), #0d9488);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 0 30px var(--accent-glow), 0 4px 16px rgba(45,212,191,0.2); }

    /* Sidebar Overlay */
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 45; opacity: 0; transition: opacity var(--transition-base); }
    .sidebar-overlay.active { opacity: 1; }

    /* Toast */
    .toast-container { position: fixed; top: 80px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      display: flex; align-items: center; gap: 12px; padding: 14px 20px;
      background: var(--bg-secondary); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md); box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      font-size: 0.88rem; color: var(--text-primary); transform: translateX(120%);
      transition: transform var(--transition-base); max-width: 380px;
    }
    .toast.show { transform: translateX(0); }
    .toast i { font-size: 1.1rem; flex-shrink: 0; }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.success i { color: var(--success); }
    .toast.error { border-left: 3px solid var(--danger); }
    .toast.error i { color: var(--danger); }
    .toast.info { border-left: 3px solid var(--info); }
    .toast.info i { color: var(--info); }

    /* Responsive */
    @media (max-width: 1024px) {
      .score-detail-grid { grid-template-columns: 1fr; }
      .why-grid { grid-template-columns: 1fr; }
      .risk-overview { grid-template-columns: repeat(3, 1fr); }
      .identity-stats-row { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay { display: block; }
      .main-content { margin-left: 0; }
      .sidebar-toggle { display: flex; }
      .page-content { padding: 20px 16px; }
      .identity-card { padding: 24px; }
      .identity-top { flex-direction: column; }
      .identity-stats-row { grid-template-columns: repeat(2, 1fr); }
      .risk-overview { grid-template-columns: 1fr; }
      .risk-flag-penalty { display: none; }
    }
    @media (max-width: 480px) {
      .identity-stats-row { grid-template-columns: 1fr 1fr; }
      .identity-actions { width: 100%; }
      .identity-actions .btn-sm { flex: 1; justify-content: center; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>

  <div class="bg-atmosphere" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>
  <div class="bg-noise" aria-hidden="true"></div>

  <!-- Guard -->
  <div class="guard-screen" id="guardScreen">
    <i class="fa-solid fa-lock"></i>
    <h2>Belum Masuk</h2>
    <p>Anda harus login dengan wallet address terlebih dahulu.</p>
    <a href="login.html" class="btn-primary"><i class="fa-solid fa-arrow-right-to-bracket"></i> Masuk Sekarang</a>
  </div>

  <div class="toast-container" id="toastContainer" aria-live="polite"></div>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="dashboard-layout" id="dashboardLayout" style="display:none;">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Sidebar navigasi">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon"><i class="fa-solid fa-shield-halved"></i></div>
        <span>WalletScore</span>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-label">Menu Utama</div>
        <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-grid-2"></i> Dashboard</a>
        <a href="wallet.html" class="nav-item active"><i class="fa-solid fa-wallet"></i> Wallet Detail</a>
        <a href="history.html" class="nav-item"><i class="fa-solid fa-clock-rotate-left"></i> Riwayat</a>
        <a href="analytics.html" class="nav-item"><i class="fa-solid fa-chart-mixed"></i> Analitik</a>
        <div class="nav-section-label">Lainnya</div>
        <a href="settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> Pengaturan</a>
        <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i> Beranda</a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-wallet" id="sidebarWallet" title="Klik untuk salin">
          <div class="sidebar-wallet-avatar" id="sidebarAvatar">?</div>
          <div class="sidebar-wallet-info">
            <div class="sidebar-wallet-addr" id="sidebarAddr">—</div>
            <div class="sidebar-wallet-label">Tersambung</div>
          </div>
          <i class="fa-solid fa-copy" style="color:var(--text-muted); font-size:0.75rem;"></i>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <div class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar"><i class="fa-solid fa-bars"></i></button>
          <div class="topbar-breadcrumb">
            <a href="dashboard.html">Dashboard</a>
            <span class="sep"><i class="fa-solid fa-chevron-right" style="font-size:0.6rem;"></i></span>
            <span class="current">Wallet Detail</span>
          </div>
        </div>
        <div class="topbar-right">
          <button class="btn-logout" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i><span>Keluar</span></button>
        </div>
      </header>

      <main class="page-content" id="pageContent"></main>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script>
    /* Utilitas */
    function showToast(msg, type = 'info', dur = 3000) {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      const ic = { success: 'fa-circle-check', error: 'fa-circle-xmark', info: 'fa-circle-info' };
      t.innerHTML = `<i class="fa-solid ${ic[type]||ic.info}"></i><span>${msg}</span>`;
      c.appendChild(t);
      requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
      setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, dur);
    }

    /* Auth Guard */
    const walletAddress = localStorage.getItem('whs_wallet');
    if (!walletAddress) {
      document.getElementById('guardScreen').classList.add('active');
    } else {
      document.getElementById('dashboardLayout').style.display = 'flex';
      init(walletAddress);
    }

    /* Sidebar */
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    document.getElementById('sidebarToggle').addEventListener('click', () => {
      sidebar.classList.toggle('open');
      sidebarOverlay.classList.toggle('active');
    });
    sidebarOverlay.addEventListener('click', () => {
      sidebar.classList.remove('open');
      sidebarOverlay.classList.remove('active');
    });
    document.getElementById('sidebarWallet').addEventListener('click', () => {
      if (walletAddress) navigator.clipboard.writeText(walletAddress).then(() => showToast('Alamat disalin', 'success', 2000));
    });
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('whs_wallet');
      localStorage.removeItem('whs_login_time');
      sessionStorage.removeItem('currentWallet');
      showToast('Berhasil keluar', 'info', 2000);
      setTimeout(() => { window.location.href = 'login.html'; }, 600);
    });

    /* Init */
    function init(addr) {
      document.getElementById('sidebarAddr').textContent = addr;
      document.getElementById('sidebarAvatar').textContent = addr.slice(2, 4).toUpperCase();

      // Ambil data dari sessionStorage atau generate baru
      let data = null;
      try {
        const stored = sessionStorage.getItem('walletData');
        if (stored) data = JSON.parse(stored);
      } catch (e) { /* ignore */ }

      if (!data || data.walletAddress !== addr) {
        data = calculateCreditScore(addr);
        sessionStorage.setItem('walletData', JSON.stringify(data));
      }

      render(data);
    }

    /* ========================================
       RENDER
    ======================================== */
    function render(data) {
      const pc = document.getElementById('pageContent');

      // Format umur
      let ageText;
      if (data.walletAgeDays >= 365) {
        const y = Math.floor(data.walletAgeDays / 365);
        const m = Math.floor((data.walletAgeDays % 365) / 30);
        ageText = y > 0 ? `${y} tahun${m > 0 ? ' ' + m + ' bulan' : ''}` : `${m} bulan`;
      } else if (data.walletAgeDays >= 30) {
        ageText = `${Math.floor(data.walletAgeDays / 30)} bulan`;
      } else {
        ageText = `${data.walletAgeDays} hari`;
      }

      // Persentil
      const vsNetwork = data.score - data.networkAvg;
      const vsText = vsNetwork >= 0 ? `+${vsNetwork}` : `${vsNetwork}`;
      const vsClass = vsNetwork >= 0 ? 'color:var(--success)' : 'color:var(--danger)';

      // Risk summary
      const criticalCount = data.riskFlags.filter(f => f.severity === 'critical').length;
      const highCount = data.riskFlags.filter(f => f.severity === 'high').length;
      const totalPenalty = data.breakdown.risk.penalty;

      // Network avg marker position (% dari 250)
      const networkAvgPct = Math.round((data.networkAvg / 4) / 250 * 100); // skala per-kategori

      pc.innerHTML = `
        <!-- Identity Card -->
        <div class="identity-card">
          <div class="identity-top">
            <div class="identity-left">
              <div class="identity-avatar">${data.walletAddress.slice(2, 4).toUpperCase()}</div>
              <div class="identity-info">
                <h1>${data.walletAddress}</h1>
                <div class="identity-meta">
                  <span><i class="fa-solid fa-shield-halved" style="color:${data.statusColor}"></i> <b style="color:${data.statusColor}">${data.status}</b></span>
                  <span><i class="fa-regular fa-clock"></i> ${ageText}</span>
                  <span><i class="fa-solid fa-gas-pump"></i> ${formatETH(data.transactions.totalGasETH)}</span>
                  <span><i class="fa-brands fa-ethereum"></i> ~${formatETH(data.estimatedBalance)}</span>
                </div>
              </div>
            </div>
            <div class="identity-actions">
              <button class="btn-sm" onclick="copyAddr('${data.walletAddress}')"><i class="fa-regular fa-copy"></i> Salin</button>
              <button class="btn-sm" onclick="window.open('https://etherscan.io/address/${data.walletAddress}','_blank')"><i class="fa-solid fa-arrow-up-right-from-square"></i> Etherscan</button>
            </div>
          </div>
          <div class="identity-stats-row">
            <div class="identity-stat">
              <div class="identity-stat-value" style="color:var(--accent);" id="animScore">0</div>
              <div class="identity-stat-label">Credit Score</div>
            </div>
            <div class="identity-stat">
              <div class="identity-stat-value" id="animTx">0</div>
              <div class="identity-stat-label">Total Transaksi</div>
            </div>
            <div class="identity-stat">
              <div class="identity-stat-value" id="animRate">0%</div>
              <div class="identity-stat-label">Success Rate</div>
            </div>
            <div class="identity-stat">
              <div class="identity-stat-value" style="color:${data.riskFlags.length > 0 ? 'var(--danger)' : 'var(--success)'};">${data.riskFlags.length}</div>
              <div class="identity-stat-label">Risk Flags</div>
            </div>
            <div class="identity-stat">
              <div class="identity-stat-value" style="${vsClass}">${vsText}</div>
              <div class="identity-stat-label">vs Network Avg</div>
            </div>
          </div>
        </div>

        <!-- Score Breakdown -->
        <div class="section">
          <div class="section-header">
            <div class="section-icon teal"><i class="fa-solid fa-chart-bar"></i></div>
            <h2 class="section-title">Breakdown Skor</h2>
            <span class="section-subtitle">Setiap kategori bernilai maks 250 poin</span>
          </div>
          <div class="card">
            <div class="card-body">
              <div class="score-detail-grid">
                <div class="breakdown-list">
                  ${renderBreakdown(data.breakdown.successRate, 'teal', 'fa-circle-check', data.transactions.successRate + '%',
                    getSuccessRateExplain(data.transactions.successRate), networkAvgPct)}
                  ${renderBreakdown(data.breakdown.volume, 'green', 'fa-arrow-right-arrow-left', formatNumber(data.breakdown.volume.value) + ' tx',
                    getVolumeExplain(data.breakdown.volume.value), networkAvgPct)}
                </div>
                <div class="breakdown-list">
                  ${renderBreakdown(data.breakdown.age, 'amber', 'fa-clock', ageText,
                    getAgeExplain(data.walletAgeDays), networkAvgPct)}
                  ${renderBreakdownRisk(data.breakdown.risk, networkAvgPct)}
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Why This Score -->
        <div class="section">
          <div class="section-header">
            <div class="section-icon blue"><i class="fa-solid fa-lightbulb"></i></div>
            <h2 class="section-title">Mengapa Skor Ini?</h2>
          </div>
          <div class="why-grid">
            ${generateWhyCards(data)}
          </div>
        </div>

        <!-- Risk Analysis -->
        <div class="section">
          <div class="section-header">
            <div class="section-icon red"><i class="fa-solid fa-triangle-exclamation"></i></div>
            <h2 class="section-title">Analisis Risiko</h2>
            <span class="section-subtitle">${data.riskFlags.length} flag terdeteksi</span>
          </div>
          <div class="card">
            <div class="card-body">
              <div class="risk-overview">
                <div class="risk-metric">
                  <div class="risk-metric-value" style="color:${criticalCount > 0 ? 'var(--danger)' : 'var(--success)'}">${criticalCount}</div>
                  <div class="risk-metric-label">Critical</div>
                </div>
                <div class="risk-metric">
                  <div class="risk-metric-value" style="color:${highCount > 0 ? 'var(--warning)' : 'var(--success)'}">${highCount}</div>
                  <div class="risk-metric-label">High</div>
                </div>
                <div class="risk-metric">
                  <div class="risk-metric-value" style="color:${totalPenalty > 0 ? 'var(--danger)' : 'var(--success)'}">-${totalPenalty}</div>
                  <div class="risk-metric-label">Total Penalty</div>
                </div>
              </div>

              ${data.riskFlags.length === 0 ? `
                <div class="no-flags-full">
                  <i class="fa-solid fa-shield-check"></i>
                  <h4>Wallet Bersih</h4>
                  <p>Tidak ada risk flag terdeteksi. Wallet ini menunjukkan perilaku transaksi yang sehat dan tidak teridentifikasi interaksi dengan entitas berisiko.</p>
                </div>
              ` : `
                <div class="risk-flag-list">
                  ${data.riskFlags.map(f => {
                    const penaltyMap = { critical: 80, high: 50, medium: 30, low: 10 };
                    return `
                    <div class="risk-flag-card severity-${f.severity}">
                      <div class="risk-flag-icon">
                        <i class="fa-solid ${f.severity === 'critical' ? 'fa-skull-crossbones' : f.severity === 'high' ? 'fa-circle-exclamation' : f.severity === 'medium' ? 'fa-triangle-exclamation' : 'fa-circle-info'}"></i>
                      </div>
                      <div class="risk-flag-content">
                        <div class="risk-flag-header">
                          <span class="risk-flag-label">${f.label}</span>
                          <span class="severity-tag ${f.severity}">${f.severity}</span>
                        </div>
                        <div class="risk-flag-desc">${f.description}</div>
                      </div>
                      <div class="risk-flag-penalty">-${penaltyMap[f.severity] || 0}</div>
                    </div>`;
                  }).join('')}
                </div>
              `}
            </div>
          </div>
        </div>
      `;

      // Animasi counter
      requestAnimationFrame(() => {
        animateCounter('animScore', 0, data.score, 1200);
        animateCounter('animTx', 0, data.transactions.total, 1000);
        animateCounter('animRate', 0, data.transactions.successRate, 1000, '%', 1);
        setTimeout(() => {
          document.querySelectorAll('.breakdown-bar-fill').forEach(bar => {
            bar.style.width = bar.getAttribute('data-width') + '%';
          });
        }, 200);
      });
    }

    /* ---- Render Helpers ---- */

    function renderBreakdown(item, colorClass, icon, displayVal, explain, avgPct) {
      const pct = Math.round((item.score / item.max) * 100);
      const markerPct = Math.min(100, Math.max(0, avgPct));
      return `
        <div class="breakdown-item">
          <div class="breakdown-item-header">
            <span class="breakdown-label"><i class="fa-solid ${icon}" style="color:var(--${colorClass === 'teal' ? 'accent' : colorClass === 'green' ? 'success' : 'warning'})"></i> ${item.label}</span>
            <span class="breakdown-values">
              <span class="bv-score">${item.score}</span><span class="bv-max">/${item.max}</span>
              <span class="bv-detail">(${displayVal})</span>
            </span>
          </div>
          <div class="breakdown-bar">
            <div class="breakdown-bar-fill ${colorClass}" data-width="${pct}"></div>
            <div class="breakdown-bar-marker" style="left:${markerPct}%;" title="Rata-rata network"></div>
          </div>
          <div class="breakdown-explain">${explain}</div>
        </div>`;
    }

    function renderBreakdownRisk(item, avgPct) {
      const pct = Math.round((item.score / item.max) * 100);
      const colorClass = pct >= 70 ? 'mixed-green' : pct >= 40 ? 'mixed-amber' : 'mixed-red';
      const displayVal = item.penalty > 0 ? `-${item.penalty} poin penalty` : 'Tidak ada penalty';
      const explain = item.penalty === 0
        ? 'Tidak ada penalti risiko. Wallet tidak terdeteksi memiliki interaksi berisiko.'
        : item.penalty <= 30
          ? 'Penalti ringan. Ditemukan beberapa indikator risiko minor yang tidak terlalu berpengaruh.'
          : item.penalty <= 80
            ? 'Penalti sedang. Ada interaksi dengan entitas atau pola yang cukup mencurigakan.'
            : 'Penalti berat. Terdeteksi interaksi serius dengan kontrak berbahaya atau pola berisiko tinggi.';
      const markerPct = Math.min(100, Math.max(0, avgPct));
      return `
        <div class="breakdown-item">
          <div class="breakdown-item-header">
            <span class="breakdown-label"><i class="fa-solid fa-shield-halved" style="color:var(--danger)"></i> ${item.label}</span>
            <span class="breakdown-values">
              <span class="bv-score">${item.score}</span><span class="bv-max">/${item.max}</span>
              <span class="bv-detail">(${displayVal})</span>
            </span>
          </div>
          <div class="breakdown-bar">
            <div class="breakdown-bar-fill ${colorClass}" data-width="${pct}"></div>
            <div class="breakdown-bar-marker" style="left:${markerPct}%;" title="Rata-rata network"></div>
          </div>
          <div class="breakdown-explain">${explain}</div>
        </div>`;
    }

    /* ---- Explain Functions ---- */
    function getSuccessRateExplain(rate) {
      if (rate >= 98) return 'Sangat baik. Hampir semua transaksi berhasil tanpa error. Menunjukkan pengelolaan gas dan nonce yang tepat.';
      if (rate >= 95) return 'Baik. Sebagian besar transaksi berhasil. Sedikit kegagalan mungkin karena out-of-gas atau nonce conflict.';
      if (rate >= 90) return 'Cukup baik. Masih di atas rata-rata network, namun ada beberapa kegagalan yang bisa diminimalkan.';
      if (rate >= 80) return 'Di bawah rata-rata. Jumlah transaksi gagal cukup signifikan. Perlu evaluasi pengelolaan gas dan timing transaksi.';
      return 'Rendah. Tingkat kegagalan tinggi bisa mengindikasikan masalah teknis atau percobaan transaksi yang tidak hati-hati.';
    }

    function getVolumeExplain(count) {
      if (count >= 500) return 'Volume sangat tinggi. Wallet ini sangat aktif, menunjukkan penggunaan rutin dan konsisten di berbagai protokol.';
      if (count >= 200) return 'Volume tinggi. Aktivitas transaksi menunjukkan keterlibatan aktif dalam ekosistem DeFi dan dApps.';
      if (count >= 50) return 'Volume menengah. Penggunaan cukup reguler dengan frekuensi transaksi yang wajar.';
      if (count >= 20) return 'Volume rendah-menengah. Wallet digunakan sesekali, mungkin untuk keperluan spesifik.';
      return 'Volume rendah. Sangat sedikit transaksi tercatat. Umur wallet dan volume perlu dipertimbangkan bersamaan.';
    }

    function getAgeExplain(days) {
      if (days >= 730) return 'Wallet berusia lebih dari 2 tahun. Ini adalah sinyal kepercayaan yang sangat kuat — wallet lama cenderung lebih reliable.';
      if (days >= 365) return 'Wallet berusia lebih dari 1 tahun. Menunjukkan konsistensi dan riwayat panjang di network.';
      if (days >= 180) return 'Wallet berusia 6 bulan sampai 1 tahun. Sudah cukup lama untuk menunjukkan pola perilaku yang jelas.';
      if (days >= 90) return 'Wallet berusia 3-6 bulan. Masih relatif baru, mulai membangun riwayat transaksi.';
      if (days >= 30) return 'Wallet berusia 1-3 bulan. Terlalu baru untuk memberikan sinyal kepercayaan yang kuat.';
      return 'Wallet sangat baru (kurang dari 1 bulan). Risiko tinggi karena belum ada cukup data untuk menilai perilaku.';
    }

    /* ---- Why This Score Cards ---- */
    function generateWhyCards(data) {
      const cards = [];
      const d = data;

      // Success rate
      if (d.transactions.successRate >= 95) {
        cards.push({ icon: 'fa-circle-check', type: 'positive', title: 'Success Rate Tinggi',
          text: `${d.transactions.successRate}% dari ${formatNumber(d.transactions.total)} transaksi berhasil. Ini menunjukkan pengelolaan wallet yang cermat dan pemahaman teknis yang baik.`,
          impact: `+${d.breakdown.successRate.score} poin`, impactType: 'positive' });
      } else if (d.transactions.successRate >= 85) {
        cards.push({ icon: 'fa-circle-minus', type: 'neutral', title: 'Success Rate Moderat',
          text: `${d.transactions.successRate}% success rate dengan ${d.transactions.failed} transaksi gagal. Masih di batas wajar, namun bisa ditingkatkan.`,
          impact: `+${d.breakdown.successRate.score} poin`, impactType: 'neutral' });
      } else {
        cards.push({ icon: 'fa-circle-xmark', type: 'negative', title: 'Success Rate Rendah',
          text: `Hanya ${d.transactions.successRate}% transaksi berhasil. ${d.transactions.failed} dari ${formatNumber(d.transactions.total)} transaksi gagal, yang menurunkan skor secara signifikan.`,
          impact: `+${d.breakdown.successRate.score} poin`, impactType: 'negative' });
      }

      // Volume
      if (d.breakdown.volume.score >= 200) {
        cards.push({ icon: 'fa-fire', type: 'positive', title: 'Volume Transaksi Tinggi',
          text: `${formatNumber(d.transactions.total)} transaksi menunjukkan wallet ini sangat aktif dan terlibat mendalam dalam ekosistem on-chain.`,
          impact: `+${d.breakdown.volume.score} poin`, impactType: 'positive' });
      } else if (d.breakdown.volume.score >= 100) {
        cards.push({ icon: 'fa-chart-line', type: 'neutral', title: 'Volume Transaksi Menengah',
          text: `${formatNumber(d.transactions.total)} transaksi tercatat. Volume ini cukup untuk memberikan gambaran perilaku, namun masih bisa ditingkatkan.`,
          impact: `+${d.breakdown.volume.score} poin`, impactType: 'neutral' });
      } else {
        cards.push({ icon: 'fa-chart-line', type: 'negative', title: 'Volume Transaksi Rendah',
          text: `Hanya ${formatNumber(d.transactions.total)} transaksi. Data terlalu sedikit untuk menilai perilaku wallet secara akurat.`,
          impact: `+${d.breakdown.volume.score} poin`, impactType: 'negative' });
      }

      // Umur
      if (d.walletAgeDays >= 365) {
        cards.push({ icon: 'fa-hourglass-half', type: 'positive', title: 'Wallet Terpercaya',
          text: `Wallet telah aktif selama lebih dari ${Math.floor(d.walletAgeDays / 365)} tahun. Riwayat panjang ini adalah sinyal kepercayaan kuat dalam penilaian kredit on-chain.`,
          impact: `+${d.breakdown.age.score} poin`, impactType: 'positive' });
      } else if (d.walletAgeDays >= 90) {
        cards.push({ icon: 'fa-hourglass-start', type: 'neutral', title: 'Wallet Masih Berkembang',
          text: `Usia wallet ${Math.floor(d.walletAgeDays / 30)} bulan. Cukup untuk mulai menilai, namun skor akan meningkat seiring waktu.`,
          impact: `+${d.breakdown.age.score} poin`, impactType: 'neutral' });
      } else {
        cards.push({ icon: 'fa-seedling', type: 'negative', title: 'Wallet Sangat Baru',
          text: `Wallet baru ${d.walletAgeDays} hari. Kurangnya riwayat menyebabkan skor umur sangat rendah. Ini akan membaik seiring waktu.`,
          impact: `+${d.breakdown.age.score} poin`, impactType: 'negative' });
      }

      // Risk
      if (d.riskFlags.length === 0) {
        cards.push({ icon: 'fa-shield-check', type: 'positive', title: 'Tanpa Risk Flag',
          text: 'Tidak terdeteksi interaksi dengan kontrak berisiko, address terblacklist, atau pola transaksi anomali. Wallet menunjukkan perilaku yang bersih.',
          impact: `+${d.breakdown.risk.score} poin`, impactType: 'positive' });
      } else {
        const penalty = d.breakdown.risk.penalty;
        const topFlag = d.riskFlags.sort((a, b) => {
          const ord = { critical: 0, high: 1, medium: 2, low: 3 };
          return (ord[a.severity] ?? 4) - (ord[b.severity] ?? 4);
        })[0];
        cards.push({ icon: 'fa-triangle-exclamation', type: 'negative', title: `${d.riskFlags.length} Risk Flag Terdeteksi`,
          text: `Flag paling serius: "${topFlag.label}" (${topFlag.severity}). Total penalti: -${penalty} poin. Pertimbangkan untuk menghindari interaksi dengan kontrak berisiko di masa depan.`,
          impact: `-${penalty} poin`, impactType: 'negative' });
      }

      return cards.map(c => `
        <div class="why-card">
          <div class="why-card-icon ${c.type}"><i class="fa-solid ${c.icon}"></i></div>
          <div class="why-card-title">${c.title}</div>
          <div class="why-card-text">${c.text}</div>
          <span class="why-card-impact ${c.impactType}">
            <i class="fa-solid ${c.impactType === 'positive' ? 'fa-arrow-up' : c.impactType === 'negative' ? 'fa-arrow-down' : 'fa-minus'}"></i>
            ${c.impact}
          </span>
        </div>
      `).join('');
    }

    /* ---- Counter Animation ---- */
    function animateCounter(id, start, end, duration, suffix = '', decimals = 0) {
      const el = document.getElementById(id);
      if (!el) return;
      const st = performance.now();
      function update(now) {
        const p = Math.min((now - st) / duration, 1);
        const eased = 1 - Math.pow(1 - p, 3);
        const v = start + (end - start) * eased;
        el.textContent = (decimals > 0 ? v.toFixed(decimals) : Math.round(v)) + suffix;
        if (p < 1) requestAnimationFrame(update);
      }
      requestAnimationFrame(update);
    }

    /* ---- Copy ---- */
    function copyAddr(a) {
      navigator.clipboard.writeText(a).then(() => showToast('Alamat disalin', 'success', 2000)).catch(() => showToast('Gagal menyalin', 'error'));
    }
  </script>
</body>
