<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Analitik — Wallet Health Score</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --bg-primary: #060a13;
      --bg-secondary: #0c1222;
      --bg-card: rgba(14, 22, 42, 0.65);
      --bg-card-hover: rgba(20, 32, 58, 0.75);
      --bg-input: rgba(6, 10, 19, 0.6);
      --border-color: rgba(45, 212, 191, 0.12);
      --border-color-hover: rgba(45, 212, 191, 0.3);
      --border-subtle: rgba(255, 255, 255, 0.06);
      --accent: #2dd4bf;
      --accent-dim: rgba(45, 212, 191, 0.12);
      --accent-glow: rgba(45, 212, 191, 0.2);
      --accent-secondary: #f59e0b;
      --accent-secondary-dim: rgba(245, 158, 11, 0.12);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #475569;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-full: 9999px;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
      --shadow-glow: 0 0 40px rgba(45, 212, 191, 0.06);
      --topbar-height: 56px;
      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font-body); background: var(--bg-primary);
      color: var(--text-primary); line-height: 1.6; overflow-x: hidden; min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; transition: color var(--transition-fast); }
    button { font-family: var(--font-body); cursor: pointer; border: none; outline: none; background: none; }

    /* Background */
    .bg-atmosphere {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .bg-atmosphere .orb {
      position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.18;
      animation: orbFloat 25s ease-in-out infinite; will-change: transform;
    }
    .bg-atmosphere .orb-1 {
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(45, 212, 191, 0.12) 0%, transparent 70%);
      top: -8%; left: -5%;
    }
    .bg-atmosphere .orb-2 {
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(245, 158, 11, 0.06) 0%, transparent 70%);
      bottom: -8%; right: -5%; animation-delay: -10s; animation-duration: 28s;
    }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(15px, -20px) scale(1.03); }
      66% { transform: translate(-10px, 10px) scale(0.97); }
    }

    /* Topbar — Konsisten dengan dashboard */
    .topbar {
      height: var(--topbar-height); padding: 0 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border-subtle);
      background: rgba(6, 10, 19, 0.85); backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position: sticky; top: 0; z-index: 40;
    }
    .topbar-left {
      display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; font-size: 0.82rem; font-weight: 600;
      color: var(--accent); border: 1px solid var(--border-color);
      border-radius: var(--radius-full); transition: all var(--transition-fast);
      white-space: nowrap; flex-shrink: 0; background: var(--accent-dim);
    }
    .back-btn:hover {
      background: rgba(45, 212, 191, 0.18); border-color: var(--border-color-hover);
      box-shadow: 0 0 16px var(--accent-glow);
    }
    .back-btn:active { transform: scale(0.97); }
    .back-btn i { font-size: 0.8rem; }
    .topbar-title {
      font-family: var(--font-display); font-size: 1rem; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;
    }
    .topbar-right {
      display: flex; align-items: center; gap: 4px; flex-shrink: 0;
    }
    .topbar-btn {
      width: 36px; height: 36px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 0.9rem; transition: all var(--transition-fast);
    }
    .topbar-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
    .btn-logout {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 6px 10px; font-size: 0.78rem; font-weight: 500;
      color: var(--text-muted); border-radius: var(--radius-full); transition: all var(--transition-fast);
      white-space: nowrap;
    }
    .btn-logout:hover { color: var(--danger); background: rgba(239,68,68,0.08); }
    .btn-logout .logout-text { display: none; }

    /* Page Content */
    .page-content { flex: 1; padding: 20px 16px 32px; position: relative; z-index: 1; }

    /* Chart Grid */
    .chart-grid-top {
      display: grid; grid-template-columns: 1fr; gap: 16px; margin-bottom: 16px;
    }
    .chart-grid-bottom {
      display: grid; grid-template-columns: 1fr; gap: 16px; margin-bottom: 16px;
    }

    .chart-card {
      background: var(--bg-card); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg); overflow: hidden;
      transition: border-color var(--transition-base);
    }
    .chart-card:active { border-color: var(--border-color); }
    .chart-card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 16px 0; gap: 10px;
    }
    .chart-card-title-group {
      display: flex; align-items: center; gap: 10px; min-width: 0;
    }
    .chart-card-icon {
      width: 32px; height: 32px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center; font-size: 0.8rem; flex-shrink: 0;
    }
    .chart-card-icon.teal { background: var(--accent-dim); color: var(--accent); }
    .chart-card-icon.amber { background: var(--accent-secondary-dim); color: var(--accent-secondary); }
    .chart-card-icon.green { background: rgba(34,197,94,0.12); color: var(--success); }
    .chart-card-title {
      font-family: var(--font-display); font-size: 0.88rem; font-weight: 600;
    }
    .chart-card-subtitle { font-size: 0.72rem; color: var(--text-muted); margin-top: 1px; }
    .chart-card-badge {
      font-size: 0.7rem; font-weight: 600; padding: 3px 10px;
      border-radius: var(--radius-full); white-space: nowrap; flex-shrink: 0;
    }
    .chart-card-badge.up { color: var(--success); background: rgba(34,197,94,0.1); }
    .chart-card-badge.down { color: var(--danger); background: rgba(239,68,68,0.1); }
    .chart-card-badge.neutral { color: var(--text-muted); background: rgba(255,255,255,0.04); }
    .chart-card-body { padding: 14px 14px 16px; position: relative; }
    .chart-container { position: relative; width: 100%; }
    .chart-container.tall { height: 240px; }
    .chart-container.short { height: 200px; }

    /* Insight Cards */
    .insights-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .insight-card {
      background: var(--bg-card); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md); padding: 16px;
      transition: all var(--transition-fast);
    }
    .insight-card:active { border-color: var(--border-color); }
    .insight-label {
      font-size: 0.72rem; color: var(--text-muted); margin-bottom: 8px;
      display: flex; align-items: center; gap: 5px;
    }
    .insight-label i { font-size: 0.65rem; }
    .insight-value {
      font-family: var(--font-display); font-size: 1.4rem; font-weight: 700; line-height: 1.1;
    }
    .insight-sub { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; }
    .insight-bar {
      height: 4px; background: rgba(255,255,255,0.04);
      border-radius: var(--radius-full); margin-top: 10px; overflow: hidden;
    }
    .insight-bar-fill {
      height: 100%; border-radius: var(--radius-full);
      transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1); width: 0;
    }

    /* Guard */
    .guard-screen {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: var(--bg-primary); flex-direction: column; align-items: center;
      justify-content: center; gap: 20px; text-align: center; padding: 24px;
    }
    .guard-screen.active { display: flex; }
    .guard-screen i { font-size: 2.2rem; color: var(--text-muted); opacity: 0.4; }
    .guard-screen h2 { font-family: var(--font-display); font-size: 1.3rem; font-weight: 600; }
    .guard-screen p { font-size: 0.9rem; color: var(--text-muted); max-width: 320px; line-height: 1.5; }
    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      font-family: var(--font-body); font-weight: 600; font-size: 0.88rem;
      padding: 12px 28px; border-radius: var(--radius-full); transition: all var(--transition-base);
      color: var(--bg-primary); background: linear-gradient(135deg, var(--accent), #0d9488);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 30px var(--accent-glow), 0 4px 16px rgba(45,212,191,0.2);
    }

    /* Toast */
    .toast-container {
      position: fixed; top: 68px; left: 16px; right: 16px;
      z-index: 200; display: flex; flex-direction: column; gap: 8px; pointer-events: none;
    }
    .toast {
      display: flex; align-items: center; gap: 10px; padding: 12px 16px;
      background: var(--bg-secondary); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md); box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      font-size: 0.82rem; color: var(--text-primary);
      transform: translateY(-20px); opacity: 0;
      transition: all var(--transition-base); pointer-events: auto;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast i { font-size: 1rem; flex-shrink: 0; }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.success i { color: var(--success); }
    .toast.error { border-left: 3px solid var(--danger); }
    .toast.error i { color: var(--danger); }
    .toast.info { border-left: 3px solid var(--info); }
    .toast.info i { color: var(--info); }

    /* Responsive — Tablet */
    @media (min-width: 640px) {
      .page-content { padding: 24px 20px 40px; }
      .chart-grid-bottom { grid-template-columns: 1fr 1fr; }
      .chart-container.tall { height: 280px; }
      .chart-container.short { height: 240px; }
      .chart-card-header { padding: 18px 20px 0; }
      .chart-card-body { padding: 16px 18px 20px; }
      .topbar { padding: 0 24px; }
      .topbar-title { font-size: 1.05rem; }
      .btn-logout .logout-text { display: inline; }
    }

    /* Responsive — Desktop */
    @media (min-width: 900px) {
      .page-content { padding: 28px 32px 48px; }
      .chart-container.tall { height: 320px; }
      .chart-container.short { height: 260px; }
      .chart-card-header { padding: 20px 24px 0; }
      .chart-card-body { padding: 18px 22px 22px; }
      .chart-card-title { font-size: 0.95rem; }
      .chart-card-subtitle { font-size: 0.78rem; }
      .chart-card-badge { font-size: 0.75rem; padding: 4px 12px; }
      .insight-card { padding: 20px; }
      .insight-value { font-size: 1.5rem; }
      .insight-label { font-size: 0.78rem; }
      .insight-sub { font-size: 0.78rem; }
    }

    @media (min-width: 1100px) {
      .insights-grid { grid-template-columns: repeat(4, 1fr); gap: 16px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <div class="bg-atmosphere" aria-hidden="true"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

  <div class="guard-screen" id="guardScreen">
    <i class="fa-solid fa-lock"></i>
    <h2>Belum Masuk</h2>
    <p>Anda harus login dengan wallet address terlebih dahulu.</p>
    <a href="login.html" class="btn-primary"><i class="fa-solid fa-arrow-right-to-bracket"></i> Masuk Sekarang</a>
  </div>

  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <div id="mainWrapper" style="display:none;">

    <header class="topbar">
      <div class="topbar-left">
        <a href="index.html" class="back-btn" aria-label="Kembali ke beranda">
          <i class="fa-solid fa-arrow-left"></i>
          <span>Kembali</span>
        </a>
        <h1 class="topbar-title">Analitik</h1>
      </div>
      <div class="topbar-right">
        <button class="topbar-btn" id="refreshBtn" aria-label="Refresh" title="Refresh data">
          <i class="fa-solid fa-arrows-rotate"></i>
        </button>
        <button class="btn-logout" id="logoutBtn">
          <i class="fa-solid fa-right-from-bracket"></i>
          <span class="logout-text">Keluar</span>
        </button>
      </div>
    </header>

    <main class="page-content" id="pageContent"></main>

  </div>

  <script src="js/data.js"></script>
  <script>
    /* Utilitas */
    function showToast(msg, type, dur) {
      type = type || 'info';
      dur = dur || 3000;
      var c = document.getElementById('toastContainer');
      var t = document.createElement('div');
      t.className = 'toast ' + type;
      var ic = { success: 'fa-circle-check', error: 'fa-circle-xmark', info: 'fa-circle-info' };
      t.innerHTML = '<i class="fa-solid ' + (ic[type] || ic.info) + '"></i><span>' + msg + '</span>';
      c.appendChild(t);
      requestAnimationFrame(function() {
        requestAnimationFrame(function() { t.classList.add('show'); });
      });
      setTimeout(function() {
        t.classList.remove('show');
        setTimeout(function() { t.remove(); }, 300);
      }, dur);
    }

    /* Auth */
    var walletAddress = localStorage.getItem('whs_wallet');
    if (!walletAddress) {
      document.getElementById('guardScreen').classList.add('active');
    } else {
      document.getElementById('mainWrapper').style.display = 'block';
      init(walletAddress);
    }

    /* Logout */
    document.getElementById('logoutBtn').addEventListener('click', function() {
      localStorage.removeItem('whs_wallet');
      localStorage.removeItem('whs_login_time');
      sessionStorage.removeItem('currentWallet');
      sessionStorage.removeItem('walletData');
      showToast('Berhasil keluar', 'info', 2000);
      setTimeout(function() { window.location.href = 'login.html'; }, 600);
    });

    /* Refresh */
    document.getElementById('refreshBtn').addEventListener('click', function() {
      if (walletAddress) {
        var icon = document.querySelector('#refreshBtn i');
        icon.style.animation = 'spin 0.6s linear';
        setTimeout(function() { icon.style.animation = ''; }, 600);
        init(walletAddress);
        showToast('Data diperbarui', 'success', 2000);
      }
    });

    (function() {
      var s = document.createElement('style');
      s.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
      document.head.appendChild(s);
    })();

    /* Chart instances */
    var chartInstances = [];

    function destroyCharts() {
      for (var i = 0; i < chartInstances.length; i++) {
        chartInstances[i].destroy();
      }
      chartInstances = [];
    }

    /* Init */
    function init(addr) {
      var data = null;
      try {
        var stored = sessionStorage.getItem('walletData');
        if (stored) data = JSON.parse(stored);
      } catch (e) {}

      if (!data || data.walletAddress !== addr) {
        data = calculateCreditScore(addr);
        sessionStorage.setItem('walletData', JSON.stringify(data));
      }

      render(data);
    }

    /* Chart.js Global Config */
    Chart.defaults.font.family = "'DM Sans', sans-serif";
    Chart.defaults.color = '#475569';
    Chart.defaults.borderColor = 'rgba(255,255,255,0.04)';
    Chart.defaults.plugins.legend.display = false;
    Chart.defaults.elements.point.radius = 0;
    Chart.defaults.elements.point.hoverRadius = 5;
    Chart.defaults.elements.point.hoverBorderWidth = 2;

    /* RENDER */
    function render(data) {
      destroyCharts();
      var pc = document.getElementById('pageContent');

      var scoreTrend = generateScoreTrend(data.score);
      var txPerDay = generateTxPerDay(data.transactions.list);
      var successRateTrend = generateSuccessRateTrend(data.transactions.list);

      var avgScore = Math.round(scoreTrend.reduce(function(s, d) { return s + d.score; }, 0) / scoreTrend.length);
      var minScore = Math.min.apply(null, scoreTrend.map(function(d) { return d.score; }));
      var maxScore = Math.max.apply(null, scoreTrend.map(function(d) { return d.score; }));
      var avgTxPerDay = (txPerDay.reduce(function(s, d) { return s + d.count; }, 0) / txPerDay.length).toFixed(1);
      var avgSuccessRate = (successRateTrend.reduce(function(s, d) { return s + d.rate; }, 0) / successRateTrend.length).toFixed(1);
      var scoreChange = data.score - scoreTrend[0].score;
      var scoreChangeClass = scoreChange >= 0 ? 'up' : 'down';
      var scoreChangeText = scoreChange >= 0 ? '+' + scoreChange : '' + scoreChange;

      var minDate = '';
      var maxDate = '';
      for (var m = 0; m < scoreTrend.length; m++) {
        if (scoreTrend[m].score === minScore) minDate = scoreTrend[m].date;
        if (scoreTrend[m].score === maxScore) maxDate = scoreTrend[m].date;
      }

      var scoreLabels = scoreTrend.map(function(d) {
        var dt = new Date(d.date);
        return dt.getDate() + '/' + (dt.getMonth() + 1);
      });
      var txLabels = txPerDay.map(function(d) {
        var dt = new Date(d.date);
        return dt.getDate() + '/' + (dt.getMonth() + 1);
      });
      var rateLabels = successRateTrend.map(function(d) {
        var dt = new Date(d.date);
        return dt.getDate() + '/' + (dt.getMonth() + 1);
      });

      pc.innerHTML = ''
        + '<div class="chart-grid-top">'
        +   '<div class="chart-card">'
        +     '<div class="chart-card-header">'
        +       '<div class="chart-card-title-group">'
        +         '<div class="chart-card-icon teal"><i class="fa-solid fa-chart-line"></i></div>'
        +         '<div>'
        +           '<div class="chart-card-title">Tren Credit Score</div>'
        +           '<div class="chart-card-subtitle">30 hari terakhir</div>'
        +         '</div>'
        +       '</div>'
        +       '<span class="chart-card-badge ' + scoreChangeClass + '">'
        +         '<i class="fa-solid ' + (scoreChange >= 0 ? 'fa-arrow-up' : 'fa-arrow-down') + '" style="font-size:0.6rem;"></i> '
        +         scoreChangeText + ' poin'
        +       '</span>'
        +     '</div>'
        +     '<div class="chart-card-body">'
        +       '<div class="chart-container tall"><canvas id="scoreChart"></canvas></div>'
        +     '</div>'
        +   '</div>'
        + '</div>'

        + '<div class="chart-grid-bottom">'
        +   '<div class="chart-card">'
        +     '<div class="chart-card-header">'
        +       '<div class="chart-card-title-group">'
        +         '<div class="chart-card-icon amber"><i class="fa-solid fa-chart-column"></i></div>'
        +         '<div>'
        +           '<div class="chart-card-title">Transaksi Per Hari</div>'
        +           '<div class="chart-card-subtitle">30 hari terakhir</div>'
        +         '</div>'
        +       '</div>'
        +       '<span class="chart-card-badge neutral">Avg ' + avgTxPerDay + '/hari</span>'
        +     '</div>'
        +     '<div class="chart-card-body">'
        +       '<div class="chart-container short"><canvas id="txChart"></canvas></div>'
        +     '</div>'
        +   '</div>'

        +   '<div class="chart-card">'
        +     '<div class="chart-card-header">'
        +       '<div class="chart-card-title-group">'
        +         '<div class="chart-card-icon green"><i class="fa-solid fa-circle-check"></i></div>'
        +         '<div>'
        +           '<div class="chart-card-title">Success Rate Harian</div>'
        +           '<div class="chart-card-subtitle">30 hari terakhir</div>'
        +         '</div>'
        +       '</div>'
        +       '<span class="chart-card-badge ' + (parseFloat(avgSuccessRate) >= 95 ? 'up' : 'down') + '">'
        +         'Avg ' + avgSuccessRate + '%'
        +       '</span>'
        +     '</div>'
        +     '<div class="chart-card-body">'
        +       '<div class="chart-container short"><canvas id="rateChart"></canvas></div>'
        +     '</div>'
        +   '</div>'
        + '</div>'

        + '<div class="insights-grid">'
        +   '<div class="insight-card">'
        +     '<div class="insight-label"><i class="fa-solid fa-chart-simple"></i> Rata-rata Skor</div>'
        +     '<div class="insight-value" style="color:var(--accent)">' + avgScore + '</div>'
        +     '<div class="insight-sub">dari 1000</div>'
        +     '<div class="insight-bar">'
        +       '<div class="insight-bar-fill" data-width="' + ((avgScore / 1000) * 100) + '" style="background:linear-gradient(90deg, #0d9488, var(--accent));"></div>'
        +     '</div>'
        +   '</div>'
        +   '<div class="insight-card">'
        +     '<div class="insight-label"><i class="fa-solid fa-arrow-down"></i> Skor Terendah</div>'
        +     '<div class="insight-value" style="color:var(--danger)">' + minScore + '</div>'
        +     '<div class="insight-sub">' + minDate + '</div>'
        +     '<div class="insight-bar">'
        +       '<div class="insight-bar-fill" data-width="' + ((minScore / 1000) * 100) + '" style="background:linear-gradient(90deg, #dc2626, #f87171);"></div>'
        +     '</div>'
        +   '</div>'
        +   '<div class="insight-card">'
        +     '<div class="insight-label"><i class="fa-solid fa-arrow-up"></i> Skor Tertinggi</div>'
        +     '<div class="insight-value" style="color:var(--success)">' + maxScore + '</div>'
        +     '<div class="insight-sub">' + maxDate + '</div>'
        +     '<div class="insight-bar">'
        +       '<div class="insight-bar-fill" data-width="' + ((maxScore / 1000) * 100) + '" style="background:linear-gradient(90deg, #16a34a, #4ade80);"></div>'
        +     '</div>'
        +   '</div>'
        +   '<div class="insight-card">'
        +     '<div class="insight-label"><i class="fa-solid fa-arrows-up-down"></i> Volatilitas</div>'
        +     '<div class="insight-value" style="color:var(--accent-secondary)">' + (maxScore - minScore) + '</div>'
        +     '<div class="insight-sub">Rentang skor 30 hari</div>'
        +     '<div class="insight-bar">'
        +       '<div class="insight-bar-fill" data-width="' + Math.min(100, ((maxScore - minScore) / 400) * 100) + '" style="background:linear-gradient(90deg, #d97706, #fbbf24);"></div>'
        +     '</div>'
        +   '</div>'
        + '</div>';

      /* Animasi insight bars */
      setTimeout(function() {
        var bars = document.querySelectorAll('.insight-bar-fill');
        for (var b = 0; b < bars.length; b++) {
          bars[b].style.width = bars[b].getAttribute('data-width') + '%';
        }
      }, 200);

      /* Render charts */
      requestAnimationFrame(function() {
        renderScoreChart(scoreLabels, scoreTrend);
        renderTxChart(txLabels, txPerDay);
        renderRateChart(rateLabels, successRateTrend);
      });
    }

    /* CHART 1: Credit Score Trend */
    function renderScoreChart(labels, trendData) {
      var ctx = document.getElementById('scoreChart');
      if (!ctx) return;
      var scores = trendData.map(function(d) { return d.score; });
      var context = ctx.getContext('2d');
      var gradient = context.createLinearGradient(0, 0, 0, ctx.parentElement.clientHeight || 240);
      gradient.addColorStop(0, 'rgba(45, 212, 191, 0.25)');
      gradient.addColorStop(0.5, 'rgba(45, 212, 191, 0.06)');
      gradient.addColorStop(1, 'rgba(45, 212, 191, 0.0)');

      var chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            data: scores,
            borderColor: '#2dd4bf',
            borderWidth: 2.5,
            backgroundColor: gradient,
            fill: true,
            tension: 0.4,
            pointBackgroundColor: '#2dd4bf',
            pointBorderColor: '#060a13',
            pointHoverBackgroundColor: '#fff',
            pointHoverBorderColor: '#2dd4bf'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          scales: {
            x: { grid: { display: false }, ticks: { maxRotation: 0, autoSkip: true, maxTicksLimit: 8, font: { size: 10 } } },
            y: {
              min: 0, max: 1000,
              grid: { color: 'rgba(255,255,255,0.03)' },
              ticks: { stepSize: 200, font: { size: 10 } }
            }
          },
          plugins: {
            tooltip: {
              backgroundColor: 'rgba(12, 18, 34, 0.95)',
              borderColor: 'rgba(45, 212, 191, 0.2)',
              borderWidth: 1,
              titleFont: { family: "'Space Grotesk', sans-serif", weight: '600', size: 12 },
              bodyFont: { size: 11 },
              padding: 10,
              cornerRadius: 8,
              displayColors: false,
              callbacks: {
                title: function(items) { return 'Tanggal: ' + items[0].label; },
                label: function(item) { return 'Skor: ' + item.raw + ' / 1000'; }
              }
            }
          },
          animation: { duration: 1200, easing: 'easeOutQuart' }
        }
      });
      chartInstances.push(chart);
    }

    /* CHART 2: Transaksi Per Hari */
    function renderTxChart(labels, txData) {
      var ctx = document.getElementById('txChart');
      if (!ctx) return;
      var counts = txData.map(function(d) { return d.count; });
      var maxCount = Math.max.apply(null, counts.concat([1]));
      var barColors = counts.map(function(c) {
        var ratio = c / maxCount;
        if (ratio > 0.7) return 'rgba(245, 158, 11, 0.85)';
        if (ratio > 0.4) return 'rgba(245, 158, 11, 0.55)';
        return 'rgba(245, 158, 11, 0.3)';
      });
      var hoverColors = counts.map(function() { return 'rgba(245, 158, 11, 1)'; });

      var chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            data: counts,
            backgroundColor: barColors,
            hoverBackgroundColor: hoverColors,
            borderRadius: 4,
            borderSkipped: false,
            maxBarThickness: 16
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          scales: {
            x: { grid: { display: false }, ticks: { maxRotation: 0, autoSkip: true, maxTicksLimit: 8, font: { size: 10 } } },
            y: {
              beginAtZero: true,
              grid: { color: 'rgba(255,255,255,0.03)' },
              ticks: { stepSize: Math.max(1, Math.ceil(maxCount / 5)), font: { size: 10 }, precision: 0 }
            }
          },
          plugins: {
            tooltip: {
              backgroundColor: 'rgba(12, 18, 34, 0.95)',
              borderColor: 'rgba(245, 158, 11, 0.2)',
              borderWidth: 1,
              titleFont: { family: "'Space Grotesk', sans-serif", weight: '600', size: 12 },
              bodyFont: { size: 11 },
              padding: 10,
              cornerRadius: 8,
              displayColors: false,
              callbacks: {
                title: function(items) { return 'Tanggal: ' + items[0].label; },
                label: function(item) { return item.raw + ' transaksi'; }
              }
            }
          },
          animation: { duration: 1000, easing: 'easeOutQuart' }
        }
      });
      chartInstances.push(chart);
    }

    /* CHART 3: Success Rate Trend */
    function renderRateChart(labels, rateData) {
      var ctx = document.getElementById('rateChart');
      if (!ctx) return;
      var rates = rateData.map(function(d) { return d.rate; });
      var context = ctx.getContext('2d');
      var gradient = context.createLinearGradient(0, 0, 0, ctx.parentElement.clientHeight || 200);
      gradient.addColorStop(0, 'rgba(34, 197, 94, 0.2)');
      gradient.addColorStop(0.5, 'rgba(34, 197, 94, 0.04)');
      gradient.addColorStop(1, 'rgba(34, 197, 94, 0.0)');
      var avgLine = [];
      for (var a = 0; a < labels.length; a++) avgLine.push(95);

      var chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Success Rate',
              data: rates,
              borderColor: '#22c55e',
              borderWidth: 2.5,
              backgroundColor: gradient,
              fill: true,
              tension: 0.4,
              pointBackgroundColor: '#22c55e',
              pointBorderColor: '#060a13',
              pointHoverBackgroundColor: '#fff',
              pointHoverBorderColor: '#22c55e'
            },
            {
              label: 'Target',
              data: avgLine,
              borderColor: 'rgba(245, 158, 11, 0.4)',
              borderWidth: 1.5,
              borderDash: [6, 4],
              fill: false,
              tension: 0,
              pointRadius: 0,
              pointHoverRadius: 0
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          scales: {
            x: { grid: { display: false }, ticks: { maxRotation: 0, autoSkip: true, maxTicksLimit: 8, font: { size: 10 } } },
            y: {
              min: Math.max(0, Math.min.apply(null, rates) - 10),
              max: 100,
              grid: { color: 'rgba(255,255,255,0.03)' },
              ticks: { stepSize: 10, font: { size: 10 }, callback: function(v) { return v + '%'; } }
            }
          },
          plugins: {
            legend: {
              display: true,
              position: 'top',
              align: 'end',
              labels: {
                boxWidth: 12, boxHeight: 2, padding: 12,
                font: { size: 10 }, usePointStyle: false, color: '#94a3b8'
              }
            },
            tooltip: {
              backgroundColor: 'rgba(12, 18, 34, 0.95)',
              borderColor: 'rgba(34, 197, 94, 0.2)',
              borderWidth: 1,
              titleFont: { family: "'Space Grotesk', sans-serif", weight: '600', size: 12 },
              bodyFont: { size: 11 },
              padding: 10,
              cornerRadius: 8,
              callbacks: {
                title: function(items) { return 'Tanggal: ' + items[0].label; },
                label: function(item) {
                  if (item.datasetIndex === 0) return 'Success Rate: ' + item.raw.toFixed(1) + '%';
                  return 'Target: ' + item.raw + '%';
                }
              }
            }
          },
          animation: { duration: 1200, easing: 'easeOutQuart' }
        }
      });
      chartInstances.push(chart);
    }

    /* DATA GENERATORS */
    function generateTxPerDay(transactions) {
      var now = Date.now();
      var days = [];
      for (var i = 29; i >= 0; i--) {
        var dayStart = new Date(now - i * 86400000);
        dayStart.setHours(0, 0, 0, 0);
        var dayEnd = dayStart.getTime() + 86400000;
        var count = 0;
        for (var t = 0; t < transactions.length; t++) {
          if (transactions[t].timestamp >= dayStart.getTime() && transactions[t].timestamp < dayEnd) count++;
        }
        days.push({ date: dayStart.toISOString().split('T')[0], count: count });
      }
      return days;
    }

    function generateSuccessRateTrend(transactions) {
      var now = Date.now();
      var days = [];
      for (var i = 29; i >= 0; i--) {
        var dayStart = new Date(now - i * 86400000);
        dayStart.setHours(0, 0, 0, 0);
        var dayEnd = dayStart.getTime() + 86400000;
        var dayTxs = [];
        for (var t = 0; t < transactions.length; t++) {
          if (transactions[t].timestamp >= dayStart.getTime() && transactions[t].timestamp < dayEnd) dayTxs.push(transactions[t]);
        }
        if (dayTxs.length > 0) {
          var success = 0;
          for (var s = 0; s < dayTxs.length; s++) {
            if (dayTxs[s].status === 'success') success++;
          }
          days.push({ date: dayStart.toISOString().split('T')[0], rate: parseFloat(((success / dayTxs.length) * 100).toFixed(1)) });
        } else {
          var prevValid = null;
          for (var p = days.length - 1; p >= 0; p--) {
            if (days[p].rate !== null) { prevValid = days[p]; break; }
          }
          days.push({ date: dayStart.toISOString().split('T')[0], rate: prevValid ? prevValid.rate : 95.0 });
        }
      }
      return days;
    }
  </script>
